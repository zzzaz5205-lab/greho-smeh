<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ИГРОК | ГРЕХО-СМЕХ</title>
    <link rel="icon" href="https://fav.farm/🎮" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap');
        
        body { 
            font-family: sans-serif; 
            background: #fbc02d; 
            color: #3e2723; 
            text-align: center; 
            margin: 0; 
            overflow-x: hidden;
            touch-action: manipulation;
        }

        .top-bar { 
            background: #3e2723; 
            color: #fff; 
            padding: 15px; 
            font-weight: 900; 
            font-size: 20px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            font-family: 'Montserrat', sans-serif;
        }

        .btn { 
            background: #ef5350; 
            color: white; 
            width: 90%; 
            padding: 20px; 
            margin: 10px auto; 
            border: 4px solid #3e2723; 
            border-radius: 15px; 
            font-weight: 900; 
            font-size: 22px; 
            box-shadow: 0 6px 0 #b71c1c; 
            cursor: pointer;
            text-transform: uppercase;
            font-family: 'Montserrat', sans-serif;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #b71c1c; }

        /* СЕТКА ЭМОДЗИ */
        .emoji-grid { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 10px; 
            padding: 20px; 
        }
        .emoji-item { 
            font-size: 40px; 
            background: #fff; 
            border: 3px solid #3e2723; 
            border-radius: 15px; 
            width: 70px; 
            height: 70px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer;
            transition: 0.2s;
        }
        .emoji-item:active { transform: scale(0.9); background: #eee; }

        input { 
            width: 85%; 
            padding: 20px; 
            border: 4px solid #3e2723; 
            border-radius: 15px; 
            font-size: 20px; 
            font-weight: bold; 
            margin-top: 20px;
            outline: none;
        }

        .q-display {
            background: #fff;
            border: 4px solid #3e2723;
            padding: 20px;
            margin: 20px 10px;
            border-radius: 15px;
            font-size: 22px;
            font-weight: 900;
            transform: rotate(-1deg);
        }

        .hidden { display: none; }
        #status { padding: 40px; font-size: 22px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="top-bar">ROOM: <span id="room-display">...</span></div>
    
    <div id="status">CONNECTING...</div>

    <!-- ВЫБОР ПЕРСОНАЖА -->
    <div id="emoji-ui" class="hidden">
        <h2 id="ui-choose">КТО ТЫ СЕГОДНЯ?</h2>
        <div id="grid" class="emoji-grid"></div>
    </div>

    <!-- ВВОД ОТВЕТА -->
    <div id="answer-ui" class="hidden">
        <div id="qText" class="q-display"></div>
        <input id="ansV" type="text" placeholder="...">
        <button class="btn" id="ui-send" onclick="sendAns()" style="background:#4caf50; box-shadow: 0 6px 0 #2e7d32;">ОТПРАВИТЬ</button>
    </div>

    <!-- ГОЛОСОВАНИЕ -->
    <div id="vote-ui" class="hidden">
        <h2 id="ui-vote-title">КТО СМЕШНЕЕ?</h2>
        <button id="b1" class="btn"></button>
        <button id="b2" class="btn" style="background:#42a5f5; box-shadow: 0 6px 0 #1565c0;"></button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const params = new URLSearchParams(window.location.search);
        const name = params.get('name'), code = params.get('code')?.toUpperCase();
        
        let currentLang = 'ru';
        const emojis = ['🤡','👽','🤖','👻','🐙','🐸','🐱','🍌','💩','🦄','🐼','🦊','🐷','🐧','🦖','🍦','🍔','🍕','🎸','🚀','💎','🎲','🍄','🧶','🦷'];

        const playerTexts = {
            ru: { wait: "Жди начала...", choose: "ВЫБЕРИ ГЕРОЯ", send: "ОТПРАВИТЬ", vote: "КТО СМЕШНЕЕ?", ready: "ГОТОВ!", turn: "ТВОЙ ХОД!", watch: "СМОТРИ НА ЭКРАН!" },
            en: { wait: "Wait for start...", choose: "CHOOSE HERO", send: "SEND", vote: "WHO IS FUNNIER?", ready: "READY!", turn: "YOUR TURN!", watch: "WATCH THE TV!" },
            zh: { wait: "等待开始...", choose: "选择你的角色", send: "发送", vote: "谁更有趣？", ready: "准备好了！", turn: "轮到你了！", watch: "看大屏幕！" }
        };

        if (!name || !code) { location.href = 'index.html'; }
        document.getElementById('room-display').innerText = code;

        socket.emit('join-room', { code, name });

        socket.on('joined-success', (data) => {
            currentLang = data.settings?.lang || 'ru';
            updateUI();
            document.getElementById('status').classList.add('hidden');
            document.getElementById('emoji-ui').classList.remove('hidden');
            
            const g = document.getElementById('grid');
            g.innerHTML = "";
            emojis.forEach(e => {
                const d = document.createElement('div');
                d.className = 'emoji-item';
                d.innerText = e;
                d.onclick = () => {
                    socket.emit('select-emoji', { code, emoji: e });
                    document.getElementById('emoji-ui').innerHTML = `<h1>${playerTexts[currentLang].ready}</h1>`;
                };
                g.appendChild(d);
            });
        });

        socket.on('settings-updated', (s) => {
            currentLang = s.lang;
            updateUI();
        });

        function updateUI() {
            const t = playerTexts[currentLang];
            document.getElementById('ui-choose').innerText = t.choose;
            document.getElementById('ui-send').innerText = t.send;
            document.getElementById('ui-vote-title').innerText = t.vote;
            document.getElementById('ansV').placeholder = "...";
        }

        socket.on('round-started', d => {
            currentLang = d.settings.lang;
            updateUI();
            let myTurn = (socket.id === d.p1_id || socket.id === d.p2_id);
            
            document.getElementById('emoji-ui').classList.add('hidden');
            document.getElementById('answer-ui').classList.toggle('hidden', !myTurn);
            document.getElementById('vote-ui').classList.add('hidden');
            document.getElementById('status').classList.toggle('hidden', myTurn);
            document.getElementById('status').innerText = playerTexts[currentLang].watch;

            if(myTurn) {
                document.getElementById('qText').innerText = d.q;
                document.getElementById('ansV').value = "";
            }
        });

        function sendAns() {
            const val = document.getElementById('ansV').value;
            if(!val) return;
            socket.emit('submit-answer', { code, answer: val });
            document.getElementById('answer-ui').classList.add('hidden');
            document.getElementById('status').classList.remove('hidden');
            document.getElementById('status').innerText = playerTexts[currentLang].ready;
        }

        socket.on('show-voting', d => {
            let myTurnInPair = (socket.id === d.p1_id || socket.id === d.p2_id); // Проверка если игрок в текущей паре
            
            if(myTurnInPair || d.isSolo) {
                document.getElementById('status').classList.remove('hidden');
                document.getElementById('status').innerText = d.isSolo ? "SOLO!" : playerTexts[currentLang].watch;
                return;
            }

            document.getElementById('status').classList.add('hidden');
            document.getElementById('vote-ui').classList.remove('hidden');
            
            const btn1 = document.getElementById('b1');
            const btn2 = document.getElementById('b2');

            btn1.innerText = d.ans1;
            btn1.onclick = () => { socket.emit('cast-vote', { code, voteNum: 1 }); document.getElementById('vote-ui').classList.add('hidden'); };
            
            btn2.innerText = d.ans2;
            btn2.onclick = () => { socket.emit('cast-vote', { code, voteNum: 2 }); document.getElementById('vote-ui').classList.add('hidden'); };
        });

        socket.on('go-to-menu', () => location.href = 'index.html');
        socket.on('error-join', m => { alert(m); location.href = 'index.html'; });
    </script>
</body>
</html>
