<!-- Добавь это в начало <body> в player.html -->
<div id="p-timer" style="font-size: 30px; font-weight: bold; color: #fff; background: #3e2723; display: none; padding: 5px;"></div>

<script>
    // Добавь эту функцию в скрипт
    let ptVal = 0, ptInt;
    function startPlayerTimer(sec) {
        clearInterval(ptInt);
        ptVal = sec;
        const el = document.getElementById('p-timer');
        el.style.display = "block";
        ptInt = setInterval(() => {
            el.innerText = "ВРЕМЯ: " + ptVal;
            if(ptVal <= 0) { clearInterval(ptInt); el.style.display = "none"; }
            ptVal--;
        }, 1000);
    }

    // Внутри socket.on('round-started', d => { ... }) вызови её:
    socket.on('round-started', d => {
        startPlayerTimer(d.time);
        // ... твой код ...
    });

    // Внутри socket.on('show-voting', d => { ... }) вызови её:
    socket.on('show-voting', d => {
        startPlayerTimer(d.time);
        // ... твой код ...
    });
</script>
