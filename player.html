<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>QUI-DEVICE</title>
    <style>
        body { font-family: sans-serif; background: #3e2723; color: #fff; text-align: center; margin: 0; }
        .header { background: #fbc02d; color: #000; padding: 15px; font-weight: 900; font-size: 20px; }
        .input-box { background: #fff; color: #000; width: 90%; margin: 20px auto; border-radius: 15px; padding: 20px; border: 5px solid #000; }
        input { width: 100%; border: none; font-size: 24px; font-weight: bold; text-align: center; outline: none; }
        .btn { background: #ef5350; border: 4px solid #000; border-radius: 15px; padding: 20px; width: 90%; color: #fff; font-size: 24px; font-weight: 900; cursor: pointer; box-shadow: 0 6px 0 #b71c1c; }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #b71c1c; }
    </style>
</head>
<body>
    <div class="header">ROOM: <span id="codeDisplay">...</span></div>
    
    <div id="answer-ui">
        <div class="input-box">
            <input id="ans1" type="text" maxlength="40" placeholder="ПИШИ ТУТ...">
        </div>
        <div id="extra-inputs" style="display:none">
             <div class="input-box"><input id="ans2" type="text" maxlength="40"></div>
             <div class="input-box"><input id="ans3" type="text" maxlength="40"></div>
        </div>
        <button class="btn" onclick="send()">ОТПРАВИТЬ!</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const params = new URLSearchParams(window.location.search);
        const name = params.get('name'), code = params.get('code');
        document.getElementById('codeDisplay').innerText = code;

        socket.emit('join-room', { code, name });

        socket.on('round-started', d => {
            if(d.round === 3) document.getElementById('extra-inputs').style.display = 'block';
        });

        function send() {
            const a = [document.getElementById('ans1').value, document.getElementById('ans2').value, document.getElementById('ans3').value];
            socket.emit('submit-answer', { code, name, answer: a });
            document.body.innerHTML = "<h1>ЖДИ ЭКРАНА!</h1>";
        }
    </script>
</body>
</html>
