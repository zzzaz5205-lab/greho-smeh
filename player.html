<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ИГРОК | ГРЕХО-СМЕХ</title>
    <style>
        body { font-family: sans-serif; background: #fbc02d; color: #3e2723; text-align: center; margin: 0; overflow: hidden; touch-action: none; }
        .top-bar { background: #3e2723; color: #fff; padding: 10px; font-weight: 900; }
        .screen { display: block; padding: 20px; box-sizing: border-box; height: calc(100vh - 40px); overflow-y: auto; }
        .hidden { display: none !important; }
        .btn { background: #ef5350; color: white; width: 95%; padding: 15px; margin: 10px auto; border: 4px solid #3e2723; border-radius: 12px; font-weight: 900; font-size: 20px; box-shadow: 0 4px 0 #3e2723; cursor: pointer; }
        #canvas { background: #fff; border: 5px solid #3e2723; border-radius: 15px; touch-action: none; margin-bottom: 10px; }
        input { width: 90%; padding: 15px; border: 3px solid #3e2723; border-radius: 10px; font-size: 18px; font-weight: bold; }
        .emoji-item { font-size: 35px; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="top-bar">ROOM: <span id="room-display">...</span></div>
    
    <div id="emoji-ui" class="screen">
        <h2>ВЫБЕРИ ГЕРОЯ</h2>
        <div id="grid" style="display:flex; flex-wrap:wrap; justify-content:center;"></div>
    </div>

    <div id="wait-ui" class="screen hidden">
        <h2 id="status-msg">Смотри на экран!</h2>
        <img src="cat.gif" style="width:100%; border-radius:15px;">
    </div>

    <div id="answer-ui" class="screen hidden">
        <div id="qText" style="background:#fff; border:3px solid #3e2723; padding:10px; border-radius:10px; margin-bottom:15px; font-weight:bold;"></div>
        <div id="inp-area"></div>
        <button id="rec-btn" class="btn hidden" style="background:#42a5f5;">ЗАПИСАТЬ ЗВУК</button>
        <button class="btn" onclick="sendAns()" style="background:#4caf50;">ОТПРАВИТЬ</button>
    </div>

    <div id="vote-ui" class="screen hidden">
        <h2>КТО СМЕШНЕЕ?</h2>
        <div id="vote-btns"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const params = new URLSearchParams(window.location.search);
        let myName = params.get('name') || localStorage.getItem('pName'), myCode = params.get('code')?.toUpperCase();
        let myMode = "classic", audioBlob = null;

        localStorage.setItem('pName', myName); document.getElementById('room-display').innerText = myCode;

        function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }

        socket.emit('join-room', { code: myCode, name: myName });
        socket.on('joined-success', () => {
            const g = document.getElementById('grid'); g.innerHTML = "";
            ['🤡','👽','🤖','👻','🐙','🐸','🐱','🍌','💩','🦄','🐼','🦊','🐷','🐧','🦖'].forEach(e => {
                const d = document.createElement('div'); d.className='emoji-item'; d.innerText=e;
                d.onclick = () => { socket.emit('select-emoji', { code: myCode, name: myName, emoji: e }); showScreen('wait-ui'); };
                g.appendChild(d);
            });
        });

        socket.on('round-started', d => {
            myMode = d.mode; const myTurn = (myName === d.p1_name || myName === d.p2_name);
            if(myTurn) {
                showScreen('answer-ui'); document.getElementById('qText').innerText = d.q;
                const area = document.getElementById('inp-area'); area.innerHTML = "";
                document.getElementById('rec-btn').classList.add('hidden');
                if(myMode === 'draw') {
                    area.innerHTML = '<canvas id="canvas" width="300" height="350"></canvas><br><button onclick="ctx.clearRect(0,0,300,350)">Стереть</button>';
                    initCanvas();
                } else if(myMode === 'voice') {
                    document.getElementById('rec-btn').classList.remove('hidden');
                    initVoice();
                } else {
                    area.innerHTML = '<input id="ansV" type="text" placeholder="Твой ответ...">';
                }
            } else { showScreen('wait-ui'); }
        });

        function initCanvas() {
            const canv = document.getElementById('canvas'); const ctx = canv.getContext('2d'); let drawing = false;
            canv.addEventListener('touchstart', e => { drawing=true; ctx.beginPath(); ctx.moveTo(e.touches[0].clientX-canv.offsetLeft, e.touches[0].clientY-canv.offsetTop); e.preventDefault(); });
            canv.addEventListener('touchmove', e => { if(drawing){ ctx.lineTo(e.touches[0].clientX-canv.offsetLeft, e.touches[0].clientY-canv.offsetTop); ctx.lineWidth=5; ctx.stroke(); } e.preventDefault(); });
            canv.addEventListener('touchend', () => drawing=false);
            window.ctx = ctx;
        }

        async function initVoice() {
            const btn = document.getElementById('rec-btn');
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const rec = new MediaRecorder(stream);
            let chunks = [];
            btn.onclick = () => {
                if(rec.state === 'inactive') { rec.start(); btn.innerText="СТОП"; btn.style.background="red"; }
                else { rec.stop(); btn.innerText="ЗАПИСАНО"; btn.style.background="green"; }
            };
            rec.ondataavailable = e => chunks.push(e.data);
            rec.onstop = () => { const blob = new Blob(chunks, {type:'audio/ogg'}); const reader = new FileReader(); reader.readAsDataURL(blob); reader.onloadend = () => audioBlob = reader.result; };
        }

        function sendAns() {
            let val = myMode === 'draw' ? document.getElementById('canvas').toDataURL() : (myMode === 'voice' ? audioBlob : document.getElementById('ansV').value);
            socket.emit('submit-answer', { code: myCode, name: myName, answer: val });
            showScreen('wait-ui');
        }

        socket.on('show-voting', d => {
            if(myName === d.p1_name || myName === d.p2_name) return;
            showScreen('vote-ui');
            document.getElementById('v-btns').innerHTML = `<button class="btn" onclick="v(1)">ВАРИАНТ 1</button><button class="btn" onclick="v(2)">ВАРИАНТ 2</button>`;
        });
        function v(n) { socket.emit('cast-vote', {code:myCode, voteNum:n}); showScreen('wait-ui'); }
        socket.on('go-to-menu', () => { localStorage.clear(); location.href = 'index.html'; });
    </script>
</body>
</html>
