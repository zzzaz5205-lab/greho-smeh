<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИГРОК</title>
    <style>
        body { font-family: sans-serif; background: #fbc02d; text-align: center; margin: 0; padding: 10px; }
        .hidden { display: none; }
        .btn { background: #ef5350; color: #fff; width: 95%; padding: 20px; border: 4px solid #000; border-radius: 15px; font-weight: 900; font-size: 20px; margin-top: 10px; box-shadow: 0 6px 0 #000; }
        .char-pick { width: 100px; height: 100px; border: 5px solid #000; display: inline-block; margin: 10px; cursor: pointer; }
        .red { background: #ff4757; border-radius: 50%; }
        .orange { background: #ffa502; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); }
        .blue { background: #2e86de; border-radius: 20px; }
        input { width: 90%; padding: 15px; border: 3px solid #000; border-radius: 10px; margin: 5px; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="status" style="padding:20px; font-weight:900; font-size:24px">ПОДКЛЮЧЕНИЕ...</div>

    <div id="char-ui" class="hidden">
        <h3>ВЫБЕРИ МОНСТРА:</h3>
        <div class="char-pick red" onclick="sel('red-angry')"></div>
        <div class="char-pick orange" onclick="sel('orange-evil')"></div>
        <div class="char-pick blue" onclick="sel('blue-sad')"></div>
    </div>

    <div id="answer-ui" class="hidden">
        <h2 id="qText" style="background:#fff; border:3px solid #000; padding:15px; border-radius:15px"></h2>
        <div id="inp-area"></div>
        <button class="btn" onclick="sendAns()" style="background:#4caf50">ОТПРАВИТЬ</button>
    </div>

    <div id="vote-ui" class="hidden"><h2>ГОЛОСУЕМ!</h2><button id="b1" class="btn"></button><button id="b2" class="btn" style="background:#2196f3"></button></div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io(); 
    let name = localStorage.getItem('pName'), code = localStorage.getItem('pCode');
    if(!name){ const p = new URLSearchParams(window.location.search); name=p.get('name'); code=p.get('code'); localStorage.setItem('pName', name); localStorage.setItem('pCode', code); }
    socket.emit('join-room', { code, name });

    socket.on('joined-success', () => {
        document.getElementById('status').classList.add('hidden');
        document.getElementById('char-ui').classList.remove('hidden');
    });

    function sel(c) {
        socket.emit('select-char', { code, name, char: c });
        document.getElementById('char-ui').innerHTML = "<h1>ГОТОВ!</h1>";
    }

    socket.on('round-started', d => {
        let myTurn = (name === d.p1_name || name === d.p2_name);
        document.getElementById('char-ui').classList.add('hidden');
        document.getElementById('answer-ui').classList.toggle('hidden', !myTurn);
        if(myTurn){
            document.getElementById('qText').innerText = d.q;
            document.getElementById('inp-area').innerHTML = d.round === 3 ? '<input class="ansV" maxlength="40"><input class="ansV" maxlength="40"><input class="ansV" maxlength="40">' : '<input class="ansV" maxlength="40">';
        }
    });

    function sendAns(){
        const v = Array.from(document.querySelectorAll('.ansV')).map(i=>i.value);
        socket.emit('submit-answer', { code, name, answer: v });
        document.getElementById('answer-ui').classList.add('hidden');
    }

    socket.on('show-voting', d => {
        if(name === d.p1_name || name === d.p2_name) return;
        document.getElementById('vote-ui').classList.remove('hidden');
        document.getElementById('b1').innerText = d.ans1; document.getElementById('b2').innerText = d.ans2;
        document.getElementById('b1').onclick = () => { socket.emit('cast-vote', {code, voteNum:1}); document.getElementById('vote-ui').classList.add('hidden'); };
        document.getElementById('b2').onclick = () => { socket.emit('cast-vote', {code, voteNum:2}); document.getElementById('vote-ui').classList.add('hidden'); };
    });
</script>
</body>
</html>
