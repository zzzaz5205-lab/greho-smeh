<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ИГРОК</title>
    <style>
        body { font-family: sans-serif; background: #1a1a2e; color: white; text-align: center; margin: 0; touch-action: none; overflow: hidden; }
        .btn { background: #e94560; color: white; width: 90%; padding: 18px; margin: 10px; border: none; border-radius: 15px; font-weight: bold; font-size: 22px; }
        .hidden { display: none; }
        .emoji-grid { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; }
        .emoji-item { font-size: 50px; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="status" style="padding:40px; font-size:24px;">Подключение...</div>

    <!-- Выбор эмодзи в лобби -->
    <div id="emoji-ui" class="hidden">
        <h3>ВЫБЕРИ ПЕРСОНАЖА:</h3>
        <div class="emoji-grid">
            <div class="emoji-item" onclick="selectEmoji('🤡')">🤡</div>
            <div class="emoji-item" onclick="selectEmoji('👽')">👽</div>
            <div class="emoji-item" onclick="selectEmoji('🤖')">🤖</div>
            <div class="emoji-item" onclick="selectEmoji('👻')">👻</div>
            <div class="emoji-item" onclick="selectEmoji('🐙')">🐙</div>
            <div class="emoji-item" onclick="selectEmoji('🐸')">🐸</div>
        </div>
    </div>

    <!-- Интерфейс ответа -->
    <div id="answer-ui" class="hidden">
        <div id="qText" style="padding:15px; font-weight:bold;"></div>
        <div id="input-area"></div>
        <button id="record-btn" class="btn hidden" style="background:#f1c40f">ЗАПИСАТЬ ГОЛОС</button>
        <button class="btn" onclick="sendAns()" style="background:#27ae60">ОТПРАВИТЬ</button>
    </div>

    <!-- Голосование -->
    <div id="vote-ui" class="hidden">
        <h3>КТО СМЕШНЕЕ?</h3>
        <button id="b1" class="btn" onclick="vote(1)"></button>
        <button id="b2" class="btn" onclick="vote(2)" style="background:#3498db"></button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const params = new URLSearchParams(window.location.search);
        const name = params.get('name'), code = params.get('code');
        let myMode = "";
        let audioBlob = null;

        // Если страница обновлена - кикаем
        if (!name || !code) { window.location.href = 'index.html'; }

        socket.emit('join-room', { code, name });
        
        socket.on('joined-success', () => {
            document.getElementById('status').classList.add('hidden');
            document.getElementById('emoji-ui').classList.remove('hidden');
        });

        function selectEmoji(emoji) {
            socket.emit('select-emoji', { code, emoji });
            document.getElementById('emoji-ui').innerHTML = `<h3>ЖДЁМ НАЧАЛА... ${emoji}</h3>`;
        }

        socket.on('round-started', d => {
            myMode = d.mode;
            let myTurn = (socket.id === d.p1_id || socket.id === d.p2_id);
            document.getElementById('emoji-ui').classList.add('hidden');
            document.getElementById('answer-ui').classList.toggle('hidden', !myTurn);
            document.getElementById('vote-ui').classList.add('hidden');
            
            if(myTurn) {
                document.getElementById('qText').innerText = d.q;
                const area = document.getElementById('input-area');
                const recBtn = document.getElementById('record-btn');
                area.innerHTML = '';
                recBtn.classList.add('hidden');

                if(myMode === 'voice') {
                    recBtn.classList.remove('hidden');
                    initVoice();
                } else if(myMode === 'draw') {
                    area.innerHTML = '<canvas id="canvas" width="300" height="300" style="background:white"></canvas>';
                } else {
                    area.innerHTML = '<input id="ansVal" type="text" style="width:80%; padding:10px;">';
                }
            }
        });

        // ЛОГИКА ГОЛОСА
        function initVoice() {
            const btn = document.getElementById('record-btn');
            let recorder;
            btn.onmousedown = btn.ontouchstart = async () => {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                recorder = new MediaRecorder(stream);
                let chunks = [];
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'audio/ogg; codecs=opus' });
                    const reader = new FileReader();
                    reader.readAsDataURL(blob);
                    reader.onloadend = () => { audioBlob = reader.result; btn.innerText = "ЗАПИСАНО! ✅"; };
                };
                recorder.start();
                btn.innerText = "ПИШЕМ... 🎤";
            };
            btn.onmouseup = btn.ontouchend = () => { if(recorder) recorder.stop(); };
        }

        function sendAns() {
            let val;
            if(myMode === 'voice') val = audioBlob;
            else if(myMode === 'draw') val = document.getElementById('canvas').toDataURL();
            else val = document.getElementById('ansVal').value;
            
            socket.emit('submit-answer', { code, answer: val });
            document.getElementById('answer-ui').classList.add('hidden');
            document.getElementById('status').classList.remove('hidden');
            document.getElementById('status').innerText = "ПРИНЯТО!";
        }

        socket.on('show-voting', d => {
            document.getElementById('answer-ui').classList.add('hidden');
            document.getElementById('status').classList.add('hidden');
            document.getElementById('vote-ui').classList.remove('hidden');
            document.getElementById('b1').innerText = d.type==='classic' ? d.ans1 : "ВАРИАНТ 1";
            document.getElementById('b2').innerText = d.type==='classic' ? d.ans2 : "ВАРИАНТ 2";
        });

        function vote(n) {
            socket.emit('cast-vote', { code, voteNum: n });
            document.getElementById('vote-ui').classList.add('hidden');
            document.getElementById('status').classList.remove('hidden');
        }

        socket.on('go-to-menu', () => { window.location.href = 'index.html'; });
    </script>
</body>
</html>
