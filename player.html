<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ИГРОК</title>
    <style>
        body { font-family: sans-serif; background: #fbc02d; color: #000; text-align: center; margin: 0; }
        .btn { background: #ef5350; color: white; width: 90%; padding: 18px; margin: 10px; border: 4px solid #000; border-radius: 12px; font-weight: 900; font-size: 22px; box-shadow: 0 6px 0 #000; }
        .hidden { display: none; }
        .emoji-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; padding: 15px; }
        .emoji-item { font-size: 40px; background: #fff; border: 3px solid #000; border-radius: 10px; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; }
        input { width: 85%; padding: 15px; border: 4px solid #000; border-radius: 10px; font-size: 18px; margin: 5px; }
    </style>
</head>
<body>
    <div id="status" style="padding:20px;">Подключение...</div>

    <div id="emoji-ui" class="hidden">
        <h3>ВЫБЕРИ ПЕРСОНАЖА</h3>
        <div class="emoji-grid" id="grid"></div>
    </div>

    <div id="answer-ui" class="hidden">
        <h3 id="qText" style="background:#fff; border:4px solid #000; padding:15px; margin:10px;"></h3>
        <div id="inp-area"></div>
        <button class="btn" onclick="sendAns()" style="background:#4caf50;">ОТПРАВИТЬ</button>
    </div>

    <div id="vote-ui" class="hidden">
        <h3>ГОЛОСУЕМ!</h3>
        <button id="b1" class="btn"></button>
        <button id="b2" class="btn" style="background:#42a5f5;"></button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io(); 
        const params = new URLSearchParams(window.location.search);
        let name = params.get('name'), code = params.get('code');
        
        // Если обновил страницу -> восстанавливаем данные
        if (!name) { 
            name = localStorage.getItem('lastPlayerName'); 
            code = localStorage.getItem('lastPlayerCode');
        } else {
            localStorage.setItem('lastPlayerName', name);
            localStorage.setItem('lastPlayerCode', code);
        }

        socket.emit('join-room', { code, name });

        socket.on('joined-success', () => {
            document.getElementById('status').classList.add('hidden');
            document.getElementById('emoji-ui').classList.remove('hidden');
            const g = document.getElementById('grid'); g.innerHTML = "";
            ['🤡','👽','🤖','👻','🐙','🐸','🐷','🍔','🚀','💎','💩'].forEach(e => {
                const d = document.createElement('div'); d.className='emoji-item'; d.innerText=e;
                d.onclick = () => { socket.emit('select-emoji', { code, emoji: e }); document.getElementById('emoji-ui').innerHTML="<h1>ГОТОВ!</h1>"; };
                g.appendChild(d);
            });
        });

        socket.on('round-started', d => {
            let myTurn = (socket.id === d.p1_id || socket.id === d.p2_id);
            document.getElementById('emoji-ui').classList.add('hidden');
            document.getElementById('answer-ui').classList.toggle('hidden', !myTurn);
            document.getElementById('vote-ui').classList.add('hidden');
            if(myTurn) {
                document.getElementById('qText').innerText = d.q;
                const area = document.getElementById('inp-area');
                if (d.round === 3) {
                    area.innerHTML = '<input class="ansV" maxlength="40" placeholder="1..."><input class="ansV" maxlength="40" placeholder="2..."><input class="ansV" maxlength="40" placeholder="3...">';
                } else {
                    area.innerHTML = '<input class="ansV" maxlength="40" placeholder="Твой ответ...">';
                }
            }
        });

        function sendAns() {
            const inps = Array.from(document.querySelectorAll('.ansV')).map(i => i.value);
            socket.emit('submit-answer', { code, answer: inps });
            document.getElementById('answer-ui').classList.add('hidden');
            document.getElementById('status').classList.remove('hidden');
            document.getElementById('status').innerText = "ЖДЕМ МОДЕРАЦИЮ...";
        }

        socket.on('show-voting', d => {
            document.getElementById('status').classList.add('hidden');
            document.getElementById('vote-ui').classList.remove('hidden');
            document.getElementById('b1').innerText = d.ans1;
            document.getElementById('b2').innerText = d.ans2;
            document.getElementById('b1').onclick = () => socket.emit('cast-vote', {code, voteNum:1});
            document.getElementById('b2').onclick = () => socket.emit('cast-vote', {code, voteNum:2});
        });
        socket.on('go-to-menu', () => location.href='index.html');
    </script>
</body>
</html>
