<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИГРОК</title>
    <style>
        body { font-family: sans-serif; background: #fbc02d; text-align: center; margin: 0; }
        .screen { padding: 20px; }
        .hidden { display: none; }
        .btn { background: #ef5350; color: #fff; width: 90%; padding: 20px; border: 4px solid #000; border-radius: 15px; font-weight: 900; font-size: 20px; cursor: pointer; }
        input { width: 80%; padding: 15px; border: 3px solid #000; border-radius: 10px; margin-bottom: 15px; font-size: 18px; }
    </style>
</head>
<body>
    <div id="status" class="screen">
        <h1>ПОДКЛЮЧЕНИЕ...</h1>
    </div>

    <div id="lobby-ui" class="screen hidden">
        <h1 id="welcome">ПРИВЕТ!</h1>
        <p>Твой персонаж на экране.</p>
        <p>Ждем начала игры...</p>
    </div>

    <div id="game-ui" class="screen hidden">
        <h2 id="qText"></h2>
        <input type="text" id="ans" placeholder="ТВОЙ ОТВЕТ...">
        <button class="btn" onclick="send()">ОТПРАВИТЬ</button>
    </div>

    <div id="vote-ui" class="screen hidden">
        <h2>ГОЛОСУЕМ!</h2>
        <button id="b1" class="btn" onclick="vote(1)" style="margin-bottom:10px;"></button>
        <button id="b2" class="btn" onclick="vote(2)" style="background:#2196f3"></button>
    </div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let myName = localStorage.getItem('pName');
    let myCode = localStorage.getItem('pCode');

    if(!myName) {
        const params = new URLSearchParams(window.location.search);
        myName = params.get('name'); myCode = params.get('code');
        localStorage.setItem('pName', myName); localStorage.setItem('pCode', myCode);
    }

    socket.emit('join-room', { code: myCode, name: myName });

    socket.on('joined-success', (data) => {
        document.getElementById('status').classList.add('hidden');
        document.getElementById('lobby-ui').classList.remove('hidden');
        document.getElementById('welcome').innerText = "ТЫ В ИГРЕ, " + myName;
    });

    socket.on('round-started', d => {
        const myTurn = (myName === d.p1_name || myName === d.p2_name);
        document.getElementById('lobby-ui').classList.add('hidden');
        document.getElementById('vote-ui').classList.add('hidden');
        if(myTurn) {
            document.getElementById('game-ui').classList.remove('hidden');
            document.getElementById('qText').innerText = d.q;
        } else {
            document.getElementById('status').classList.remove('hidden');
            document.getElementById('status').innerHTML = "<h1>СМОТРИ НА ЭКРАН!</h1>";
        }
    });

    function send() {
        const a = document.getElementById('ans').value;
        socket.emit('submit-answer', { code: myCode, name: myName, answer: a });
        document.getElementById('game-ui').classList.add('hidden');
        document.getElementById('status').classList.remove('hidden');
        document.getElementById('status').innerHTML = "<h1>ПРИНЯТО!</h1>";
    }

    socket.on('show-voting', d => {
        if(myName === d.p1_name || myName === d.p2_name) return;
        document.getElementById('status').classList.add('hidden');
        document.getElementById('vote-ui').classList.remove('hidden');
        document.getElementById('b1').innerText = d.ans1;
        document.getElementById('b2').innerText = d.ans2;
    });

    function vote(n) {
        socket.emit('cast-vote', { code: myCode, voteNum: n });
        document.getElementById('vote-ui').classList.add('hidden');
        document.getElementById('status').classList.remove('hidden');
        document.getElementById('status').innerHTML = "<h1>ГОЛОС УЧТЕН!</h1>";
    }

    socket.on('error-join', m => { alert(m); location.href="index.html"; });
</script>
</body>
</html>
