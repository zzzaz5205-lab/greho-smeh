<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ИГРОК | ГРЕХО-СМЕХ</title>
    <style>
        body { font-family: sans-serif; background: #fbc02d; color: #3e2723; text-align: center; margin: 0; overflow-x: hidden; }
        .top-code { background: #3e2723; color: #fff; padding: 10px; font-weight: bold; font-size: 20px; }
        .btn { background: #ef5350; color: white; width: 90%; padding: 18px; margin: 10px; border: 3px solid #3e2723; border-radius: 12px; font-weight: bold; font-size: 22px; box-shadow: 0 5px 0 #b71c1c; }
        .emoji-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; padding: 15px; }
        .emoji-item { font-size: 40px; background: #fff; border: 3px solid #3e2723; border-radius: 10px; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        input { width: 85%; padding: 15px; border: 3px solid #3e2723; border-radius: 10px; font-size: 18px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="top-code">КОМНАТА: <span id="room-display">...</span></div>
    <div id="status" style="padding:20px;">Подключение...</div>

    <div id="emoji-ui" class="hidden">
        <h3>КТО ТЫ СЕГОДНЯ?</h3>
        <div class="emoji-grid" id="grid"></div>
    </div>

    <div id="answer-ui" class="hidden">
        <h3 id="qText" style="background:#fff; border:3px solid #3e2723; padding:15px; margin:10px; border-radius:10px;"></h3>
        <div id="inp-area"></div>
        <button id="rec-btn" class="btn hidden" style="background:#42a5f5; box-shadow: 0 5px 0 #1565c0;">ЗАПИСАТЬ</button>
        <button class="btn" onclick="sendAns()" style="background:#4caf50; box-shadow: 0 5px 0 #2e7d32;">ОТПРАВИТЬ</button>
    </div>

    <div id="vote-ui" class="hidden">
        <h3>КТО СМЕШНЕЕ?</h3>
        <button id="b1" class="btn"></button>
        <button id="b2" class="btn" style="background:#42a5f5; box-shadow: 0 5px 0 #1565c0;"></button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io(); const params = new URLSearchParams(window.location.search);
        const name = params.get('name'), code = params.get('code').toUpperCase();
        document.getElementById('room-display').innerText = code;
        const emojis = ['🤡','👽','🤖','👻','🐙','🐸','🐱','🍌','💩','🦄','🐼','🦊','🐷','🐧','🦖','🍦','🍔','🍕','🎸','🚀','💎','🎲','🍄','🧶','🦷'];

        socket.emit('join-room', { code, name });
        socket.on('joined-success', () => {
            document.getElementById('status').classList.add('hidden');
            document.getElementById('emoji-ui').classList.remove('hidden');
            const grid = document.getElementById('grid');
            emojis.forEach(e => {
                const d = document.createElement('div'); d.className = 'emoji-item'; d.innerText = e;
                d.onclick = () => { socket.emit('select-emoji', { code, emoji: e }); document.getElementById('emoji-ui').innerHTML = "<h1>ГОТОВ!</h1>"; };
                grid.appendChild(d);
            });
        });

        socket.on('round-started', d => {
            let myTurn = (socket.id === d.p1_id || socket.id === d.p2_id);
            document.getElementById('emoji-ui').classList.add('hidden');
            document.getElementById('answer-ui').classList.toggle('hidden', !myTurn);
            document.getElementById('vote-ui').classList.add('hidden');
            if(myTurn) { document.getElementById('qText').innerText = d.q; document.getElementById('inp-area').innerHTML = '<input id="ansV" type="text">'; }
        });

        function sendAns() { socket.emit('submit-answer', { code, answer: document.getElementById('ansV').value }); document.getElementById('answer-ui').classList.add('hidden'); }
        
        socket.on('show-voting', d => {
            if(d.isSolo) return;
            document.getElementById('vote-ui').classList.remove('hidden');
            document.getElementById('b1').innerText = d.ans1; document.getElementById('b1').onclick = () => { socket.emit('cast-vote', {code, voteNum:1}); document.getElementById('vote-ui').classList.add('hidden'); };
            document.getElementById('b2').innerText = d.ans2; document.getElementById('b2').onclick = () => { socket.emit('cast-vote', {code, voteNum:2}); document.getElementById('vote-ui').classList.add('hidden'); };
        });
        socket.on('error-join', () => location.href='index.html');
    </script>
</body>
</html>
