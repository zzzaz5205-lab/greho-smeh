<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИГРОК</title>
    <style>
        body { font-family: sans-serif; background: #3e2723; color: #fff; text-align: center; margin: 0; }
        .hidden { display: none; }
        .btn { background: #ef5350; color: #fff; width: 90%; padding: 20px; border: 4px solid #000; border-radius: 15px; font-weight: 900; font-size: 22px; cursor: pointer; }
        .char-pick { width: 80px; height: 80px; border: 4px solid #fff; display: inline-block; margin: 10px; border-radius: 15px; }
        input { width: 85%; padding: 20px; border: 4px solid #000; border-radius: 15px; font-size: 20px; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>
    <div id="join-ui" style="padding:20px;">
        <input type="text" id="name" placeholder="ИМЯ"><br>
        <input type="text" id="code" placeholder="КОД"><br>
        <button class="btn" onclick="join()">ВОЙТИ</button>
    </div>

    <div id="char-ui" class="hidden">
        <h3>ВЫБЕРИ ЦВЕТ МОНСТРА:</h3>
        <div id="colors"></div>
    </div>

    <div id="wait-ui" class="hidden" style="margin-top:100px;">
        <h1>ГОТОВО!</h1>
        <p>Смотри на экран...</p>
    </div>

    <div id="answer-ui" class="hidden">
        <h2 id="qText" style="color:#fbc02d"></h2>
        <input type="text" id="ans" placeholder="ПИШИ ТУТ...">
        <button class="btn" onclick="send()">ОТПРАВИТЬ</button>
    </div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let myName = "", myCode = "";
    const colors = ['#ef5350','#42a5f5','#66bb6a','#ffca28','#ab47bc','#ffa726'];
    const shapes = ['cube','circle','poly'];

    function join() {
        myName = document.getElementById('name').value;
        myCode = document.getElementById('code').value.toUpperCase();
        socket.emit('join-room', { code: myCode, name: myName });
    }

    socket.on('joined-success', () => {
        document.getElementById('join-ui').classList.add('hidden');
        document.getElementById('char-ui').classList.remove('hidden');
        const div = document.getElementById('colors');
        colors.forEach(c => {
            const b = document.createElement('div'); b.className='char-pick'; b.style.background=c;
            b.onclick = () => {
                socket.emit('select-char', { code: myCode, name: myName, char: { shape: shapes[Math.floor(Math.random()*3)], color: c } });
            };
            div.appendChild(b);
        });
    });

    socket.on('char-confirmed', () => {
        document.getElementById('char-ui').classList.add('hidden');
        document.getElementById('wait-ui').classList.remove('hidden');
    });

    socket.on('round-started', d => {
        const myTurn = (myName === d.p1_name || myName === d.p2_name);
        document.getElementById('wait-ui').classList.toggle('hidden', myTurn);
        document.getElementById('answer-ui').classList.toggle('hidden', !myTurn);
        if(myTurn) document.getElementById('qText').innerText = d.q;
    });

    function send() {
        socket.emit('submit-answer', { code: myCode, name: myName, answer: document.getElementById('ans').value });
        document.getElementById('answer-ui').classList.add('hidden');
        document.getElementById('wait-ui').classList.remove('hidden');
    }

    socket.on('error-join', m => alert(m));
</script>
</body>
</html>
