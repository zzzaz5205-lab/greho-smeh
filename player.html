<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ИГРОК</title>
    <style>
        body { font-family: sans-serif; background: #3e2723; color: #fff; text-align: center; margin: 0; }
        .hidden { display: none !important; }
        .header { background: #fbc02d; color: #000; padding: 15px; font-weight: 900; }
        .btn { background: #ef5350; border: 4px solid #000; border-radius: 15px; padding: 20px; width: 90%; color: #fff; font-size: 22px; font-weight: 900; cursor: pointer; box-shadow: 0 6px 0 #000; margin: 10px 0; }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #000; }
        .char-pick { width: 70px; height: 70px; border: 4px solid #fff; display: inline-block; margin: 5px; border-radius: 15px; cursor: pointer; }
        input { width: 85%; padding: 20px; border: 4px solid #000; border-radius: 15px; font-size: 20px; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="header">ROOM: <span id="rCode">...</span></div>
    
    <!-- Экран подключения -->
    <div id="status" style="padding:40px; font-size:24px;">ПОДКЛЮЧЕНИЕ...</div>

    <!-- Экран выбора персонажа -->
    <div id="char-ui" class="hidden">
        <h3>ВЫБЕРИ СВОЙ ЦВЕТ:</h3>
        <div id="colors"></div>
    </div>

    <!-- Экран ожидания -->
    <div id="wait-ui" class="hidden">
        <h1 style="margin-top:100px">ГОТОВ!</h1>
        <p>Смотри на большой экран...</p>
    </div>

    <!-- Экран ответа -->
    <div id="answer-ui" class="hidden">
        <h2 id="qText" style="color:#fbc02d"></h2>
        <div id="inps"></div>
        <button class="btn" onclick="sendAns()" style="background:#4caf50">ОТПРАВИТЬ!</button>
    </div>

    <!-- Экран голосования -->
    <div id="vote-ui" class="hidden">
        <h2>КТО СМЕШНЕЕ?</h2>
        <button id="b1" class="btn" onclick="vote(1)"></button>
        <button id="b2" class="btn" onclick="vote(2)" style="background:#2196f3"></button>
    </div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    const params = new URLSearchParams(window.location.search);
    let name = params.get('name'), code = params.get('code')?.toUpperCase();
    const colors = ['#ef5350','#42a5f5','#66bb6a','#ffca28','#ab47bc','#ffa726','#ec407a','#26c6da'];
    const shapes = ['cube','circle','poly'];

    socket.emit('join-room', { code, name });

    socket.on('joined-success', (data) => {
        document.getElementById('rCode').innerText = data.code;
        document.getElementById('status').classList.add('hidden');
        document.getElementById('char-ui').classList.remove('hidden');
        
        const cDiv = document.getElementById('colors');
        cDiv.innerHTML = "";
        colors.forEach(c => {
            const d = document.createElement('div'); d.className='char-pick'; d.style.background=c;
            d.onclick = () => { 
                socket.emit('select-char', { code, name, char: { shape: shapes[Math.floor(Math.random()*3)], color: c } });
            };
            cDiv.appendChild(d);
        });
    });

    socket.on('char-confirmed', () => {
        document.getElementById('char-ui').classList.add('hidden');
        document.getElementById('wait-ui').classList.remove('hidden');
    });

    socket.on('round-started', d => {
        const myTurn = (name === d.p1_name || name === d.p2_name || d.isFinal);
        document.getElementById('wait-ui').classList.add('hidden');
        document.getElementById('vote-ui').classList.add('hidden');
        document.getElementById('answer-ui').classList.toggle('hidden', !myTurn);
        
        if(myTurn) {
            document.getElementById('qText').innerText = d.q;
            const area = document.getElementById('inps');
            area.innerHTML = d.round === 3 ? '<input class="v" placeholder="1"><input class="v" placeholder="2"><input class="v" placeholder="3">' : '<input class="v" placeholder="Твой ответ...">';
        } else {
            document.getElementById('wait-ui').classList.remove('hidden');
            document.getElementById('wait-ui').innerHTML = "<h1>СМОТРИ НА ЭКРАН!</h1>";
        }
    });

    function sendAns() {
        const v = Array.from(document.querySelectorAll('.v')).map(i=>i.value);
        socket.emit('submit-answer', { code, name, answer: v });
        document.getElementById('answer-ui').classList.add('hidden');
        document.getElementById('wait-ui').classList.remove('hidden');
        document.getElementById('wait-ui').innerHTML = "<h1>ПРИНЯТО!</h1>";
    }

    socket.on('show-voting', d => {
        if(name === d.p1_name || name === d.p2_name) return;
        document.getElementById('wait-ui').classList.add('hidden');
        document.getElementById('vote-ui').classList.remove('hidden');
        document.getElementById('b1').innerText = d.ans1; document.getElementById('b2').innerText = d.ans2;
    });

    function vote(n) {
        socket.emit('cast-vote', { code, voteNum: n });
        document.getElementById('vote-ui').classList.add('hidden');
        document.getElementById('wait-ui').classList.remove('hidden');
        document.getElementById('wait-ui').innerHTML = "<h1>ГОЛОС УЧТЕН!</h1>";
    }
</script>
</body>
</html>
