<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ИГРОК | ГРЕХО-СМЕХ</title>
    <style>
        body { font-family: sans-serif; background: #fbc02d; color: #000; text-align: center; margin: 0; padding: 0; overflow-x: hidden; }
        .hidden { display: none; }
        .top-bar { background: #3e2723; color: #fff; padding: 15px; font-weight: 900; font-size: 20px; }
        .btn { 
            background: #ef5350; color: #fff; width: 90%; padding: 20px; border: 4px solid #000; 
            border-radius: 15px; font-weight: 900; font-size: 22px; box-shadow: 0 6px 0 #000; 
            cursor: pointer; position: relative; z-index: 10; margin: 10px auto; display: block;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #000; }
        input { width: 85%; padding: 15px; border: 3px solid #000; border-radius: 10px; margin: 5px; font-size: 18px; font-weight: bold; }
        .emoji-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; padding: 15px; }
        .emoji-item { font-size: 45px; background: #fff; border: 3px solid #000; border-radius: 15px; width: 65px; height: 65px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        #status { padding: 40px; font-size: 24px; font-weight: 900; }
        #vote-ui { position: relative; z-index: 100; }
    </style>
</head>
<body>
    <div class="top-bar">КОМНАТА: <span id="room-display">...</span></div>
    <div id="status">CONNECTING...</div>

    <!-- ВЫБОР ПЕРСОНАЖА -->
    <div id="emoji-ui" class="hidden">
        <h3>КТО ТЫ СЕГОДНЯ?</h3>
        <div id="grid" class="emoji-grid"></div>
    </div>

    <!-- ВВОД ОТВЕТА -->
    <div id="answer-ui" class="hidden">
        <h3 id="qText" style="background:#fff; border:3px solid #000; padding:15px; margin:10px; border-radius:15px"></h3>
        <div id="inp-area"></div>
        <button class="btn" onclick="sendAns()" style="background:#4caf50; box-shadow: 0 6px 0 #2e7d32;">ОТПРАВИТЬ</button>
    </div>

    <!-- ГОЛОСОВАНИЕ -->
    <div id="vote-ui" class="hidden">
        <h2 style="margin-bottom: 20px;">КТО СМЕШНЕЕ?</h2>
        <button id="b1" class="btn"></button>
        <button id="b2" class="btn" style="background:#2196f3; box-shadow: 0 6px 0 #0d47a1;"></button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let name = localStorage.getItem('pName'), code = localStorage.getItem('pCode');
        
        const emojis = ['🤡','👽','🤖','👻','🐙','🐸','🐷','🍔','🚀','💎','💩','🐼','🦄','🍄','🍕'];

        if(!name) {
            const params = new URLSearchParams(window.location.search);
            name = params.get('name'); code = params.get('code');
            if(name) { localStorage.setItem('pName', name); localStorage.setItem('pCode', code); }
        }

        document.getElementById('room-display').innerText = code || "???";
        socket.emit('join-room', { code, name });

        socket.on('joined-success', () => {
            document.getElementById('status').classList.add('hidden');
            document.getElementById('emoji-ui').classList.remove('hidden');
            const g = document.getElementById('grid'); g.innerHTML = "";
            emojis.forEach(e => {
                const d = document.createElement('div'); d.className='emoji-item'; d.innerText=e;
                d.onclick = () => { socket.emit('select-emoji', { code, name, emoji: e }); document.getElementById('emoji-ui').innerHTML="<h1>ГОТОВ!</h1>"; };
                g.appendChild(d);
            });
        });

        socket.on('round-started', d => {
            let myTurn = (name === d.p1_name || name === d.p2_name);
            document.getElementById('emoji-ui').classList.add('hidden');
            document.getElementById('answer-ui').classList.toggle('hidden', !myTurn);
            document.getElementById('vote-ui').classList.add('hidden');
            document.getElementById('status').classList.toggle('hidden', myTurn);
            document.getElementById('status').innerText = "СМОТРИ НА ЭКРАН ХОСТА!";
            
            if(myTurn) {
                document.getElementById('qText').innerText = d.q;
                const area = document.getElementById('inp-area');
                if (d.round === 3) {
                    area.innerHTML = '<input class="ansV" maxlength="40" placeholder="Ответ 1..."><input class="ansV" maxlength="40" placeholder="Ответ 2..."><input class="ansV" maxlength="40" placeholder="Ответ 3...">';
                } else {
                    area.innerHTML = '<input class="ansV" maxlength="40" placeholder="Твой ответ...">';
                }
            }
        });

        function sendAns() {
            const val = Array.from(document.querySelectorAll('.ansV')).map(i => i.value.trim()).filter(x => x !== "");
            if(val.length === 0) return alert("Напиши хоть что-то!");
            socket.emit('submit-answer', { code, name, answer: val });
            document.getElementById('answer-ui').classList.add('hidden');
            document.getElementById('status').classList.remove('hidden');
            document.getElementById('status').innerText = "ОТПРАВЛЕНО!";
        }

        socket.on('show-voting', d => {
            // Если игрок участвует в дуэли, он не голосует
            if(name === d.p1_name || name === d.p2_name || d.isSolo) {
                document.getElementById('status').classList.remove('hidden');
                document.getElementById('status').innerText = d.isSolo ? "ОДИНОЧНОЕ ВЫСТУПЛЕНИЕ" : "ТВОЙ ОТВЕТ НА ЭКРАНЕ!";
                document.getElementById('vote-ui').classList.add('hidden');
                return;
            }

            document.getElementById('status').classList.add('hidden');
            document.getElementById('vote-ui').classList.remove('hidden');
            
            const b1 = document.getElementById('b1');
            const b2 = document.getElementById('b2');

            b1.innerText = d.ans1;
            b1.onclick = () => { socket.emit('cast-vote', {code, voteNum: 1}); document.getElementById('vote-ui').classList.add('hidden'); };
            
            b2.innerText = d.ans2;
            b2.onclick = () => { socket.emit('cast-vote', {code, voteNum: 2}); document.getElementById('vote-ui').classList.add('hidden'); };
        });

        socket.on('go-to-menu', () => { localStorage.clear(); location.href='index.html'; });
        socket.on('error-join', m => { alert(m); localStorage.clear(); location.href="index.html"; });
    </script>
</body>
</html>
