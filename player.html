<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИГРОК</title>
    <style>
        body { font-family: sans-serif; background: #fbc02d; text-align: center; margin: 0; padding: 10px; }
        .hidden { display: none; }
        .btn { background: #ef5350; color: #fff; width: 95%; padding: 20px; border: 4px solid #000; border-radius: 15px; font-weight: 900; font-size: 20px; margin-top: 10px; box-shadow: 0 6px 0 #000; cursor: pointer; }
        input { width: 90%; padding: 15px; border: 3px solid #000; border-radius: 10px; margin: 5px; font-size: 18px; font-weight: bold; }
        .emoji-item { font-size: 45px; background: #fff; border: 3px solid #000; border-radius: 15px; width: 65px; height: 65px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>
    <div id="status" style="padding:20px; font-weight:900; font-size:24px">CONNECTING...</div>
    <div id="emoji-ui" class="hidden">
        <h3>КТО ТЫ?</h3><div id="grid" style="display:flex; flex-wrap:wrap; justify-content:center; gap:10px"></div>
    </div>
    <div id="answer-ui" class="hidden">
        <h2 id="qText" style="background:#fff; border:4px solid #000; padding:15px; border-radius:15px"></h2>
        <div id="inp-area"></div>
        <button class="btn" onclick="sendAns()" style="background:#4caf50">ОТПРАВИТЬ</button>
    </div>
    <div id="vote-ui" class="hidden"><h2>ГОЛОСУЕМ!</h2><button id="b1" class="btn"></button><button id="b2" class="btn" style="background:#2196f3"></button></div>
<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io(); 
    let name = localStorage.getItem('pName'), code = localStorage.getItem('pCode');
    if(!name){ 
        const p = new URLSearchParams(window.location.search); name = p.get('name'); code = p.get('code'); 
        if(name){ localStorage.setItem('pName', name); localStorage.setItem('pCode', code); } 
    }
    socket.emit('join-room', { code, name });
    socket.on('joined-success', () => {
        document.getElementById('status').classList.add('hidden'); document.getElementById('emoji-ui').classList.remove('hidden');
        const g = document.getElementById('grid'); g.innerHTML = "";
        ['🤡','👽','🤖','👻','🐙','🐸','🐷','🍔','🚀','💎','💩','🐼'].forEach(e => {
            const d = document.createElement('div'); d.className='emoji-item'; d.innerText=e;
            d.onclick = () => { socket.emit('select-emoji', { code, name, emoji: e }); document.getElementById('emoji-ui').innerHTML="<h1>ГОТОВ!</h1>"; };
            g.appendChild(d);
        });
    });
    socket.on('round-started', d => {
        let myTurn = (name === d.p1_name || name === d.p2_name);
        document.getElementById('emoji-ui').classList.add('hidden'); document.getElementById('answer-ui').classList.toggle('hidden', !myTurn);
        document.getElementById('vote-ui').classList.add('hidden'); document.getElementById('status').classList.toggle('hidden', myTurn);
        document.getElementById('status').innerText = "СМОТРИ НА ЭКРАН!";
        if(myTurn){ document.getElementById('qText').innerText = d.q;
            const area = document.getElementById('inp-area');
            area.innerHTML = d.round === 3 ? '<input class="ansV" maxlength="40" placeholder="1..."><input class="ansV" maxlength="40" placeholder="2..."><input class="ansV" maxlength="40" placeholder="3...">' : '<input class="ansV" maxlength="40" placeholder="Твой ответ...">';
        }
    });
    function sendAns(){ const v = Array.from(document.querySelectorAll('.ansV')).map(i=>i.value); socket.emit('submit-answer', { code, name, answer: v }); document.getElementById('answer-ui').classList.add('hidden'); document.getElementById('status').classList.remove('hidden'); }
    socket.on('show-voting', d => {
        if(name === d.p1_name || name === d.p2_name || d.isSolo) return;
        document.getElementById('status').classList.add('hidden'); document.getElementById('vote-ui').classList.remove('hidden');
        document.getElementById('b1').innerText = d.ans1; document.getElementById('b2').innerText = d.ans2;
        document.getElementById('b1').onclick = () => { socket.emit('cast-vote', {code, voteNum:1}); document.getElementById('vote-ui').classList.add('hidden'); };
        document.getElementById('b2').onclick = () => { socket.emit('cast-vote', {code, voteNum:2}); document.getElementById('vote-ui').classList.add('hidden'); };
    });
    socket.on('go-to-menu', () => { localStorage.clear(); location.href='index.html'; });
    socket.on('error-join', m => { alert(m); localStorage.clear(); location.href="index.html"; });
</script></body></html>
