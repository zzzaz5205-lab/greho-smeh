<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ГРЕХО-СМЕХ | PLAYER</title>
    <style>
        body { font-family: sans-serif; background: #3e2723; color: #fff; text-align: center; margin: 0; touch-action: manipulation; }
        .header { background: #fbc02d; color: #000; padding: 15px; font-weight: 900; font-size: 22px; }
        .btn { background: #ef5350; border: 5px solid #000; border-radius: 15px; padding: 20px; width: 90%; color: #fff; font-size: 24px; font-weight: 900; cursor: pointer; box-shadow: 0 6px 0 #000; margin: 10px 0; transition: 0.1s; }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #000; }
        input { width: 85%; padding: 20px; border: 5px solid #000; border-radius: 15px; font-size: 22px; font-weight: bold; margin-top: 15px; text-align: center; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="header">КОД: <span id="rCode">...</span></div>
    <div id="status" style="padding:40px; font-size:24px;">ПОДКЛЮЧЕНИЕ...</div>

    <div id="answer-ui" class="hidden">
        <h2 id="qText" style="color:#fbc02d; padding:10px;"></h2>
        <div id="inps"></div>
        <button class="btn" onclick="send()" style="background:#4caf50">ОТПРАВИТЬ!</button>
    </div>

    <div id="vote-ui" class="hidden">
        <h2 style="font-size:30px;">КТО СМЕШНЕЕ?</h2>
        <button id="b1" class="btn"></button>
        <button id="b2" class="btn" style="background:#2196f3"></button>
    </div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io(); 
    const params = new URLSearchParams(window.location.search);
    let name = params.get('name'), code = params.get('code')?.toUpperCase();

    document.getElementById('rCode').innerText = code;
    socket.emit('join-room', { code, name });

    socket.on('joined-success', () => {
        document.getElementById('status').innerText = "ТЫ В ИГРЕ, " + name + "!";
    });

    socket.on('round-started', d => {
        const myTurn = (name === d.p1_name || name === d.p2_name || d.round === 3);
        document.getElementById('answer-ui').classList.toggle('hidden', !myTurn);
        document.getElementById('vote-ui').classList.add('hidden');
        document.getElementById('status').classList.toggle('hidden', myTurn);
        document.getElementById('status').innerText = "СМОТРИ НА ЭКРАН!";
        
        if(myTurn) {
            document.getElementById('qText').innerText = d.q;
            const area = document.getElementById('inps');
            area.innerHTML = d.round === 3 ? '<input class="v" maxlength="40"><input class="v" maxlength="40"><input class="v" maxlength="40">' : '<input class="v" maxlength="40" placeholder="ТВОЙ ОТВЕТ...">';
        }
    });

    function send() {
        const v = Array.from(document.querySelectorAll('.v')).map(i=>i.value);
        socket.emit('submit-answer', { code, name, answer: v });
        document.getElementById('answer-ui').classList.add('hidden');
        document.getElementById('status').classList.remove('hidden');
        document.getElementById('status').innerText = "ОТВЕТ УЛЕТЕЛ!";
    }

    socket.on('show-voting', d => {
        if(name === d.p1_name || name === d.p2_name) return;
        document.getElementById('status').classList.add('hidden');
        document.getElementById('vote-ui').classList.remove('hidden');
        document.getElementById('b1').innerText = d.ans1;
        document.getElementById('b2').innerText = d.ans2;
        document.getElementById('b1').onclick = () => { socket.emit('cast-vote', {code, voteNum:1}); document.getElementById('vote-ui').classList.add('hidden'); };
        document.getElementById('b2').onclick = () => { socket.emit('cast-vote', {code, voteNum:2}); document.getElementById('vote-ui').classList.add('hidden'); };
    });
</script>
</body>
</html>
