<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ИГРОК | ГРЕХО-СМЕХ</title>
    <style>
        body { font-family: sans-serif; background: #fbc02d; text-align: center; margin: 0; touch-action: none; }
        .hidden { display: none !important; }
        .btn { background: #ef5350; color: #fff; width: 90%; padding: 20px; border: 4px solid #3e2723; border-radius: 15px; font-weight: bold; font-size: 20px; margin-top: 10px; }
        #canvas { background: #fff; border: 4px solid #3e2723; border-radius: 15px; touch-action: none; }
        input { width: 85%; padding: 15px; border: 3px solid #3e2723; border-radius: 10px; font-size: 18px; }
    </style>
</head>
<body>
    <div id="status" style="padding:20px; font-weight:bold;">ПОДКЛЮЧЕНИЕ...</div>

    <div id="emoji-ui" class="hidden">
        <h3>ВЫБЕРИ ГЕРОЯ</h3>
        <div id="grid" style="display:flex; flex-wrap:wrap; justify-content:center; gap:5px;"></div>
    </div>

    <div id="answer-ui" class="hidden">
        <h2 id="qText"></h2>
        <div id="inp-area"></div>
        <button id="rec-btn" class="btn hidden" style="background:#42a5f5;">ЗАПИСАТЬ ГОЛОС</button>
        <button class="btn" onclick="sendAns()" style="background:#4caf50;">ОТПРАВИТЬ</button>
    </div>

    <div id="vote-ui" class="hidden">
        <h2>КТО СМЕШНЕЕ?</h2>
        <div id="v-btns"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io(); 
        const params = new URLSearchParams(window.location.search);
        let myName = params.get('name'), myCode = params.get('code')?.toUpperCase();
        let currentMode = "classic", audioBlob = null;

        socket.emit('join-room', { code: myCode, name: myName });
        socket.on('joined-success', () => {
            document.getElementById('status').classList.add('hidden');
            document.getElementById('emoji-ui').classList.remove('hidden');
            const g = document.getElementById('grid'); g.innerHTML = "";
            ['🤡','👽','🤖','👻','🐙','🐸','🐷','🍔','🚀','💎'].forEach(e => {
                const d = document.createElement('div'); d.style.fontSize="40px"; d.innerText=e;
                d.onclick = () => { socket.emit('select-emoji', { code: myCode, name: myName, emoji: e }); document.getElementById('emoji-ui').innerHTML="<h1>ГОТОВ!</h1>"; };
                g.appendChild(d);
            });
        });

        socket.on('round-started', d => {
            currentMode = d.mode;
            const myTurn = (myName === d.p1_name || myName === d.p2_name);
            document.getElementById('answer-ui').classList.toggle('hidden', !myTurn);
            document.getElementById('emoji-ui').classList.add('hidden');
            if(myTurn) {
                document.getElementById('qText').innerText = d.q;
                const area = document.getElementById('inp-area');
                area.innerHTML = "";
                document.getElementById('rec-btn').classList.add('hidden');
                
                if(currentMode === 'draw') {
                    area.innerHTML = '<canvas id="canvas" width="300" height="300"></canvas><br><button onclick="clearC()">Стереть</button>';
                    initCanvas();
                } else if(currentMode === 'voice') {
                    document.getElementById('rec-btn').classList.remove('hidden');
                    initVoice();
                } else {
                    area.innerHTML = '<input id="ansV" type="text" placeholder="Твой ответ...">';
                }
            }
        });

        // ЛОГИКА РИСОВАЛКИ
        let canvas, ctx, drawing = false;
        function initCanvas() {
            canvas = document.getElementById('canvas'); ctx = canvas.getContext('2d');
            canvas.addEventListener('touchstart', e => { drawing=true; ctx.beginPath(); ctx.moveTo(e.touches[0].clientX-canvas.offsetLeft, e.touches[0].clientY-canvas.offsetTop); e.preventDefault(); });
            canvas.addEventListener('touchmove', e => { if(drawing){ ctx.lineTo(e.touches[0].clientX-canvas.offsetLeft, e.touches[0].clientY-canvas.offsetTop); ctx.lineWidth=5; ctx.stroke(); } e.preventDefault(); });
            canvas.addEventListener('touchend', () => drawing=false);
        }
        function clearC() { ctx.clearRect(0,0,300,300); }

        // ЛОГИКА ВОКАЛА
        async function initVoice() {
            const b = document.getElementById('rec-btn');
            const s = await navigator.mediaDevices.getUserMedia({ audio: true });
            const rec = new MediaRecorder(s);
            let ch = [];
            b.onclick = () => {
                if(rec.state === 'inactive') { rec.start(); b.innerText="СТОП"; b.style.background="red"; }
                else { rec.stop(); b.innerText="ЗАПИСАНО"; b.style.background="green"; }
            };
            rec.ondataavailable = e => ch.push(e.data);
            rec.onstop = () => { const bl = new Blob(ch, {type:'audio/ogg'}); const r = new FileReader(); r.readAsDataURL(bl); r.onloadend = () => audioBlob = r.result; };
        }

        function sendAns() {
            let val = "";
            if(currentMode === 'draw') val = canvas.toDataURL();
            else if(currentMode === 'voice') val = audioBlob;
            else val = document.getElementById('ansV').value;
            socket.emit('submit-answer', { code: myCode, name: myName, answer: val });
            document.body.innerHTML = "<h1>ОТПРАВЛЕНО!</h1>";
        }

        socket.on('show-voting', d => {
            if(myName === d.p1_name || myName === d.p2_name) return;
            document.getElementById('vote-ui').classList.remove('hidden');
            document.getElementById('v-btns').innerHTML = `<button class="btn" onclick="v(1)">${d.type==='classic'?d.ans1:'ВАРИАНТ 1'}</button><button class="btn" onclick="v(2)">${d.type==='classic'?d.ans2:'ВАРИАНТ 2'}</button>`;
        });
        function v(n) { socket.emit('cast-vote', {code:myCode, voteNum:n}); document.getElementById('vote-ui').classList.add('hidden'); }
    </script>
</body>
</html>
