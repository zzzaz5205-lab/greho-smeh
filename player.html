<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ИГРОК | ГРЕХО-СМЕХ</title>
    <style>
        body { font-family: sans-serif; background: #fbc02d; color: #3e2723; text-align: center; margin: 0; overflow-x: hidden; }
        .top-bar { background: #3e2723; color: #fff; padding: 15px; font-weight: 900; font-size: 22px; transform: rotate(-1deg); }
        .btn { background: #ef5350; color: white; width: 90%; padding: 20px; margin: 10px; border: 4px solid #3e2723; border-radius: 15px; font-weight: 900; font-size: 24px; box-shadow: 0 6px 0 #b71c1c; cursor: pointer; }
        .emoji-item { font-size: 40px; background: #fff; border: 3px solid #3e2723; border-radius: 12px; width: 65px; height: 65px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        input { width: 85%; padding: 20px; border: 4px solid #3e2723; border-radius: 15px; font-size: 22px; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="top-bar">КОМНАТА: <span id="room-display">...</span></div>
    
    <div id="emoji-ui" class="hidden">
        <h3>ВЫБЕРИ ПЕРСОНАЖА</h3>
        <div id="grid" style="display:flex; flex-wrap:wrap; justify-content:center; gap:10px; padding:20px;"></div>
    </div>

    <div id="answer-ui" class="hidden">
        <h3 id="qText" style="background:#fff; border:4px solid #3e2723; padding:20px; margin:15px; border-radius:15px; font-size:24px;"></h3>
        <input id="ansV" type="text" placeholder="ТВОЙ ОТВЕТ...">
        <button class="btn" onclick="sendAns()" style="background:#4caf50; box-shadow: 0 6px 0 #2e7d32; margin-top:20px;">ОТПРАВИТЬ</button>
    </div>

    <div id="vote-ui" class="hidden">
        <h2 style="text-transform:uppercase;">КТО СМЕШНЕЕ?</h2>
        <button id="b1" class="btn"></button>
        <button id="b2" class="btn" style="background:#42a5f5; box-shadow: 0 6px 0 #1565c0;"></button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io(); const params = new URLSearchParams(window.location.search);
        const name = params.get('name'), code = params.get('code').toUpperCase();
        document.getElementById('room-display').innerText = code;
        const emojis = ['🤡','👽','🤖','👻','🐙','🐸','🐱','💩','🍔','🚀','💎','🎸','🐼','🐧','🐷'];

        socket.emit('join-room', { code, name });
        socket.on('joined-success', () => {
            document.getElementById('emoji-ui').classList.remove('hidden');
            const g = document.getElementById('grid');
            emojis.forEach(e => {
                const d = document.createElement('div'); d.className='emoji-item'; d.innerText=e;
                d.onclick = () => { socket.emit('select-emoji', { code, emoji: e }); document.getElementById('emoji-ui').innerHTML="<h1>ГОТОВ!</h1>"; };
                g.appendChild(d);
            });
        });

        socket.on('round-started', d => {
            let myTurn = (socket.id === d.p1_id || socket.id === d.p2_id);
            document.getElementById('emoji-ui').classList.add('hidden');
            document.getElementById('answer-ui').classList.toggle('hidden', !myTurn);
            document.getElementById('vote-ui').classList.add('hidden');
            if(myTurn) document.getElementById('qText').innerText = d.q;
        });

        function sendAns() { socket.emit('submit-answer', { code, answer: document.getElementById('ansV').value }); document.getElementById('answer-ui').classList.add('hidden'); }

        socket.on('show-voting', d => {
            if(d.isSolo) return;
            document.getElementById('vote-ui').classList.remove('hidden');
            const btn1 = document.getElementById('b1'); const btn2 = document.getElementById('b2');
            btn1.innerText = d.ans1; btn1.onclick = () => { socket.emit('cast-vote', {code, voteNum:1}); document.getElementById('vote-ui').classList.add('hidden'); };
            btn2.innerText = d.ans2; btn2.onclick = () => { socket.emit('cast-vote', {code, voteNum:2}); document.getElementById('vote-ui').classList.add('hidden'); };
        });
        socket.on('error-join', () => location.href='index.html');
    </script>
</body>
</html>
