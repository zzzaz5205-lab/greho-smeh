<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <style>
        body { font-family: sans-serif; background: #3e2723; color: #fff; text-align: center; }
        .input-group { background: #fff; padding: 15px; border-radius: 15px; border: 5px solid #000; width: 90%; margin: 10px auto; }
        input { width: 100%; border: none; font-size: 20px; font-weight: bold; text-align: center; }
        .btn { background: #4caf50; border: 4px solid #000; border-radius: 15px; padding: 20px; width: 90%; color: #fff; font-size: 24px; font-weight: 900; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="game-ui">
        <h2 id="qText" style="color:#fbc02d"></h2>
        <div id="inp-container"></div>
        <button class="btn" onclick="send()">ОТПРАВИТЬ!</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const params = new URLSearchParams(window.location.search);
        let name = params.get('name'), code = params.get('code');

        socket.emit('join-room', { code, name });

        socket.on('round-started', d => {
            document.body.innerHTML = '<h2>СМОТРИ НА ЭКРАН!</h2>';
            if(name === d.p1_name || name === d.p2_name || d.round === 3) {
                renderInputs(d.round, d.q);
            }
        });

        function renderInputs(round, q) {
            document.body.innerHTML = `<h2 style="color:#fbc02d">${q}</h2><div id="area"></div><button class="btn" onclick="send()">ОТПРАВИТЬ</button>`;
            const area = document.getElementById('area');
            const count = round === 3 ? 3 : 1;
            for(let i=0; i<count; i++) {
                area.innerHTML += `<div class="input-group"><input class="v" maxlength="40" placeholder="Шутка ${i+1}"></div>`;
            }
        }

        function send() {
            const val = Array.from(document.querySelectorAll('.v')).map(i => i.value);
            socket.emit('submit-answer', { code, name, answer: val });
            document.body.innerHTML = "<h1>ПРИНЯТО! ЖДИ...</h1>";
        }
    </script>
</body>
</html>
