<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; background: #3e2723; color: white; text-align: center; }
        .input-box { background: white; border: 4px solid #fbc02d; padding: 20px; border-radius: 15px; width: 80%; margin: 20px auto; }
        input { width: 100%; border: none; font-size: 20px; outline: none; text-align: center; }
        .send-btn { background: #ef5350; color: white; border: none; padding: 20px 40px; border-radius: 10px; font-size: 20px; font-weight: 900; box-shadow: 0 5px 0 #b71c1c; }
    </style>
</head>
<body>
    <h2 id="roomDisplay">ROOM: ...</h2>
    <div id="game-ui">
        <div class="input-box">
            <input type="text" id="answerInput" placeholder="ТВОЙ ОТВЕТ...">
        </div>
        <button class="send-btn" onclick="send()">ОТПРАВИТЬ!</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const params = new URLSearchParams(window.location.search);
        const name = params.get('name'), code = params.get('code');
        document.getElementById('roomDisplay').innerText = `КОД: ${code}`;

        socket.emit('join-room', { code, name });

        function send() {
            const answer = document.getElementById('answerInput').value;
            socket.emit('submit-answer', { code, name, answer });
            document.body.innerHTML = "<h1>СМОТРИ НА ЭКРАН!</h1>";
        }
    </script>
</body>
</html>
