<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ГРЕХО-СМЕХ | ИГРОК</title>
    <style>
        body { font-family: sans-serif; background: #fbc02d; color: #3e2723; text-align: center; margin: 0; overflow: hidden; touch-action: manipulation; }
        .screen { display: none; padding: 20px; box-sizing: border-box; height: 100vh; flex-direction: column; align-items: center; justify-content: center; }
        .active { display: flex; }
        .hidden { display: none !important; }
        .btn { background: #ef5350; color: white; width: 95%; padding: 15px; margin: 10px auto; border: 4px solid #3e2723; border-radius: 12px; font-weight: 900; font-size: 20px; box-shadow: 0 4px 0 #3e2723; cursor: pointer; }
        input { width: 90%; padding: 12px; border: 3px solid #3e2723; border-radius: 10px; font-size: 18px; font-weight: bold; margin-bottom: 8px; outline: none; }
        .funny-gif { width: 50%; max-width: 200px; border: 4px solid #3e2723; border-radius: 15px; }
    </style>
</head>
<body>
    <!-- ЭКРАН ОЖИДАНИЯ/ЛОББИ -->
    <div id="screen-wait" class="screen active">
        <h2>ТЫ В ИГРЕ!</h2>
        <p>Выбери персонажа на большом экране...</p>
        <div id="emoji-grid" style="display:flex; flex-wrap:wrap; justify-content:center;"></div>
        <img src="cat.gif" class="funny-gif" style="margin-top:20px">
    </div>

    <!-- ЭКРАН ОТВЕТА -->
    <div id="screen-answer" class="screen">
        <div id="qText" style="background:#fff; border:3px solid #3e2723; padding:10px; border-radius:10px; margin-bottom:15px; font-weight:bold;"></div>
        <div id="inp-area"></div>
        <button class="btn" onclick="sendAns()" style="background:#4caf50;">ОТПРАВИТЬ</button>
    </div>

    <!-- ЭКРАН ГОЛОСОВАНИЯ -->
    <div id="screen-vote" class="screen">
        <h2>ГОЛОСУЕМ!</h2>
        <div id="vote-btns"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const params = new URLSearchParams(window.location.search);
        let myName = params.get('name') || localStorage.getItem('pName');
        let myCode = (params.get('code') || localStorage.getItem('pCode'))?.toUpperCase();
        const googleId = params.get('googleId');

        window.onbeforeunload = () => "Игра прервется!";

        function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

        socket.emit('join-room', { code: myCode, name: myName, googleId });

        socket.on('joined-success', d => {
            const g = document.getElementById('emoji-grid');
            g.innerHTML = "";
            ['🤡','👽','🤖','👻','🐙','🐸','🐷','🍔','🚀','💎'].forEach(e => {
                const d = document.createElement('div'); d.style.fontSize="40px"; d.style.padding="10px"; d.innerText = e;
                d.onclick = () => { socket.emit('select-emoji', { code: myCode, name: myName, emoji: e }); g.innerHTML="<h3>ГОТОВ!</h3>"; };
                g.appendChild(d);
            });
            if(d.gameStarted) showScreen('screen-wait');
        });

        socket.on('round-started', d => {
            if(myName === d.p1_name || myName === d.p2_name) {
                showScreen('screen-answer');
                document.getElementById('qText').innerText = d.q;
                const area = document.getElementById('inp-area');
                area.innerHTML = d.round === 3 ? '<input class="ansV"><input class="ansV"><input class="ansV">' : '<input class="ansV">';
            } else { showScreen('screen-wait'); }
        });

        function sendAns() {
            const v = Array.from(document.querySelectorAll('.ansV')).map(i => i.value.trim());
            socket.emit('submit-answer', { code: myCode, name: myName, answer: v });
            showScreen('screen-wait');
        }

        socket.on('show-voting', d => {
            if(myName === d.p1_name || myName === d.p2_name || d.isSolo) { showScreen('screen-wait'); return; }
            showScreen('screen-vote');
            const format = (a) => Array.isArray(a) ? a.join(' / ') : a;
            document.getElementById('vote-btns').innerHTML = `
                <button class="btn" onclick="v(1)">${format(d.ans1)}</button>
                <button class="btn" onclick="v(2)" style="background:#42a5f5">${format(d.ans2)}</button>
            `;
        });

        function v(n) { socket.emit('cast-vote', { code: myCode, voteNum: n }); showScreen('screen-wait'); }
        socket.on('go-to-menu', () => location.href = 'index.html');
    </script>
</body>
</html>
