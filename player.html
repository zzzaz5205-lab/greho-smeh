<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ИГРОК | ГРЕХО-СМЕХ</title>
    <link rel="icon" href="https://fav.farm/🎮" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap');
        
        body { 
            font-family: sans-serif; 
            background: #fbc02d; 
            color: #3e2723; 
            text-align: center; 
            margin: 0; 
            overflow: hidden; 
            touch-action: manipulation; 
        }

        .top-bar { 
            background: #3e2723; 
            color: #fff; 
            padding: 10px; 
            font-weight: 900; 
            font-size: 18px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        #p-timer { 
            font-family: 'Montserrat', sans-serif; 
            color: #ef5350; 
            background: #fff; 
            padding: 2px 10px; 
            border-radius: 5px; 
            min-width: 30px;
        }

        .screen { 
            display: block; 
            padding: 20px; 
            box-sizing: border-box; 
            height: calc(100vh - 50px); 
            overflow-y: auto; 
        }

        .hidden { display: none !important; }

        .btn { 
            background: #ef5350; 
            color: white; 
            width: 95%; 
            padding: 15px; 
            margin: 10px auto; 
            border: 4px solid #3e2723; 
            border-radius: 12px; 
            font-weight: 900; 
            font-size: 20px; 
            box-shadow: 0 4px 0 #3e2723; 
            cursor: pointer; 
            text-transform: uppercase;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 0 0; }

        input { 
            width: 90%; 
            padding: 12px; 
            border: 3px solid #3e2723; 
            border-radius: 10px; 
            font-size: 18px; 
            font-weight: bold; 
            margin-bottom: 8px; 
            outline: none; 
            text-align: center;
        }

        .emoji-item { font-size: 40px; padding: 10px; cursor: pointer; border: 2px solid transparent; }
        .emoji-item:active { transform: scale(1.2); }

        .q-display { 
            background: #fff; 
            border: 3px solid #3e2723; 
            padding: 10px; 
            border-radius: 10px; 
            margin-bottom: 15px; 
            font-weight: bold; 
            font-size: 18px;
            transform: rotate(-1deg);
        }

        /* ГИГАНТСКАЯ ГИФКА */
        .funny-gif { 
            width: 95%; 
            max-width: 600px; 
            border: 6px solid #3e2723; 
            border-radius: 20px; 
            margin-top: 15px; 
            box-shadow: 15px 15px 0 rgba(0,0,0,0.1);
        }

        /* СТОЛБИКИ ВНУТРИ КНОПОК */
        .vote-col {
            display: flex;
            flex-direction: column;
            gap: 4px;
            align-items: center;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <span>ROOM: <span id="room-display">...</span></span>
        <div id="p-timer" style="visibility: hidden;">00</div>
    </div>
    
    <!-- СТАТУС -->
    <div id="status" class="screen">
        <h2 style="margin-top: 50px;">ПОДКЛЮЧЕНИЕ...</h2>
    </div>

    <!-- ВЫБОР ГЕРОЯ -->
    <div id="emoji-ui" class="screen hidden">
        <h2 style="font-family: 'Montserrat';">КТО ТЫ?</h2>
        <div id="grid" style="display:flex; flex-wrap:wrap; justify-content:center;"></div>
    </div>

    <!-- ОЖИДАНИЕ -->
    <div id="wait-ui" class="screen hidden">
        <h2 id="status-msg" style="font-family: 'Montserrat';">Смотри на экран!</h2>
        <img src="cat.gif" class="funny-gif">
    </div>

    <!-- ВВОД ОТВЕТА -->
    <div id="answer-ui" class="screen hidden">
        <div id="qText" class="q-display"></div>
        <div id="inp-area"></div>
        <button class="btn" onclick="sendAns()" style="background:#4caf50; box-shadow: 0 4px 0 #2e7d32;">ОТПРАВИТЬ</button>
    </div>

    <!-- ГОЛОСОВАНИЕ -->
    <div id="vote-ui" class="screen hidden">
        <h2 style="font-family: 'Montserrat';">ГОЛОСУЕМ!</h2>
        <div id="vote-btns"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const params = new URLSearchParams(window.location.search);
        
        // Восстановление сессии
        let myName = params.get('name') || localStorage.getItem('pName');
        let myCode = (params.get('code') || localStorage.getItem('pCode'))?.toUpperCase();

        if (!myName || !myCode) { location.href = 'index.html'; }
        localStorage.setItem('pName', myName);
        localStorage.setItem('pCode', myCode);

        document.getElementById('room-display').innerText = myCode;

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if (id !== 'answer-ui' && id !== 'vote-ui') {
                document.getElementById('p-timer').style.visibility = 'hidden';
            }
        }

        let ptInt;
        function startTimer(sec) {
            clearInterval(ptInt);
            let tl = sec;
            const el = document.getElementById('p-timer');
            el.style.visibility = 'visible';
            el.innerText = tl;
            ptInt = setInterval(() => {
                tl--;
                el.innerText = tl;
                if(tl <= 0) { clearInterval(ptInt); el.style.visibility = 'hidden'; }
            }, 1000);
        }

        socket.emit('join-room', { code: myCode, name: myName });

        socket.on('joined-success', () => {
            showScreen('emoji-ui');
            const g = document.getElementById('grid');
            g.innerHTML = "";
            const emojis = ['🤡','👽','🤖','👻','🐙','🐸','🐱','🍌','💩','🦄','🐼','🦊','🐷','🐧','🦖'];
            emojis.forEach(e => {
                const d = document.createElement('div');
                d.className = 'emoji-item';
                d.innerText = e;
                d.onclick = () => {
                    socket.emit('select-emoji', { code: myCode, name: myName, emoji: e });
                    document.getElementById('status-msg').innerText = "Ты в игре! Ждём остальных...";
                    showScreen('wait-ui');
                };
                g.appendChild(d);
            });
        });

        socket.on('round-started', d => {
            const myTurn = (myName === d.p1_name || myName === d.p2_name);
            if(myTurn) {
                showScreen('answer-ui');
                startTimer(d.time);
                document.getElementById('qText').innerText = d.q;
                const area = document.getElementById('inp-area');
                area.innerHTML = d.round === 3 ? 
                    '<input class="ansV" maxlength="40" placeholder="Шутка 1..."><input class="ansV" maxlength="40" placeholder="Шутка 2..."><input class="ansV" maxlength="40" placeholder="Шутка 3...">' : 
                    '<input class="ansV" maxlength="40" placeholder="Твой ответ...">';
            } else {
                document.getElementById('status-msg').innerText = "Смотри на экран!";
                showScreen('wait-ui');
            }
        });

        function sendAns() {
            const val = Array.from(document.querySelectorAll('.ansV')).map(i => i.value.trim());
            socket.emit('submit-answer', { code: myCode, name: myName, answer: val });
            document.getElementById('status-msg').innerText = "Ответ принят! Ждём...";
            showScreen('wait-ui');
        }

        socket.on('show-voting', d => {
            if(myName === d.p1_name || myName === d.p2_name || d.isSolo || d.bothEmpty) {
                document.getElementById('status-msg').innerText = d.isSolo ? "ОДИНОЧНОЕ ВЫСТУПЛЕНИЕ" : "ТВОЙ ОТВЕТ НА ЭКРАНЕ!";
                showScreen('wait-ui');
                return;
            }
            showScreen('vote-ui');
            startTimer(d.time);

            const format = (a) => {
                if (!Array.isArray(a)) return a;
                return `<div class="vote-col">${a.map(x => `<span>${x}</span>`).join('')}</div>`;
            };

            document.getElementById('vote-btns').innerHTML = `
                <button class="btn" onclick="vote(1)">${format(d.ans1)}</button>
                <button class="btn" onclick="vote(2)" style="background:#42a5f5; box-shadow: 0 4px 0 #1565c0;">${format(d.ans2)}</button>
            `;
        });

        function vote(n) {
            socket.emit('cast-vote', { code: myCode, voteNum: n });
            document.getElementById('status-msg').innerText = "Голос учтён!";
            showScreen('wait-ui');
        }

        socket.on('go-to-menu', () => { localStorage.clear(); location.href = 'index.html'; });
        socket.on('error-join', m => { alert(m); location.href = 'index.html'; });
    </script>
</body>
</html>
