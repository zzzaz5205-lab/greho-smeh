<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ИГРОК | ГРЕХО-СМЕХ</title>
    <link rel="icon" href="https://fav.farm/🎮" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap');
        
        body { 
            font-family: sans-serif; 
            background: #fbc02d; 
            color: #3e2723; 
            text-align: center; 
            margin: 0; 
            overflow: hidden;
            touch-action: manipulation;
        }

        /* ТАЙМЕР В УГЛУ */
        #p-timer { 
            font-family: 'Roboto Mono', monospace; 
            font-size: 24px; 
            color: #ef5350; 
            background: #fff; 
            padding: 2px 12px; 
            border-radius: 8px; 
            border: 2px solid #3e2723;
            font-weight: 900;
        }

        .top-bar { 
            background: #3e2723; 
            color: #fff; 
            padding: 10px 15px; 
            font-weight: 900; 
            font-size: 18px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            font-family: 'Montserrat', sans-serif;
        }

        .screen { 
            display: block; 
            padding: 20px; 
            box-sizing: border-box; 
            height: calc(100vh - 55px); 
            overflow-y: auto; 
        }

        .hidden { display: none !important; }

        /* КНОПКИ В СТИЛЕ JACKBOX */
        .btn { 
            background: #ef5350; 
            color: white; 
            width: 95%; 
            padding: 15px; 
            margin: 10px auto; 
            border: 4px solid #3e2723; 
            border-radius: 12px; 
            font-weight: 900; 
            font-size: 20px; 
            box-shadow: 0 5px 0 #3e2723; 
            cursor: pointer;
            text-transform: uppercase;
            font-family: 'Montserrat', sans-serif;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #3e2723; }

        /* ИНПУТЫ */
        input { 
            width: 90%; 
            padding: 15px; 
            border: 3px solid #3e2723; 
            border-radius: 12px; 
            font-size: 18px; 
            font-weight: bold; 
            margin-bottom: 10px; 
            outline: none; 
            box-sizing: border-box;
            text-align: center;
        }

        /* ГЕРОИ */
        .emoji-grid { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 8px; 
            padding: 10px; 
        }
        .emoji-item { 
            font-size: 40px; 
            background: #fff; 
            border: 3px solid #3e2723; 
            border-radius: 15px; 
            width: 65px; 
            height: 65px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer;
            transition: 0.1s;
        }
        .emoji-item:active { transform: scale(0.9); }

        .q-display { 
            background: #fff; 
            border: 4px solid #3e2723; 
            padding: 15px; 
            margin-bottom: 20px; 
            border-radius: 15px; 
            font-size: 20px; 
            font-weight: 900; 
            transform: rotate(-1deg);
        }

        /* ГИГАНТСКАЯ ГИФКА */
        .funny-gif { 
            width: 100%; 
            max-width: 500px; 
            border: 6px solid #3e2723; 
            border-radius: 20px; 
            margin-top: 15px; 
            box-shadow: 10px 10px 0 rgba(0,0,0,0.1);
        }

        #status-msg { font-size: 22px; font-weight: 900; margin-top: 20px; font-family: 'Montserrat'; }

        /* СТОЛБИКИ В КНОПКАХ ГОЛОСОВАНИЯ */
        .vote-content {
            display: flex;
            flex-direction: column;
            gap: 5px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <span>ROOM: <span id="room-display">...</span></span>
        <div id="p-timer" style="display:none">00</div>
    </div>
    
    <!-- ПОДКЛЮЧЕНИЕ -->
    <div id="status" class="screen">
        <h2 style="margin-top: 50px;">ПОДКЛЮЧЕНИЕ...</h2>
    </div>

    <!-- ЭКРАН 1: ВЫБОР ГЕРОЯ -->
    <div id="emoji-ui" class="screen hidden">
        <h2 id="ui-choose" style="font-family: 'Montserrat';">КТО ТЫ СЕГОДНЯ?</h2>
        <div id="grid" class="emoji-grid"></div>
    </div>

    <!-- ЭКРАН 2: ОЖИДАНИЕ (С ГИФКОЙ) -->
    <div id="wait-ui" class="screen hidden">
        <div id="status-msg">Твой ответ на экране!</div>
        <img src="cat.gif" class="funny-gif">
    </div>

    <!-- ЭКРАН 3: ВВОД ОТВЕТА -->
    <div id="answer-ui" class="screen hidden">
        <div id="qText" class="q-display"></div>
        <div id="inp-area"></div>
        <button class="btn" id="ui-send" onclick="sendAns()" style="background:#4caf50; box-shadow: 0 5px 0 #2e7d32;">ОТПРАВИТЬ</button>
    </div>

    <!-- ЭКРАН 4: ГОЛОСОВАНИЕ -->
    <div id="vote-ui" class="screen hidden">
        <h2 id="ui-vote-title" style="font-family: 'Montserrat';">КТО СМЕШНЕЕ?</h2>
        <div id="vote-btns-container">
            <button id="b1" class="btn"></button>
            <button id="b2" class="btn" style="background:#42a5f5; box-shadow: 0 5px 0 #1565c0;"></button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const params = new URLSearchParams(window.location.search);
        
        // Получаем данные или восстанавливаем после рефреша
        let myName = params.get('name') || localStorage.getItem('pName');
        let myCode = (params.get('code') || localStorage.getItem('pCode'))?.toUpperCase();

        if (!myName || !myCode) { location.href = 'index.html'; }

        // Сохраняем в память телефона
        localStorage.setItem('pName', myName);
        localStorage.setItem('pCode', myCode);

        document.getElementById('room-display').innerText = myCode;

        const emojis = ['🤡','👽','🤖','👻','🐙','🐸','🐱','🍌','💩','🦄','🐼','🦊','🐷','🐧','🦖','🍦','🍔','🍕','🎸','🚀','💎','🎲','🍄','🧶','🦷'];

        const langData = {
            ru: { choose: "ВЫБЕРИ ГЕРОЯ", send: "ОТПРАВИТЬ", vote: "КТО СМЕШНЕЕ?", wait: "Смотри на экран!" },
            en: { choose: "CHOOSE HERO", send: "SEND", vote: "WHO IS FUNNIER?", wait: "Watch the TV!" }
        };

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if (id !== 'answer-ui' && id !== 'vote-ui') {
                document.getElementById('p-timer').style.display = 'none';
            }
        }

        // Таймер
        let ptInt;
        function startTimer(sec) {
            clearInterval(ptInt);
            let tl = sec;
            const el = document.getElementById('p-timer');
            el.style.display = 'block';
            el.innerText = tl;
            ptInt = setInterval(() => {
                tl--;
                el.innerText = (tl < 10 ? "0" + tl : tl);
                if(tl <= 0) { 
                    clearInterval(ptInt); 
                    el.style.display = 'none';
                }
            }, 1000);
        }

        // Вход
        socket.emit('join-room', { code: myCode, name: myName });

        socket.on('joined-success', () => {
            showScreen('emoji-ui');
            const g = document.getElementById('grid');
            g.innerHTML = "";
            emojis.forEach(e => {
                const d = document.createElement('div');
                d.className = 'emoji-item';
                d.innerText = e;
                d.onclick = () => {
                    socket.emit('select-emoji', { code: myCode, name: myName, emoji: e });
                    document.getElementById('status-msg').innerText = "Ждём начала игры...";
                    showScreen('wait-ui');
                };
                g.appendChild(d);
            });
        });

        socket.on('round-started', d => {
            const myTurn = (myName === d.p1_name || myName === d.p2_name);
            const t = langData[d.settings?.lang || 'ru'];

            if(myTurn) {
                showScreen('answer-ui');
                startTimer(d.time);
                document.getElementById('qText').innerText = d.q;
                document.getElementById('ui-send').innerText = t.send;
                
                const area = document.getElementById('inp-area');
                if (d.round === 3) {
                    area.innerHTML = `
                        <input class="ansV" maxlength="40" placeholder="1...">
                        <input class="ansV" maxlength="40" placeholder="2...">
                        <input class="ansV" maxlength="40" placeholder="3...">
                    `;
                } else {
                    area.innerHTML = '<input class="ansV" maxlength="40" placeholder="Пиши шутку...">';
                }
            } else {
                document.getElementById('status-msg').innerText = t.wait;
                showScreen('wait-ui');
            }
        });

        function sendAns() {
            const inps = Array.from(document.querySelectorAll('.ansV'));
            const values = inps.map(i => i.value.trim());
            
            socket.emit('submit-answer', { code: myCode, name: myName, answer: values });
            document.getElementById('status-msg').innerText = "Принято! Ждём остальных.";
            showScreen('wait-ui');
        }

        socket.on('show-voting', d => {
            const inDuel = (myName === d.p1_name || myName === d.p2_name);
            const t = langData[d.settings?.lang || 'ru'];

            if(inDuel || d.isSolo || d.bothEmpty) {
                document.getElementById('status-msg').innerText = d.isSolo ? "ОДИНОЧНОЕ ВЫСТУПЛЕНИЕ" : "ТВОЙ ОТВЕТ НА ЭКРАНЕ!";
                showScreen('wait-ui');
                return;
            }

            showScreen('vote-ui');
            startTimer(d.time);
            document.getElementById('ui-vote-title').innerText = t.vote;

            const format = (a) => {
                if (!Array.isArray(a)) return a;
                return `<div class="vote-content">${a.map(x => `<span>${x}</span>`).join('')}</div>`;
            };

            const b1 = document.getElementById('b1');
            const b2 = document.getElementById('b2');

            b1.innerHTML = format(d.ans1);
            b1.onclick = () => { socket.emit('cast-vote', { code: myCode, voteNum: 1 }); showScreen('wait-ui'); };
            
            b2.innerHTML = format(d.ans2);
            b2.onclick = () => { socket.emit('cast-vote', { code: myCode, voteNum: 2 }); showScreen('wait-ui'); };
        });

        socket.on('go-to-menu', () => {
            localStorage.clear();
            location.href = 'index.html';
        });

        socket.on('error-join', m => {
            alert(m);
            localStorage.clear();
            location.href = 'index.html';
        });
    </script>
</body>
</html>
