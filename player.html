<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ИГРОК</title>
    <style>
        body { font-family: sans-serif; background: #1a1a2e; color: white; text-align: center; margin: 0; touch-action: none; overflow: hidden; }
        .btn { background: #e94560; color: white; width: 90%; padding: 18px; margin: 10px; border: none; border-radius: 15px; font-weight: bold; font-size: 22px; }
        .hidden { display: none; }
        .emoji-grid { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; }
        .emoji-item { font-size: 55px; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="status" style="padding:40px; font-size:24px;">Подключение...</div>
    <div id="emoji-ui" class="hidden">
        <h3>ВЫБЕРИ ПЕРСОНАЖА:</h3>
        <div class="emoji-grid">
            <div class="emoji-item" onclick="selEm('🤡')">🤡</div><div class="emoji-item" onclick="selEm('👽')">👽</div>
            <div class="emoji-item" onclick="selEm('🤖')">🤖</div><div class="emoji-item" onclick="selEm('👻')">👻</div>
            <div class="emoji-item" onclick="selEm('🐙')">🐙</div><div class="emoji-item" onclick="selEm('🐸')">🐸</div>
        </div>
    </div>
    <div id="answer-ui" class="hidden">
        <div id="qText" style="padding:15px; font-weight:bold; font-size:20px;"></div>
        <div id="inp-area"></div>
        <button id="rec-btn" class="btn hidden" style="background:#f1c40f">ЗАПИСАТЬ ГОЛОС</button>
        <button class="btn" onclick="sendAns()" style="background:#27ae60">ОТПРАВИТЬ</button>
    </div>
    <div id="vote-ui" class="hidden">
        <h3>КТО СМЕШНЕЕ?</h3>
        <button id="b1" class="btn" onclick="vote(1)"></button>
        <button id="b2" class="btn" onclick="vote(2)" style="background:#3498db"></button>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io(); const params = new URLSearchParams(window.location.search);
        const name = params.get('name'), code = params.get('code');
        if (!name || !code) { location.href = 'index.html'; }
        let myMode = "", audioBlob = null, isRec = false, recT;

        socket.emit('join-room', { code, name });
        socket.on('joined-success', () => { document.getElementById('status').classList.add('hidden'); document.getElementById('emoji-ui').classList.remove('hidden'); });
        function selEm(e) { socket.emit('select-emoji', { code, emoji: e }); document.getElementById('emoji-ui').innerHTML = `<h3>ЖДЁМ ХОСТА... ${e}</h3>`; }

        socket.on('round-started', d => {
            myMode = d.mode; let myTurn = (socket.id === d.p1_id || socket.id === d.p2_id);
            document.getElementById('emoji-ui').classList.add('hidden');
            document.getElementById('answer-ui').classList.toggle('hidden', !myTurn);
            document.getElementById('vote-ui').classList.add('hidden');
            if(myTurn) {
                document.getElementById('qText').innerText = d.q;
                const area = document.getElementById('inp-area');
                const rb = document.getElementById('rec-btn'); rb.classList.toggle('hidden', myMode!=='voice');
                area.innerHTML = (myMode==='draw') ? '<canvas id="canv" width="300" height="300" style="background:white"></canvas>' : (myMode==='voice'?'': '<input id="ansV" type="text" style="width:85%; padding:15px; border-radius:10px;">');
                if(myMode==='voice') initVoice();
            }
        });

        function initVoice() {
            const b = document.getElementById('rec-btn'); let rec;
            b.onclick = async () => {
                if(!isRec) {
                    const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                    rec = new MediaRecorder(s); let ch = [];
                    rec.ondataavailable = e => ch.push(e.data);
                    rec.onstop = () => { 
                        const bl = new Blob(ch, { type: 'audio/ogg; codecs=opus' }); 
                        const r = new FileReader(); r.readAsDataURL(bl); 
                        r.onloadend = () => { audioBlob = r.result; b.innerText = "ЗАПИСАНО! ✅"; b.style.background="#27ae60"; };
                    };
                    rec.start(); isRec = true; b.innerText = "СТОП (МАКС 10 СЕК)"; b.style.background="#ff0000";
                    recT = setTimeout(() => { if(isRec) rec.stop(); isRec=false; }, 10000);
                } else { clearTimeout(recT); rec.stop(); isRec = false; }
            };
        }
        function sendAns() {
            let v = (myMode==='voice') ? audioBlob : (myMode==='draw' ? document.getElementById('canv').toDataURL() : document.getElementById('ansV').value);
            socket.emit('submit-answer', { code, answer: v });
            document.getElementById('answer-ui').classList.add('hidden'); document.getElementById('status').classList.remove('hidden'); document.getElementById('status').innerText = "ПРИНЯТО!";
        }
        socket.on('show-voting', d => {
            if(d.isSolo) return; document.getElementById('status').classList.add('hidden'); document.getElementById('vote-ui').classList.remove('hidden');
            document.getElementById('b1').innerText = d.type==='classic' ? d.ans1 : "ВАРИАНТ 1";
            document.getElementById('b2').innerText = d.type==='classic' ? d.ans2 : "ВАРИАНТ 2";
        });
        function vote(n) { socket.emit('cast-vote', { code, voteNum: n }); document.getElementById('vote-ui').classList.add('hidden'); document.getElementById('status').classList.remove('hidden'); }
        socket.on('go-to-menu', () => location.href='index.html');
    </script>
</body>
</html>
