<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ЭКРАН ХОСТА</title>
    <style>
        body { font-family: sans-serif; background: #1a1a2e; color: white; text-align: center; margin: 0; overflow: hidden; }
        #lobby, #game, #final { display: none; padding: 20px; }
        #lobby { display: block; }
        .logo { font-size: 60px; color: #e94560; margin: 20px; font-weight: bold; }
        .ans-card { background: #0f3460; padding: 25px; border-radius: 20px; width: 42%; border: 5px solid #e94560; font-size: 28px; min-height: 200px; display: inline-block; vertical-align: top; margin: 10px; }
        .ans-card.solo { background: #444; border-color: #888; width: 80%; }
        img { max-width: 100%; border-radius: 10px; background: white; }
    </style>
</head>
<body>
<div id="lobby">
    <div class="logo">ГРЕХО-СМЕХ</div>
    <h1 id="roomCode" style="background:#0f3460; padding:15px; border:3px solid #e94560; display:inline-block; border-radius:15px;">КОД: ...</h1><br>
    <select id="gameMode" style="padding:15px; font-size:20px; border-radius:10px; margin:20px;">
        <option value="classic">Режим: Грехо-Смех</option>
        <option value="text">Режим: Смехо-Текст</option>
        <option value="draw">Режим: Рисовалка</option>
    </select><br>
    <div id="playerList"></div><br>
    <button onclick="startGame()" style="padding:20px 50px; background:#e94560; color:white; border:none; border-radius:50px; font-size:24px; font-weight:bold; cursor:pointer;">НАЧАТЬ</button>
</div>

<div id="game">
    <h2 id="qText" style="font-size: 40px; margin: 30px;"></h2>
    <div id="voting" style="display:none;">
        <div id="card1" class="ans-card"></div>
        <div id="card2" class="ans-card" style="border-color:#3498db"></div>
    </div>
</div>

<div id="final">
    <h1 style="font-size: 80px;">🏆 ПОБЕДИТЕЛЬ: <br><span id="winner" style="color:#f1c40f"></span></h1>
    <button onclick="location.reload()" style="padding:20px; background:#e94560; color:white; border-radius:15px; border:none;">В МЕНЮ</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let code = "";

    function speak(text, callback) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.pitch = 0.5; msg.rate = 0.9;
        msg.onend = callback;
        window.speechSynthesis.speak(msg);
    }

    socket.emit('create-room');
    socket.on('room-created', c => { code = c; document.getElementById('roomCode').innerText = "КОД: " + c; });
    socket.on('player-joined', d => { document.getElementById('playerList').innerHTML += `<div style="display:inline-block; background:#e94560; padding:10px; margin:5px; border-radius:20px;">${d.emoji} ${d.name}</div>`; });

    function startGame() { socket.emit('start-game', { code, mode: document.getElementById('gameMode').value }); }

    socket.on('round-started', data => {
        document.getElementById('lobby').style.display = "none";
        document.getElementById('game').style.display = "block";
        document.getElementById('voting').style.display = "none";
        document.getElementById('qText').innerText = data.q;
        speak(data.q);
    });

    socket.on('show-voting', data => {
        document.getElementById('voting').style.display = "block";
        const c1 = document.getElementById('card1');
        const c2 = document.getElementById('card2');
        c1.className = data.isSolo ? "ans-card solo" : "ans-card";
        c2.style.display = data.isSolo ? "none" : "inline-block";

        c1.innerHTML = data.type === 'draw' ? `<img src="${data.ans1}">` : data.ans1;
        if (!data.isSolo) c2.innerHTML = data.type === 'draw' ? `<img src="${data.ans2}">` : data.ans2;

        if (data.isSolo) {
            speak("Одиночное выступление. Вариант игрока:", () => { if(data.type !== 'draw') speak(data.ans1); });
        } else {
            speak("Первый вариант...", () => {
                if(data.type !== 'draw') speak(data.ans1, () => {
                    setTimeout(() => speak("Второй вариант...", () => { if(data.type !== 'draw') speak(data.ans2); }), 1000);
                });
            });
        }
    });

    socket.on('voting-results', data => {
        document.getElementById('card1').innerHTML += `<br><small>${data.p1_emoji} ${data.p1_name}</small>`;
        if(!data.isSolo) document.getElementById('card2').innerHTML += `<br><small>${data.p2_emoji} ${data.p2_name}</small>`;
    });

    socket.on('final-results', data => {
        document.getElementById('game').style.display = "none";
        document.getElementById('final').style.display = "block";
        document.getElementById('winner').innerText = data.players[0].emoji + " " + data.players[0].name;
        speak("Победил " + data.players[0].name);
        setTimeout(() => socket.emit('kick-all', code), 10000);
    });
</script>
</body>
</html>
