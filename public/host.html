<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ЭКРАН ХОСТА | ГРЕХО-СМЕХ</title>
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #1a1a2e; color: white; text-align: center; margin: 0; overflow: hidden; }
        #lobby, #game, #final { display: none; padding: 20px; }
        #lobby { display: block; }
        
        /* КОД В УГЛУ */
        .top-info { position: absolute; top: 20px; right: 20px; background: rgba(233, 69, 96, 0.8); padding: 10px 20px; border-radius: 10px; font-weight: bold; border: 2px solid white; z-index: 100; font-family: monospace; font-size: 24px; }

        .logo { font-size: 60px; color: #e94560; margin: 20px; font-weight: bold; }
        
        /* КАРТОЧКИ ОТВЕТОВ */
        .ans-card { background: #0f3460; padding: 20px; border-radius: 20px; width: 45%; border: 5px solid #e94560; font-size: 32px; min-height: 300px; display: inline-block; vertical-align: top; margin: 10px; box-sizing: border-box; }
        .ans-card.solo { width: 70%; background: #444; border-color: #f1c40f; }
        
        /* БОЛЬШОЙ РИСУНОК */
        img.drawing { width: 100%; height: auto; max-height: 400px; object-fit: contain; border-radius: 10px; background: white; border: 3px solid #ccc; }

        .player-chip { background:#e94560; padding:10px 20px; border-radius:50px; margin:5px; display: inline-block; font-weight: bold; }
    </style>
</head>
<body onclick="startAudioContext()">

<div id="room-info-display" class="top-info" style="display:none;">КОД: ...</div>

<div id="lobby">
    <div class="logo">ГРЕХО-СМЕХ</div>
    <h1 id="roomCode" style="background:#0f3460; padding:15px; border:3px solid #e94560; display:inline-block; border-radius:15px;">КОД: ...</h1><br>
    <select id="gameMode" style="padding:15px; font-size:20px; border-radius:10px; margin:20px;">
        <option value="classic">Грехо-Смех</option>
        <option value="text">Смехо-Текст</option>
        <option value="draw">Рисовалка</option>
    </select><br>
    <div id="playerList"></div><br>
    <button onclick="startGame()" style="padding:20px 50px; background:#e94560; color:white; border-radius:50px; font-size:24px; font-weight:bold; cursor:pointer;">НАЧАТЬ</button>
</div>

<div id="game">
    <h2 id="qText" style="font-size: 44px; margin: 20px;"></h2>
    <div id="voting" style="display:none; width: 100%;">
        <div id="card1" class="ans-card"></div>
        <div id="card2" class="ans-card" style="border-color:#3498db"></div>
    </div>
</div>

<div id="final">
    <h1>🏆 ПОБЕДИТЕЛЬ: <br><span id="winner" style="color:#f1c40f; font-size: 70px;"></span></h1>
    <button onclick="location.reload()" style="padding:20px 40px; background:#e94560; color:white; border-radius:15px; border:none; cursor:pointer; font-size: 20px;">В МЕНЮ</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let audioStarted = false;
    const music = {
        lobby: new Audio('https://cdn.pixabay.com/audio/2022/03/10/audio_f5f69f2001.mp3'), 
        game: new Audio('https://cdn.pixabay.com/audio/2022/01/18/audio_d19d678d8a.mp3'),
        final: new Audio('https://cdn.pixabay.com/audio/2021/08/04/audio_c363842422.mp3')
    };

    function playMusic(track) {
        Object.values(music).forEach(m => { m.pause(); m.currentTime = 0; });
        music[track].loop = true; music[track].volume = 0.3;
        music[track].play().catch(() => {});
    }

    function startAudioContext() { if (!audioStarted) { playMusic('lobby'); audioStarted = true; } }

    socket.emit('create-room');
    socket.on('room-created', c => { 
        document.getElementById('roomCode').innerText = "КОД: " + c; 
        document.getElementById('room-info-display').innerText = "КОД: " + c;
    });

    socket.on('player-joined', d => { 
        document.getElementById('playerList').innerHTML += `<div class="player-chip">${d.emoji} ${d.name}</div>`; 
    });

    function startGame() { 
        playMusic('game');
        document.getElementById('room-info-display').style.display = 'block';
        socket.emit('start-game', { code: document.getElementById('roomCode').innerText.replace("КОД: ", ""), mode: document.getElementById('gameMode').value }); 
    }

    function speak(text, callback) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.pitch = 0.4; msg.rate = 0.9;
        msg.onend = callback;
        window.speechSynthesis.speak(msg);
    }

    socket.on('round-started', data => {
        document.getElementById('lobby').style.display = "none";
        document.getElementById('game').style.display = "block";
        document.getElementById('voting').style.display = "none";
        document.getElementById('qText').innerText = data.q;
        speak(data.q);
    });

    socket.on('show-voting', data => {
        document.getElementById('voting').style.display = "block";
        const c1 = document.getElementById('card1');
        const c2 = document.getElementById('card2');
        c1.className = data.isSolo ? "ans-card solo" : "ans-card";
        c2.style.display = data.isSolo ? "none" : "inline-block";
        
        c1.innerHTML = data.type === 'draw' ? `<img src="${data.ans1}" class="drawing">` : data.ans1;
        if (!data.isSolo) c2.innerHTML = data.type === 'draw' ? `<img src="${data.ans2}" class="drawing">` : data.ans2;

        if (data.isSolo) {
            speak("Одиночное выступление. Оцените работу!", () => { if(data.type !== 'draw') speak(data.ans1); });
        } else {
            speak("Чьи старания лучше?", () => {
                if(data.type !== 'draw') speak(data.ans1, () => {
                    setTimeout(() => speak(data.ans2), 1000);
                });
            });
        }
    });

    socket.on('voting-results', data => {
        document.getElementById('card1').innerHTML += `<br><small style="color:#f1c40f">${data.p1_emoji} ${data.p1_name} (Голосов: ${data.v1})</small>`;
        if(!data.isSolo) document.getElementById('card2').innerHTML += `<br><small style="color:#3498db">${data.p2_emoji} ${data.p2_name} (Голосов: ${data.v2})</small>`;
    });

    socket.on('final-results', data => {
        playMusic('final');
        document.getElementById('game').style.display = "none";
        document.getElementById('final').style.display = "block";
        document.getElementById('winner').innerText = data.players[0].emoji + " " + data.players[0].name;
    });
</script>
</body>
</html>
