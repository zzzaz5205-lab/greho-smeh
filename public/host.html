<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ГРЕХО-СМЕХ | ЭКРАН ХОСТА</title>
    <link rel="icon" href="https://fav.farm/🎮" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Roboto+Mono:wght@700&display=swap');
        body { font-family: 'Montserrat', sans-serif; background: #1a1a2e; color: #fff; text-align: center; margin: 0; overflow: hidden; }
        #lobby, #game, #final, #credits { display: none; padding: 20px; }
        #lobby { display: block; }
        .logo { font-size: 70px; color: #e94560; margin-top: 20px; text-transform: uppercase; }
        .main-btn { background: #e94560; color: white; padding: 15px 40px; font-size: 22px; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; margin: 10px; }
        .mode-select { background: #0f3460; padding: 20px; border-radius: 20px; border: 3px solid #e94560; display: inline-block; margin: 20px; }
        select { padding: 10px; border-radius: 10px; font-size: 20px; background: #1a1a2e; color: white; border: 2px solid #e94560; }
        .ans-card { background: #0f3460; padding: 20px; border-radius: 20px; width: 45%; border: 4px solid #e94560; font-size: 24px; }
        img.drawing { max-width: 100%; border-radius: 10px; background: white; }
        .player-chip { background:#e94560; padding:10px 20px; border-radius:50px; margin:5px; display: inline-block; font-weight: bold; }
    </style>
</head>
<body>

<div id="lobby">
    <div class="logo">ГРЕХО-СМЕХ</div>
    <h1 id="roomCode" style="background: #0f3460; padding: 10px 30px; border-radius: 15px; border: 3px solid #e94560; display: inline-block;">КОД: ...</h1>
    
    <div class="mode-select">
        <h3>РЕЖИМ ИГРЫ:</h3>
        <select id="gameMode">
            <option value="classic">Классика (Грехо-Смех)</option>
            <option value="text">Смехо-Текст (Отзывы)</option>
            <option value="draw">Рисовалка (Шедевры)</option>
        </select>
    </div>

    <div id="playerList" style="margin: 20px;"></div>
    <button class="main-btn" onclick="startGame()">НАЧАТЬ ПАРТИЮ</button>
</div>

<div id="game">
    <h1 id="roundInfo" style="color: #e94560;">РАУНД 1</h1>
    <h2 id="qText" style="font-size: 40px; margin: 30px;"></h2>
    <div id="voting" style="display:none; justify-content: space-around;">
        <div id="card1" class="ans-card"></div>
        <div id="card2" class="ans-card" style="background:#1a1a2e; border-color:#3498db"></div>
    </div>
</div>

<!-- Сюда добавь финальный блок и титры как были раньше -->

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let code = "";

    socket.emit('create-room');
    socket.on('room-created', c => { code = c; document.getElementById('roomCode').innerText = "КОД: " + c; });
    socket.on('player-joined', data => { 
        document.getElementById('playerList').innerHTML += `<div class="player-chip">${data.emoji} ${data.name}</div>`; 
    });

    function startGame() { 
        const mode = document.getElementById('gameMode').value;
        socket.emit('start-game', { code, mode }); 
    }

    socket.on('round-started', data => {
        document.getElementById('lobby').style.display = "none";
        document.getElementById('game').style.display = "block";
        document.getElementById('voting').style.display = "none";
        document.getElementById('qText').innerText = data.q;
    });

    socket.on('show-voting', data => {
        document.getElementById('voting').style.display = "flex";
        const c1 = document.getElementById('card1');
        const c2 = document.getElementById('card2');
        
        if (data.type === 'draw') {
            c1.innerHTML = `<img src="${data.ans1}" class="drawing">`;
            c2.innerHTML = `<img src="${data.ans2}" class="drawing">`;
        } else {
            c1.innerText = data.ans1;
            c2.innerText = data.ans2;
        }
    });

    socket.on('voting-results', data => {
        document.getElementById('card1').innerHTML += `<br><small style="color:#f1c40f">${data.p1_emoji} ${data.p1_name}</small>`;
        document.getElementById('card2').innerHTML += `<br><small style="color:#3498db">${data.p2_emoji} ${data.p2_name}</small>`;
    });
</script>
</body>
</html>
