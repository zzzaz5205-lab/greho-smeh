<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Грехо-Смех | HOST</title>
</head>
<body>
    <div class="card" id="main">
        <div id="lobby">
            <h1>ГРЕХО-СМЕХ</h1>
            <h2 id="room-code">Генерируем код...</h2>
            <div id="players"></div>
            <button onclick="startGame()">НАЧАТЬ ИГРУ</button>
            <p>Нажмите на экран, чтобы включить диктора</p>
        </div>

        <div id="game" class="hidden">
            <div class="timer-bar" id="timer-bar"></div>
            <h2 id="round-title">Раунд 1</h2>
            <h1 id="question">Тут будет вопрос</h1>
            <div id="voting-zone" class="answer-pair"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
    <script>
        let myCode = "";
        socket.emit('create-room');

        socket.on('room-created', code => {
            myCode = code;
            document.getElementById('room-code').innerText = "КОД: " + code;
        });

        socket.on('update-players', players => {
            document.getElementById('players').innerHTML = players.map(p => `<h3>${p.name}</h3>`).join('');
        });

        function startGame() {
            socket.emit('start-game', myCode);
            speak("Игра начинается. Приготовьтесь грешить и смеяться.");
        }

        socket.on('round-started', data => {
            document.getElementById('lobby').classList.add('hidden');
            document.getElementById('game').classList.remove('hidden');
            document.getElementById('question').innerText = "Отвечайте на вопросы!";
            speak("Раунд " + data.round + ". Посмотрите в свои телефоны и ответьте на вопросы.");
        });

        socket.on('start-voting', data => {
            document.getElementById('question').innerText = data.question;
            document.getElementById('voting-zone').innerHTML = data.answers.map(a => `
                <div class="ans-card">${a.text}</div>
            `).join('');
            speak("Вопрос. " + data.question + ". Чей ответ лучше?");
        });

        socket.on('voting-results', data => {
            speak("Голосование окончено. Посмотрим, кто заработал очки.");
        });
    </script>
</body>
</html>
