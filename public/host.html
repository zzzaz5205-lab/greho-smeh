<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ГРЕХО-СМЕХ | ЭКРАН ХОСТА</title>
    <link rel="icon" href="https://fav.farm/🎮" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Roboto+Mono:wght@700&display=swap');
        
        body { 
            margin: 0; padding: 0; overflow: hidden; 
            background: #fbc02d; font-family: 'Montserrat', sans-serif; 
            color: #3e2723; text-align: center; perspective: 1000px; 
        }

        /* ГИПНО-СПИРАЛЬ */
        .spiral { 
            position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; 
            background: repeating-conic-gradient(from 0deg, #f9a825 0deg 20deg, #fbc02d 20deg 40deg); 
            animation: rotateSpiral 40s linear infinite; z-index: -1; 
        }
        @keyframes rotateSpiral { 100% { transform: rotate(360deg); } }

        /* ТАЙМЕР */
        #digital-timer { 
            position: absolute; top: 20px; left: 30px; 
            font-size: 85px; font-family: 'Roboto Mono'; font-weight: 900; 
            text-shadow: 6px 6px 0 #000; color: #fff; z-index: 1000; display: none; 
            transform: rotate(-5deg); 
        }

        /* КОД В УГЛУ */
        .top-code-box { 
            position: absolute; top: 15px; right: 20px; 
            background: #fff; color: #000; padding: 10px 25px; 
            border: 5px solid #3e2723; transform: rotate(2deg); 
            box-shadow: 10px 10px 0 rgba(0,0,0,0.1); z-index: 100;
        }
        .top-code-box b { font-size: 45px; font-family: 'Roboto Mono'; }

        .screen { display: none; height: 100vh; width: 100vw; flex-direction: column; align-items: center; justify-content: center; position: absolute; top:0; left:0; transition: 0.5s; }

        /* БАБЛЫ ОТВЕТОВ */
        #voting { display: none; width: 100%; height: 450px; position: relative; margin-top: 50px; }
        .bubble { 
            background: #fff; border: 8px solid #3e2723; border-radius: 25px; 
            padding: 40px; width: 42%; min-height: 250px; font-size: 50px; 
            font-weight: 900; box-shadow: 15px 15px 0 rgba(0,0,0,0.1); 
            position: absolute; transition: all 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            display: flex; align-items: center; justify-content: center;
        }
        #card1 { left: 5%; top: 50%; transform: translateY(-50%) rotate(-3deg); }
        #card2 { right: 5%; top: 50%; transform: translateY(-50%) rotate(3deg); }
        
        /* СОЛО АНИМАЦИИ */
        .refusal { background: #bbb !important; color: #666 !important; border-color: #666 !important; font-size: 30px !important; }
        .solo-center { left: 50% !important; transform: translate(-50%, -50%) rotate(0deg) scale(1.15) !important; z-index: 100; }
        .kicked-out { transform: translate(150%, -50%) rotate(45deg) !important; opacity: 0; }

        /* БЕЙДЖИ ОЧКОВ */
        .points-badge { 
            position: absolute; top: -30px; right: -30px; 
            background: #ef5350; color: #fff; border: 5px solid #3e2723; 
            width: 90px; height: 90px; border-radius: 50%; 
            display: none; align-items: center; justify-content: center; 
            font-size: 32px; animation: popBadge 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        @keyframes popBadge { from { transform: scale(0); } to { transform: scale(1); } }

        /* УЛЕТАНИЕ ВДАЛЬ */
        @keyframes flyAway { to { transform: translate(-50%, -50%) scale(0.1) rotateX(45deg); opacity: 0; } }
        .exit-zoom { animation: flyAway 1s forwards ease-in; }

        /* ТАБЛИЦА СЧЕТА */
        .score-bar { 
            background: #3e2723; color: #fff; font-size: 45px; 
            padding: 15px 45px; border-radius: 20px; width: 600px; 
            display: flex; justify-content: space-between; border: 5px solid #fff; 
            margin: 15px; box-shadow: 10px 10px 0 rgba(0,0,0,0.2); 
            animation: slideUp 0.6s forwards;
        }
        @keyframes slideUp { from { transform: translateY(200px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        #qText { font-size: 60px; background: #fff; padding: 20px 40px; border: 6px solid #3e2723; transform: rotate(-1deg); transition: 0.5s; }
        .q-vanish { opacity: 0; transform: scale(0.8); }

        .player-node { background: #fff; border: 5px solid #3e2723; padding: 15px; border-radius: 20px; margin: 10px; font-weight: bold; }
    </style>
</head>
<body onclick="startAudio()">
    <div class="spiral"></div>
    <div id="digital-timer"></div>
    <div id="corner-code" class="top-code-box" style="display:none;"><span>КОД:</span><b id="c-val">...</b></div>

    <!-- ЛОББИ -->
    <div id="lobby" class="screen" style="display:flex">
        <h1 style="font-size: 80px; text-shadow: 6px 6px 0 #fff; margin:0;">ГРЕХО-СМЕХ</h1>
        <div style="background:#000; color:#ffeb3b; padding:15px 60px; border:8px solid #fff; font-size:100px; transform:rotate(-2deg);" id="bigCode">...</div>
        <div id="playerList" style="display:flex; flex-wrap:wrap; justify-content:center; margin-top:30px;"></div>
        <button onclick="socket.emit('start-game', curCode)" style="background:#4caf50; border:6px solid #3e2723; color:#fff; padding:25px 70px; font-size:35px; border-radius:100px; cursor:pointer; margin-top:30px; font-weight:900;">ПОГНАЛИ!</button>
    </div>

    <!-- ИГРА -->
    <div id="game" class="screen">
        <h2 id="qText"></h2>
        <div id="voting">
            <div id="card1" class="bubble"><div id="ans-text-1"></div><div id="badge-1" class="points-badge"></div></div>
            <div id="card2" class="bubble"><div id="ans-text-2"></div><div id="badge-2" class="points-badge"></div></div>
        </div>
    </div>

    <!-- СЧЁТ -->
    <div id="scores" class="screen">
        <h1 style="font-size:80px; text-shadow: 6px 6px 0 #fff;">ТЕКУЩИЙ СЧЁТ</h1>
        <div id="scoreList"></div>
    </div>

    <!-- ФИНАЛ -->
    <div id="final" class="screen"><h1>ПОБЕДИТЕЛЬ</h1><div id="winner" style="font-size:120px; color:#ef5350"></div></div>

    <!-- ТИТРЫ -->
    <div id="credits" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#000; display:none; flex-direction:column; justify-content:center; color:#fff;">
        <h1 style="font-size:100px; color:#ffeb3b;">ГРЕХО-СМЕХ</h1>
        <div style="font-size:40px; line-height:2;">ВАНГА ФIЙКО ПЕРФОРАТОР<br>ДИМА MODERASS<br>ГРЕХА И ИИ-ШКА<br><br>СПАСИБО ЗА ИГРУ!</div>
    </div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io(); let curCode = "", cdnInt, audioStarted = false;
    const music = { lobby: new Audio('lobby.mp3'), game: new Audio('game.mp3'), final: new Audio('final.mp3') };

    function playM(track) {
        Object.values(music).forEach(m => { m.pause(); m.currentTime = 0; });
        music[track].loop = true; music[track].volume = 0.1; // ТИХАЯ МУЗЫКА
        music[track].play().catch(() => {});
    }

    function startAudio() { if(!audioStarted) { playM('lobby'); audioStarted = true; } }

    socket.emit('create-room', sessionStorage.getItem('lastCode'));
    socket.on('room-created', c => { curCode = c; sessionStorage.setItem('lastCode', c); document.getElementById('bigCode').innerText = c; document.getElementById('c-val').innerText = c; });
    
    socket.on('player-list-update', players => {
        document.getElementById('playerList').innerHTML = players.map(p => `<div class="player-node"><span>${p.emoji}</span>${p.name}</div>`).join('');
    });

    function speak(t, cb) {
        window.speechSynthesis.cancel(); const m = new SpeechSynthesisUtterance(t);
        const vs = window.speechSynthesis.getVoices();
        m.voice = vs.find(v => v.lang.includes('ru') && v.name.includes('David')) || vs[0];
        m.pitch = 0.45; m.rate = 0.9; m.onend = cb; window.speechSynthesis.speak(m);
    }

    function runTimer(sec) {
        let tl = sec; const tEl = document.getElementById('digital-timer');
        tEl.style.display = 'block'; tEl.innerText = tl; tEl.style.color = "#fff";
        clearInterval(cdnInt);
        cdnInt = setInterval(() => {
            tl--; tEl.innerText = tl;
            if(tl <= 5) tEl.style.color = "red";
            if(tl <= 0) { clearInterval(cdnInt); tEl.style.display = 'none'; }
        }, 1000);
    }

    socket.on('round-started', d => {
        document.getElementById('lobby').style.display="none"; document.getElementById('scores').style.display="none";
        document.getElementById('game').style.display='flex'; document.getElementById('game').classList.remove('exit-zoom');
        document.getElementById('voting').style.display = 'none';
        const q = document.getElementById('qText');
        q.innerText = d.q; q.classList.remove('q-vanish');
        speak(d.q); runTimer(d.time); playM('game');
    });

    socket.on('show-voting', d => {
        document.getElementById('voting').style.display = 'block';
        const c1 = document.getElementById('card1'), c2 = document.getElementById('card2');
        const b1 = document.getElementById('badge-1'), b2 = document.getElementById('badge-2');
        c1.className = 'bubble'; c2.className = 'bubble';
        b1.style.display = 'none'; b2.style.display = 'none';

        if(d.isSolo) {
            document.getElementById('ans-text-1').innerText = d.ans1;
            document.getElementById('ans-text-2').innerText = "Я отказываюсь на это отвечать!";
            c2.classList.add('refusal');
            speak("Одиночное выступление.");
            setTimeout(() => { c2.classList.add('kicked-out'); c1.classList.add('solo-center'); }, 2000);
        } else {
            document.getElementById('ans-text-1').innerText = d.ans1;
            document.getElementById('ans-text-2').innerText = d.ans2;
            speak("Чей ответ лучше?");
        }
        runTimer(20);
    });

    socket.on('voting-results', d => {
        const b1 = document.getElementById('badge-1'), b2 = document.getElementById('badge-2');
        b1.innerText = d.v1; b1.style.display = 'flex';
        if(!d.isSolo) { b2.innerText = d.v2; b2.style.display = 'flex'; }
        
        setTimeout(() => {
            b1.innerText = "+" + d.p1Points; b1.style.background = "#4caf50";
            if(!d.isSolo) { b2.innerText = "+" + d.p2Points; b2.style.background = "#4caf50"; }
            document.getElementById('qText').classList.add('q-vanish');
            setTimeout(() => { 
                document.getElementById('card1').classList.add('exit-zoom'); 
                if(!d.isSolo) document.getElementById('card2').classList.add('exit-zoom');
            }, 1500);
        }, 2000);
    });

    socket.on('show-scores', d => {
        document.getElementById('game').style.display='none'; 
        document.getElementById('scores').style.display='flex';
        document.getElementById('scores').classList.remove('exit-zoom');
        document.getElementById('scoreList').innerHTML = d.players.sort((a,b)=>b.score-a.score).map((p,i)=>`
            <div class="score-bar"><span>${i+1}. ${p.emoji} ${p.name}</span><b>${p.score}</b></div>
        `).join('');
        runTimer(d.time);
        setTimeout(() => { document.getElementById('scores').classList.add('exit-zoom'); }, (d.time - 1) * 1000);
    });

    socket.on('final-results', d => {
        playM('final');
        document.getElementById('scores').style.display='none';
        document.getElementById('final').style.display='flex'; 
        document.getElementById('winner').innerText = d.players[0].name;
        speak("Игра окончена! Победил " + d.players[0].name);
        setTimeout(() => { 
            document.getElementById('final').style.display='none';
            document.getElementById('credits').style.display='flex';
            setTimeout(() => socket.emit('finish-credits', curCode), 15000);
        }, 7000);
    });
</script>
</body>
</html>
