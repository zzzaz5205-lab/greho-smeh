<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ГРЕХО-СМЕХ | Экран</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="lobby">
            <h1>Код комнаты:</h1>
            <div id="display-code" class="room-code">----</div>
            <h3>Игроки в лобби:</h3>
            <ul id="player-list"></ul>
            <button id="start-btn" class="hidden" onclick="startGame()">НАЧАТЬ ИГРУ</button>
        </div>

        <div id="game-screen" class="hidden">
            <h2 id="round-num"></h2>
            <h1 id="question-text"></h1>
            <div id="host-message">Ожидаем ответы игроков...</div>
            <div id="results-area"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let roomCode = '';

        socket.emit('create-room');
        socket.on('room-created', code => {
            roomCode = code;
            document.getElementById('display-code').innerText = code;
        });

        socket.on('player-update', players => {
            const list = document.getElementById('player-list');
            list.innerHTML = players.map(p => `<li>${p.name}</li>`).join('');
            if(players.length >= 2) document.getElementById('start-btn').classList.remove('hidden');
        });

        function startGame() {
            socket.emit('start-game', roomCode);
        }

        socket.on('round-start', data => {
            document.getElementById('lobby').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('round-num').innerText = `Раунд ${data.round}`;
            document.getElementById('question-text').innerText = data.question;
            document.getElementById('host-message').innerText = "Все отвечают на своих телефонах!";
            document.getElementById('results-area').innerHTML = '';
        });

        socket.on('start-voting', answers => {
            document.getElementById('host-message').innerText = "Голосуем!";
        });

        socket.on('results', players => {
            document.getElementById('host-message').innerText = "Текущий счет:";
            const area = document.getElementById('results-area');
            area.innerHTML = players.map(p => `<div>${p.name}: ${p.score}</div>`).join('');
        });

        socket.on('final-scores', players => {
            document.getElementById('question-text').innerText = "ИГРА ОКОНЧЕНА!";
            document.getElementById('host-message').innerText = "Финальный результат:";
            const area = document.getElementById('results-area');
            area.innerHTML = players.sort((a,b) => b.score - a.score)
                .map(p => `<h2>🏆 ${p.name}: ${p.score}</h2>`).join('');
        });
    </script>
</body>
</html>
