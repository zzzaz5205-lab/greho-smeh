<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ГРЕХО-СМЕХ - ВХОД</title>
    <link rel="icon" href="https://fav.farm/🎮" />
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: white; text-align: center; padding-top: 50px; margin: 0; }
        .vanga-container { position: absolute; top: 20px; right: 30px; display: flex; flex-direction: column; align-items: center; text-decoration: none; z-index: 100; }
        .vanga-label { color: #f1c40f; font-weight: 900; font-size: 18px; text-transform: uppercase; text-shadow: 2px 2px 0 #000; margin-bottom: 5px; }
        .vanga-avatar { width: 100px; height: 100px; border-radius: 50%; border: 4px solid #e94560; background: #000 url('vanga.jpg') center/cover no-repeat; box-shadow: 0 0 20px rgba(233, 69, 96, 0.6); }

        .card { background: #16213e; padding: 40px; display: inline-block; border-radius: 20px; border: 3px solid #e94560; box-shadow: 0 0 20px rgba(0,0,0,0.5); width: 90%; max-width: 450px; }
        h1 { color: #e94560; font-size: 45px; margin-bottom: 20px; }
        input { display: block; width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: none; font-size: 18px; background: #0f3460; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 12px; border: none; background: #e94560; color: white; font-weight: bold; font-size: 20px; cursor: pointer; transition: 0.2s; }
        button:hover { background: #ff4d6d; }
        
        #emoji-picker { margin: 20px 0; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .emoji-btn { 
            font-size: 35px; background: #0f3460; border: 3px solid transparent; 
            cursor: pointer; width: 65px; height: 65px; border-radius: 15px;
            display: flex; align-items: center; justify-content: center; /* ЦЕНТРОВКА */
            padding: 0; line-height: 1; transition: 0.2s;
        }
        .emoji-btn.active { border-color: #e94560; background: #1a1a2e; transform: scale(1.1); }
    </style>
</head>
<body>
    <a href="https://www.twitch.tv/vangavgav" target="_blank" class="vanga-container">
        <span class="vanga-label">Ванга Фiйко Перфоратор</span>
        <div class="vanga-avatar"></div>
    </a>

    <div class="card">
        <h1>ГРЕХО-СМЕХ</h1>
        <button onclick="location.href='host.html'" style="background:#27ae60; margin-bottom: 20px;">СОЗДАТЬ ИГРУ</button>
        <hr><br>
        <p style="font-weight: bold; color: #f1c40f;">ВЫБЕРИ ПЕРСОНАЖА:</p>
        <div id="emoji-picker">
            <button class="emoji-btn active" onclick="setEmoji('🤡', this)">🤡</button>
            <button class="emoji-btn" onclick="setEmoji('👻', this)">👻</button>
            <button class="emoji-btn" onclick="setEmoji('👽', this)">👽</button>
            <button class="emoji-btn" onclick="setEmoji('🤖', this)">🤖</button>
            <button class="emoji-btn" onclick="setEmoji('🐙', this)">🐙</button>
        </div>
        <input type="text" id="name" placeholder="Твое Имя">
        <input type="text" id="code" placeholder="Код Комнаты">
        <button onclick="join()">ВОЙТИ</button>
    </div>

    <script>
        let selectedEmoji = "🤡";
        function setEmoji(e, btn) {
            selectedEmoji = e;
            document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        function join() {
            const n = document.getElementById('name').value;
            const c = document.getElementById('code').value.toUpperCase();
            if(n && c) location.href = `player.html?name=${encodeURIComponent(n)}&code=${encodeURIComponent(c)}&emoji=${encodeURIComponent(selectedEmoji)}`;
        }
    </script>
</body>
</html>
