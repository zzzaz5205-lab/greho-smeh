<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пати Гейм</title>
    <style>
        body { font-family: sans-serif; background: #1a1a2e; color: white; text-align: center; margin: 0; padding: 20px; }
        
        /* Контейнер таймера */
        #timer-container { margin-bottom: 20px; }
        #digital-timer { font-size: 3rem; font-weight: bold; color: #e94560; }
        .progress-bg { width: 100%; max-width: 400px; height: 10px; background: #16213e; margin: 10px auto; border-radius: 5px; overflow: hidden; }
        #progress-bar { width: 100%; height: 100%; background: #e94560; transition: width 0.1s linear; }

        /* Карточки ответов */
        .pair-container { display: flex; justify-content: center; gap: 20px; margin-top: 30px; flex-wrap: wrap; }
        .answer-card { background: #0f3460; padding: 20px; border-radius: 10px; border: 2px solid #e94560; width: 40%; min-width: 250px; font-size: 1.5rem; }

        button { padding: 15px 30px; font-size: 1.2rem; background: #e94560; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="lobby">
        <h1>ГРЕХО-СМЕХ</h1>
        <!-- Задача 1: Кнопка "Начать игру" вместо лишнего текста -->
        <button id="start-btn">НАЧАТЬ ИГРУ</button>
    </div>

    <div id="game-area" class="hidden">
        <!-- Задача 2: Цифровой таймер и синхронный прогресс-бар -->
        <div id="timer-container">
            <div id="digital-timer">30</div>
            <div class="progress-bg">
                <div id="progress-bar"></div>
            </div>
        </div>

        <h2 id="question">Тут будет ваш вопрос?</h2>

        <!-- Задача 3: Вывод по 2 ответа -->
        <div class="pair-container" id="answers-pair"></div>
        
        <button id="next-pair-btn" class="hidden" style="margin-top: 20px;">Следующая пара</button>
    </div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const nextPairBtn = document.getElementById('next-pair-btn');
        const digitalTimer = document.getElementById('digital-timer');
        const progressBar = document.getElementById('progress-bar');
        const answersContainer = document.getElementById('answers-pair');

        let timerInterval;
        let allAnswers = [
            { id: "p1", text: "Вариант А", author: "user1" },
            { id: "p2", text: "Вариант Б", author: "user2" },
            { id: "p3", text: "Вариант В", author: "user3" },
            { id: "p4", text: "Вариант Г", author: "user4" }
        ];
        let currentPairIndex = 0;

        // Задача 5: Функция озвучки
        function speak(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel(); // Прерываем текущую речь, если она есть
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ru-RU';
            utterance.rate = 1.0;
            window.speechSynthesis.speak(utterance);
        }

        // Задача 1: Запуск игры
        startBtn.onclick = () => {
            document.getElementById('lobby').classList.add('hidden');
            document.getElementById('game-area').classList.remove('hidden');
            
            speak("Раунд 1 начинается!"); // Задача 5: Озвучка старта
            startRoundTimer(15);
            displayNextPair();
        };

        // Задача 2: Логика таймера
        function startRoundTimer(seconds) {
            let timeLeft = seconds;
            const total = seconds;
            
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                digitalTimer.innerText = timeLeft;
                
                // Синхронизация бара
                const percent = (timeLeft / total) * 100;
                progressBar.style.width = percent + "%";

                if (timeLeft <= 5 && timeLeft > 0) speak(timeLeft.toString()); // Задача 5: Озвучка секунд

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    speak("Время вышло! Переходим к следующей паре.");
                    displayNextPair();
                }
            }, 1000);
        }

        // Задача 3: Вывод по 2 ответа (Пагинация)
        function displayNextPair() {
            const pair = allAnswers.slice(currentPairIndex, currentPairIndex + 2);
            
            if (pair.length > 0) {
                answersContainer.innerHTML = pair.map(ans => `
                    <div class="answer-card" onclick="voteFor('${ans.id}')">
                        ${ans.text}
                    </div>
                `).join('');
                
                speak("Появилась новая пара ответов. Голосуйте!"); // Задача 5
                currentPairIndex += 2;
                startRoundTimer(15); // Сброс таймера для новой пары
            } else {
                speak("Раунд окончен. Победил игрок под номером 1!"); // Задача 5: Озвучка победителя
                answersContainer.innerHTML = "<h2>Голосование завершено!</h2>";
                clearInterval(timerInterval);
            }
        }

        function voteFor(answerId) {
            console.log("Голос за:", answerId);
            // Тут вызов socket.emit('vote', ...)
        }
    </script>
</body>
</html>
