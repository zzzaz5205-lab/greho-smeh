<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ГРЕХО-СМЕХ | ВАНГА ПЕРФОРАТОР</title>
    <link rel="icon" href="https://fav.farm/🎮" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap');
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: white; text-align: center; padding-top: 60px; margin: 0; }
        .vanga-container { position: absolute; top: 20px; right: 30px; display: flex; flex-direction: column; align-items: center; text-decoration: none; }
        .vanga-label { color: #f1c40f; font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 28px; text-transform: uppercase; text-shadow: 3px 3px 0 #000; margin-bottom: 10px; }
        .vanga-avatar { width: 130px; height: 130px; border-radius: 50%; border: 6px solid #e94560; background: #000 url('vanga.jpg') center/cover; box-shadow: 0 0 30px #e94560; }
        .card { background: #16213e; padding: 40px; display: inline-block; border-radius: 30px; border: 4px solid #e94560; width: 400px; }
        h1 { font-family: 'Montserrat', sans-serif; font-size: 55px; color: #e94560; margin: 0; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 15px; border: none; font-size: 20px; background: #0f3460; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 18px; border-radius: 15px; border: none; background: #e94560; color: white; font-weight: bold; font-size: 22px; cursor: pointer; box-shadow: 0 5px 0 #950740; }
        #emoji-picker { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .emoji-btn { font-size: 40px; background: #0f3460; border: 4px solid transparent; cursor: pointer; width: 75px; height: 75px; border-radius: 20px; display: flex; align-items: center; justify-content: center; padding: 0; }
        .emoji-btn.active { border-color: #e94560; transform: scale(1.1); background: #1a1a2e; }
    </style>
</head>
<body>
    <a href="https://www.twitch.tv/vangavgav" target="_blank" class="vanga-container">
        <span class="vanga-label">Ванга Фiйко Перфоратор</span>
        <div class="vanga-avatar"></div>
    </a>
    <div class="card">
        <h1>ГРЕХО-СМЕХ</h1>
        <button class="btn" onclick="location.href='host.html'" style="background:#27ae60; box-shadow: 0 5px 0 #1e8449;">СОЗДАТЬ ИГРУ</button>
        <hr style="margin:25px 0; border:1px solid #0f3460;">
        <div id="emoji-picker">
            <div class="emoji-btn active" onclick="setEmoji('🤡', this)">🤡</div>
            <div class="emoji-btn" onclick="setEmoji('👻', this)">👻</div>
            <div class="emoji-btn" onclick="setEmoji('👽', this)">👽</div>
            <div class="emoji-btn" onclick="setEmoji('🤖', this)">🤖</div>
            <div class="emoji-btn" onclick="setEmoji('🐙', this)">🐙</div>
        </div>
        <input type="text" id="name" placeholder="Твоё Имя">
        <input type="text" id="code" placeholder="Код">
        <button class="btn" onclick="join()">ВОЙТИ</button>
    </div>
    <script>
        let selectedEmoji = "🤡";
        function setEmoji(e, btn) { selectedEmoji = e; document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
        function join() { const n = document.getElementById('name').value, c = document.getElementById('code').value.toUpperCase(); if(n && c) location.href = `player.html?name=${encodeURIComponent(n)}&code=${encodeURIComponent(c)}&emoji=${encodeURIComponent(selectedEmoji)}`; }
    </script>
</body>
</html>
