<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ГРЕХО-СМЕХ - ВХОД</title>
    <link rel="icon" href="https://fav.farm/🎮" />
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: white; text-align: center; padding-top: 80px; margin: 0; }
        
        /* ГИГАНТСКАЯ ВАНГА */
        .vanga-container { position: absolute; top: 20px; right: 30px; display: flex; flex-direction: column; align-items: center; text-decoration: none; }
        .vanga-label { 
            color: #f1c40f; font-weight: 900; font-size: 24px; /* УВЕЛИЧИЛ ТЕКСТ */
            text-transform: uppercase; text-shadow: 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;
            margin-bottom: 10px; font-family: 'Arial Black', sans-serif;
        }
        .vanga-avatar { 
            width: 120px; height: 120px; border-radius: 50%; border: 5px solid #e94560; 
            background: #000 url('vanga.jpg') center/cover no-repeat; /* Проверь расширение файла! */
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.8); transition: 0.3s;
        }
        .vanga-container:hover .vanga-avatar { transform: scale(1.1) rotate(10deg); border-color: #f1c40f; }

        .card { background: #16213e; padding: 40px; display: inline-block; border-radius: 20px; border: 3px solid #e94560; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        h1 { color: #e94560; font-size: 50px; margin: 0 0 20px 0; }
        input { display: block; width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; font-size: 18px; background: #0f3460; color: white; }
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; background: #e94560; color: white; font-weight: bold; font-size: 18px; cursor: pointer; }
        
        #emoji-picker { margin-bottom: 20px; display: flex; justify-content: center; gap: 10px; }
        .emoji-btn { font-size: 30px; background: #0f3460; border: 3px solid transparent; cursor: pointer; width: 60px; height: 60px; border-radius: 15px; }
        .emoji-btn.active { border-color: #e94560; background: #1a1a2e; }
    </style>
</head>
<body>

    <a href="https://www.twitch.tv/vangavgav" target="_blank" class="vanga-container">
        <span class="vanga-label">Ванга Фiйко Перфоратор</span>
        <div class="vanga-avatar"></div>
    </a>

    <div class="card">
        <h1>ГРЕХО-СМЕХ</h1>
        <button onclick="location.href='host.html'" style="background:#27ae60; margin-bottom: 20px;">СОЗДАТЬ ИГРУ</button>
        <hr><br>
        <p>Выбери персонажа:</p>
        <div id="emoji-picker">
            <button class="emoji-btn active" onclick="setEmoji('🤡', this)">🤡</button>
            <button class="emoji-btn" onclick="setEmoji('👻', this)">👻</button>
            <button class="emoji-btn" onclick="setEmoji('👽', this)">👽</button>
            <button class="emoji-btn" onclick="setEmoji('🤖', this)">🤖</button>
            <button class="emoji-btn" onclick="setEmoji('🐙', this)">🐙</button>
        </div>
        <input type="text" id="name" placeholder="Твое Имя">
        <input type="text" id="code" placeholder="Код Комнаты">
        <button onclick="join()">ВОЙТИ</button>
    </div>

    <script>
        let selectedEmoji = "🤡";
        function setEmoji(e, btn) {
            selectedEmoji = e;
            document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        function join() {
            const n = document.getElementById('name').value;
            const c = document.getElementById('code').value.toUpperCase();
            if(n && c) location.href = `player.html?name=${encodeURIComponent(n)}&code=${encodeURIComponent(c)}&emoji=${encodeURIComponent(selectedEmoji)}`;
        }
    </script>
</body>
</html>
