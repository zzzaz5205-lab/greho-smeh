<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ГРЕХО-СМЕХ - ВХОД</title>
    <link rel="icon" href="https://fav.farm/🎮" />
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: white; text-align: center; padding-top: 50px; }
        .card { background: #16213e; padding: 40px; display: inline-block; border-radius: 20px; border: 3px solid #e94560; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        h1 { color: #e94560; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; }
        input { display: block; width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; font-size: 18px; box-sizing: border-box; background: #0f3460; color: white; }
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; background: #e94560; color: white; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #ff4d6d; }
        
        #emoji-picker { margin-bottom: 20px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; max-width: 350px; }
        .emoji-btn { 
            font-size: 30px; background: #0f3460; border: 3px solid transparent; 
            cursor: pointer; width: 60px; height: 60px; border-radius: 15px; 
            display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        .emoji-btn.active { border-color: #e94560; background: #1a1a2e; transform: scale(1.1); }
    </style>
</head>
<body>
    <div class="card">
        <h1>ГРЕХО-СМЕХ</h1>
        <button onclick="location.href='host.html'" style="background:#27ae60; margin-bottom: 20px;">СОЗДАТЬ ИГРУ (ХОСТ)</button>
        <hr><br>
        <p>Выбери персонажа:</p>
        <div id="emoji-picker">
            <button class="emoji-btn active" onclick="setEmoji('🤡', this)">🤡</button>
            <button class="emoji-btn" onclick="setEmoji('👻', this)">👻</button>
            <button class="emoji-btn" onclick="setEmoji('👽', this)">👽</button>
            <button class="emoji-btn" onclick="setEmoji('🤖', this)">🤖</button>
            <button class="emoji-btn" onclick="setEmoji('🐙', this)">🐙</button>
            <button class="emoji-btn" onclick="setEmoji('🐸', this)">🐸</button>
        </div>
        <input type="text" id="name" placeholder="Твое Имя">
        <input type="text" id="code" placeholder="Код Комнаты">
        <button onclick="join()">ВОЙТИ В ИГРУ</button>
    </div>
    <script>
        let selectedEmoji = "🤡";
        function setEmoji(e, btn) {
            selectedEmoji = e;
            document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        function join() {
            const n = document.getElementById('name').value;
            const c = document.getElementById('code').value.toUpperCase();
            if(n && c) location.href = `player.html?name=${encodeURIComponent(n)}&code=${encodeURIComponent(c)}&emoji=${encodeURIComponent(selectedEmoji)}`;
        }
    </script>
</body>
</html>
