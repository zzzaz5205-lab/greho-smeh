<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Контроллер</title>
</head>
<body>
    <div class="card">
        <div id="answering" class="hidden">
            <h3 id="q-text">Вопрос...</h3>
            <input type="text" id="ans-input" placeholder="Твой ответ">
            <button onclick="submitAns()">ОТПРАВИТЬ</button>
        </div>

        <div id="voting" class="hidden">
            <h3>ГОЛОСУЙ!</h3>
            <div id="vote-options"></div>
        </div>

        <div id="wait">
            <h2 id="status">Ждем начала...</h2>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const name = params.get('name');
        const code = params.get('code');
        let currentQuestions = [];

        socket.emit('join-room', { code, name });

        socket.on('round-started', data => {
            currentQuestions = data.pairs.filter(p => p.p1 === socket.id || p.p2 === socket.id);
            showNextQuestion();
        });

        function showNextQuestion() {
            if (currentQuestions.length > 0) {
                const q = currentQuestions.shift();
                document.getElementById('wait').classList.add('hidden');
                document.getElementById('answering').classList.remove('hidden');
                document.getElementById('q-text').innerText = q.question;
            } else {
                document.getElementById('answering').classList.add('hidden');
                document.getElementById('wait').classList.remove('hidden');
                document.getElementById('status').innerText = "Ждем остальных...";
            }
        }

        function submitAns() {
            const answer = document.getElementById('ans-input').value;
            const q = document.getElementById('q-text').innerText;
            socket.emit('submit-answer', { code, question: q, answer });
            document.getElementById('ans-input').value = "";
            showNextQuestion();
        }

        socket.on('start-voting', data => {
            const isMeDuelling = (data.p1 === socket.id || data.p2 === socket.id);
            if (isMeDuelling) {
                document.getElementById('wait').classList.remove('hidden');
                document.getElementById('status').innerText = "Вы в дуэли! Вы не можете голосовать.";
                document.getElementById('voting').classList.add('hidden');
            } else {
                document.getElementById('wait').classList.add('hidden');
                document.getElementById('voting').classList.remove('hidden');
                document.getElementById('vote-options').innerHTML = data.answers.map(a => `
                    <button onclick="vote('${a.playerId}')">${a.text}</button>
                `).join('');
            }
        });

        function vote(id) {
            socket.emit('cast-vote', { code, targetPlayerId: id });
            document.getElementById('voting').classList.add('hidden');
            document.getElementById('wait').classList.remove('hidden');
            document.getElementById('status').innerText = "Голос принят!";
        }
    </script>
</body>
</html>
