<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ГРЕХО-СМЕХ | ИГРОК</title>
    <style>
        body { font-family: sans-serif; background: #1a1a2e; color: white; text-align: center; margin: 0; touch-action: none; }
        .btn { background: #e94560; color: white; width: 90%; padding: 15px; margin: 10px; border: none; border-radius: 12px; font-weight: bold; }
        .hidden { display: none; }
        #canvas { background: white; border: 5px solid #e94560; border-radius: 10px; cursor: crosshair; }
        .q-box { background: #e94560; padding: 10px; margin: 10px; border-radius: 10px; font-weight: bold; }
        input { width: 90%; padding: 12px; margin: 5px; border-radius: 10px; border: none; }
    </style>
</head>
<body>
    <div id="status" style="padding:20px;">Подключение...</div>

    <div id="answer-ui" class="hidden">
        <div id="qText" class="q-box"></div>
        <div id="text-inputs"></div>
        <div id="draw-inputs" class="hidden">
            <canvas id="canvas" width="300" height="300"></canvas><br>
            <button class="btn" onclick="clearCanvas()" style="background:#888; width:40%;">Стереть</button>
        </div>
        <button class="btn" onclick="sendAns()" style="background:#27ae60">ГОТОВО</button>
    </div>

    <div id="vote-ui" class="hidden">
        <h3>КТО СМЕШНЕЕ?</h3>
        <button id="b1" class="btn"></button>
        <button id="b2" class="btn" style="background:#3498db"></button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const params = new URLSearchParams(window.location.search);
        const name = params.get('name');
        const code = params.get('code').toUpperCase();
        const emoji = params.get('emoji');
        
        let canvas = document.getElementById('canvas');
        let ctx = canvas.getContext('2d');
        let drawing = false;
        let gameMode = 'classic';

        // РИСОВАЛКА
        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDraw);
        canvas.addEventListener('touchstart', (e) => { startDraw(e.touches[0]); e.preventDefault(); });
        canvas.addEventListener('touchmove', (e) => { draw(e.touches[0]); e.preventDefault(); });
        canvas.addEventListener('touchend', stopDraw);

        function startDraw(e) { drawing = true; ctx.beginPath(); ctx.moveTo(e.clientX - canvas.offsetLeft, e.clientY - canvas.offsetTop); }
        function draw(e) { if (!drawing) return; ctx.lineTo(e.clientX - canvas.offsetLeft, e.clientY - canvas.offsetTop); ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.stroke(); }
        function stopDraw() { drawing = false; }
        function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

        socket.emit('join-room', { code, name, emoji });
        socket.on('joined-success', () => { document.getElementById('status').innerText = "Ожидание начала..."; });

        socket.on('round-started', data => {
            gameMode = data.mode;
            let myTurn = (socket.id === data.p1_id || socket.id === data.p2_id);
            document.getElementById('status').classList.toggle('hidden', myTurn);
            document.getElementById('answer-ui').classList.toggle('hidden', !myTurn);
            document.getElementById('vote-ui').classList.add('hidden');
            
            if (myTurn) {
                document.getElementById('qText').innerText = data.q;
                document.getElementById('draw-inputs').classList.toggle('hidden', gameMode !== 'draw');
                const tInp = document.getElementById('text-inputs');
                tInp.innerHTML = '';
                if (gameMode === 'classic') tInp.innerHTML = '<input type="text" id="ansVal" placeholder="Твой ответ...">';
                if (gameMode === 'text') tInp.innerHTML = '<input type="text" id="a1" placeholder="Прилагательное..."><input type="text" id="a2" placeholder="Миф/Отзыв..."><input type="text" id="a3" placeholder="Действие...">';
            }
        });

        function sendAns() {
            let answer;
            if (gameMode === 'draw') {
                answer = canvas.toDataURL();
            } else if (gameMode === 'text') {
                answer = [document.getElementById('a1').value, document.getElementById('a2').value, document.getElementById('a3').value].join(" ");
            } else {
                answer = document.getElementById('ansVal').value;
            }
            socket.emit('submit-answer', { code, name, answer, type: gameMode });
            document.getElementById('answer-ui').classList.add('hidden');
            document.getElementById('status').classList.remove('hidden');
            document.getElementById('status').innerText = "Ждем других...";
        }

        socket.on('show-voting', data => {
            document.getElementById('status').classList.add('hidden');
            document.getElementById('vote-ui').classList.remove('hidden');
            document.getElementById('b1').innerText = (data.type === 'draw') ? "ЛЕВЫЙ РИСУНОК" : data.ans1;
            document.getElementById('b2').innerText = (data.type === 'draw') ? "ПРАВЫЙ РИСУНОК" : data.ans2;
            document.getElementById('b1').onclick = () => { socket.emit('cast-vote', {code, voteNum:1, voterName:name}); document.getElementById('vote-ui').classList.add('hidden'); };
            document.getElementById('b2').onclick = () => { socket.emit('cast-vote', {code, voteNum:2, voterName:name}); document.getElementById('vote-ui').classList.add('hidden'); };
        });
    </script>
</body>
</html>
