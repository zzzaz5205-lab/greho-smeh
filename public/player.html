<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ГРЕХО-СМЕХ | PLAYER</title>
    <style>
        body { font-family: sans-serif; background: #3e2723; color: white; text-align: center; padding: 20px; }
        .btn { background: #ef5350; color: white; width: 100%; padding: 20px; border: 4px solid #000; border-radius: 15px; font-weight: bold; font-size: 20px; }
        input { width: 90%; padding: 15px; border: 3px solid #fbc02d; border-radius: 10px; font-size: 18px; margin-bottom: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="join-ui">
        <h2>ВХОД В ИГРУ</h2>
        <input type="text" id="name" placeholder="ТВОЁ ИМЯ"><br>
        <input type="text" id="code" placeholder="КОД ИЗ 4 БУКВ"><br>
        <button class="btn" onclick="join()">ВОЙТИ</button>
    </div>

    <div id="wait-ui" class="hidden">
        <h1>ТЫ В ИГРЕ!</h1>
        <p>Жди начала раунда на большом экране...</p>
    </div>

    <div id="answer-ui" class="hidden">
        <h3 id="qText" style="color:#fbc02d"></h3>
        <input type="text" id="ansInput" placeholder="ТВОЯ ШУТКА..."><br>
        <button class="btn" onclick="sendAns()">ОТПРАВИТЬ</button>
    </div>

    <div id="vote-ui" class="hidden">
        <h3>КТО СМЕШНЕЕ?</h3>
        <button id="b1" class="btn" onclick="vote(1)" style="margin-bottom:10px"></button>
        <button id="b2" class="btn" onclick="vote(2)" style="background:#2196f3"></button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myName = "";
        let roomCode = "";

        function join() {
            myName = document.getElementById('name').value;
            roomCode = document.getElementById('code').value.toUpperCase();
            if(!myName || !roomCode) return alert("Заполни поля!");
            socket.emit('join-room', { code: roomCode, name: myName });
        }

        socket.on('joined-success', () => {
            document.getElementById('join-ui').classList.add('hidden');
            document.getElementById('wait-ui').classList.remove('hidden');
        });

        socket.on('round-started', d => {
            const isMyTurn = (myName === d.p1_name || myName === d.p2_name);
            document.getElementById('wait-ui').classList.add('hidden');
            document.getElementById('vote-ui').classList.add('hidden');
            
            if (isMyTurn) {
                document.getElementById('answer-ui').classList.remove('hidden');
                document.getElementById('qText').innerText = d.q;
            } else {
                document.getElementById('answer-ui').classList.add('hidden');
                document.body.innerHTML = "<h1>СМОТРИ НА ЭКРАН!</h1>";
            }
        });

        function sendAns() {
            const answer = document.getElementById('ansInput').value;
            socket.emit('submit-answer', { code: roomCode, name: myName, answer });
            document.getElementById('answer-ui').classList.add('hidden');
            document.body.innerHTML = "<h1>ПРИНЯТО! ЖДИ...</h1>";
        }

        socket.on('show-voting', d => {
            if (myName === d.p1 || myName === d.p2) return;
            document.body.innerHTML = ""; // Очистка заглушки
            document.body.appendChild(document.getElementById('vote-ui'));
            document.getElementById('vote-ui').classList.remove('hidden');
            document.getElementById('b1').innerText = d.ans1;
            document.getElementById('b2').innerText = d.ans2;
        });

        function vote(n) {
            socket.emit('cast-vote', { code: roomCode, voteNum: n, name: myName });
            document.body.innerHTML = "<h1>ГОЛОС УЧТЕН!</h1>";
        }

        socket.on('error-join', m => alert(m));
    </script>
</body>
</html>
