<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ГРЕХО-СМЕХ | HOST</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Roboto+Mono:wght@700&display=swap');
        body { margin: 0; padding: 0; overflow: hidden; background: #fbc02d; font-family: 'Montserrat', sans-serif; color: #3e2723; text-align: center; }
        .spiral { position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; background: repeating-conic-gradient(from 0deg, #f9a825 0deg 20deg, #fbc02d 20deg 40deg); animation: rotate 60s linear infinite; z-index: -1; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }

        /* ТАЙМЕР ЦИФРАМИ */
        #timer { 
            position: absolute; top: 20px; left: 30px; font-family: 'Roboto Mono', monospace; 
            font-size: 80px; color: #3e2723; text-shadow: 4px 4px 0 #fff; z-index: 10;
        }

        .screen { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; }
        #lobby { display: flex; }
        .big-code { font-size: 100px; background: #3e2723; color: #fbc02d; padding: 10px 50px; border-radius: 20px; }
        .bubble { background: #fff; border: 6px solid #3e2723; border-radius: 20px; padding: 30px; width: 40%; font-size: 45px; box-shadow: 10px 10px 0 rgba(0,0,0,0.1); }
        #card1 { transform: rotate(-3deg); } #card2 { transform: rotate(3deg); }
        .player-chip { background: #fff; border: 4px solid #3e2723; padding: 10px 20px; border-radius: 50px; margin: 10px; display: inline-block; font-size: 24px; }
    </style>
</head>
<body onclick="new Audio('lobby.mp3').play()">
    <div class="spiral"></div>
    <div id="timer"></div>
    
    <div id="lobby" class="screen">
        <h1>ГРЕХО-СМЕХ</h1>
        <div class="big-code" id="codeText">...</div>
        <div id="playerList"></div>
        <button onclick="socket.emit('start-game', curCode)" style="margin-top:30px; padding:20px 50px; font-size:25px; cursor:pointer;">ПОГНАЛИ!</button>
    </div>

    <div id="game" class="screen">
        <h2 id="qText" style="font-size: 50px; background: #fff; padding: 20px; border: 5px solid #3e2723;"></h2>
        <div id="voting" style="display:none; justify-content: center; gap: 40px; width: 100%; margin-top: 30px;">
            <div id="card1" class="bubble"></div>
            <div id="card2" class="bubble"></div>
        </div>
    </div>

    <div id="scores" class="screen">
        <h1>СЧЁТ</h1>
        <div id="scoreList"></div>
        <button onclick="socket.emit('next-after-scores', curCode)" style="padding:15px 40px; font-size:20px; cursor:pointer;">ДАЛЕЕ</button>
    </div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io(); let curCode = "", tVal = 0, tInt;

    function startLocalTimer(sec) {
        clearInterval(tInt);
        tVal = sec;
        const el = document.getElementById('timer');
        el.style.display = "block";
        tInt = setInterval(() => {
            el.innerText = tVal;
            if(tVal <= 5) el.style.color = "red"; else el.style.color = "#3e2723";
            if(tVal <= 0) { clearInterval(tInt); el.style.display = "none"; }
            tVal--;
        }, 1000);
    }

    socket.emit('create-room');
    socket.on('room-created', c => { curCode = c; document.getElementById('codeText').innerText = c; });
    socket.on('player-list-update', players => {
        document.getElementById('playerList').innerHTML = players.map(p => `<div class="player-chip">${p.name}</div>`).join('');
    });

    socket.on('round-started', d => {
        document.getElementById('lobby').style.display = "none";
        document.getElementById('scores').style.display = "none";
        document.getElementById('game').style.display = "flex";
        document.getElementById('voting').style.display = "none";
        document.getElementById('qText').innerText = d.q;
        startLocalTimer(d.time);
    });

    socket.on('show-voting', d => {
        document.getElementById('voting').style.display = "flex";
        document.getElementById('card1').innerText = d.ans1;
        document.getElementById('card2').innerText = d.ans2;
        startLocalTimer(d.time);
    });

    socket.on('show-scores', players => {
        document.getElementById('game').style.display = "none";
        document.getElementById('scores').style.display = "flex";
        document.getElementById('scoreList').innerHTML = players.map(p => `<h2>${p.name}: ${p.score}</h2>`).join('');
    });
</script>
</body>
</html>
