<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ЭКРАН ХОСТА</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap');
        body { font-family: 'Montserrat', sans-serif; background: #1a1a2e; color: white; text-align: center; margin: 0; overflow: hidden; }
        .top-code { position: absolute; top: 20px; right: 20px; background: #e94560; padding: 10px 30px; border-radius: 15px; font-weight: 900; border: 3px solid white; z-index: 1000; font-size: 60px; font-family: monospace; }
        #lobby, #game, #final, #credits { display: none; padding: 20px; }
        #lobby { display: block; }
        .settings-btn { position: absolute; top: 20px; left: 20px; font-size: 50px; cursor: pointer; z-index: 1100; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #16213e; padding: 40px; border: 5px solid #e94560; border-radius: 30px; z-index: 2000; width: 400px; }
        .modal.active { display: block; }
        .ans-card { background: #0f3460; padding: 30px; border-radius: 25px; width: 44%; border: 6px solid #e94560; font-size: 35px; min-height: 350px; display: inline-block; vertical-align: top; margin: 15px; }
        .audio-btn { background: linear-gradient(135deg, #e94560 0%, #950740 100%); color: white; padding: 25px 40px; border-radius: 20px; font-size: 24px; border: none; cursor: pointer; margin-top: 20px; font-weight: bold; }
        #credits { position: fixed; top: 100%; left: 0; width: 100%; height: 400%; background: #000; z-index: 5000; }
        .c-scroll { position: absolute; width: 100%; animation: scrl 20s linear forwards; font-size: 35px; line-height: 2.5; }
        @keyframes scrl { 0% { top: 100%; } 100% { top: -350%; } }
    </style>
</head>
<body onclick="playMusic('lobby')">
<div id="corner-code" class="top-code" style="display:none;">...</div>
<div id="settings-modal" class="modal">
    <h2 style="color:#f1c40f">РЕЖИМ ИГРЫ</h2>
    <select id="gameMode" style="padding:15px; font-size:20px; width:100%; border-radius:10px;">
        <option value="classic">Грехо-Смех</option>
        <option value="text">Смехо-Текст</option>
        <option value="draw">Рисовалка</option>
        <option value="voice">Войс-Смех</option>
    </select><br><br>
    <button onclick="toggleSet()" style="padding:10px 20px; cursor:pointer;">ЗАКРЫТЬ</button>
</div>
<div id="lobby">
    <div class="settings-btn" onclick="toggleSet()">⚙️</div>
    <div style="font-size: 60px; color: #e94560; margin-top: 40px;">ГРЕХО-СМЕХ</div>
    <div id="bigCode" style="font-size:130px; color:#f1c40f; margin: 40px 0;">...</div>
    <div id="playerList"></div><br>
    <button onclick="startGame()" style="padding:25px 60px; background:#27ae60; color:white; border-radius:50px; font-size:30px; font-weight:bold; border:none; cursor:pointer;">НАЧАТЬ</button>
</div>
<div id="game">
    <h2 id="qText" style="font-size: 50px; margin: 40px;"></h2>
    <div id="voting" style="display:none;">
        <div id="card1" class="ans-card"></div>
        <div id="card2" class="ans-card" style="border-color:#3498db"></div>
    </div>
</div>
<div id="final">
    <h1 style="font-size: 60px;">🏆 ПОБЕДИТЕЛЬ:</h1>
    <div id="winner" style="color:#f1c40f; font-size: 100px; font-weight: 900;"></div>
</div>
<div id="credits"><div class="c-scroll"><h1>ГРЕХО-СМЕХ</h1><br>Ванга Фiйко Перфоратор<br>Дима Moderass<br>Греха и ИИ-шка<br><br>СПАСИБО ЗА ИГРУ!</div></div>
<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io(); let curCode = "", tInt;
    const music = { lobby: new Audio('https://cdn.pixabay.com/audio/2022/03/10/audio_f5f69f2001.mp3'), game: new Audio('https://cdn.pixabay.com/audio/2022/01/18/audio_d19d678d8a.mp3'), final: new Audio('https://cdn.pixabay.com/audio/2021/08/04/audio_c363842422.mp3') };
    function playMusic(t) { Object.values(music).forEach(m=>{m.pause();m.currentTime=0;}); music[t].loop=true; music[t].volume=0.3; music[t].play(); }
    function toggleSet() { document.getElementById('settings-modal').classList.toggle('active'); }
    socket.emit('create-room');
    socket.on('room-created', c => { curCode = c; document.getElementById('bigCode').innerText = c; document.getElementById('corner-code').innerText = c; });
    socket.on('player-joined', p => { document.getElementById('playerList').innerHTML += `<div id="p-${p.id}" style="background:#e94560; padding:15px; border-radius:50px; display:inline-block; margin:5px; font-weight:bold; font-size:24px;">${p.emoji} ${p.name}</div>`; });
    socket.on('update-player-emoji', d => { const div = document.getElementById(`p-${d.id}`); if(div) div.innerHTML = `${d.emoji} ${div.innerText.split(' ')[1]}`; });
    function startGame() { playMusic('game'); document.getElementById('corner-code').style.display='block'; socket.emit('start-game', { code: curCode, mode: document.getElementById('gameMode').value }); }
    function speak(t, cb) { window.speechSynthesis.cancel(); const m = new SpeechSynthesisUtterance(t); m.pitch=0.4; m.rate=0.85; m.onend=cb; window.speechSynthesis.speak(m); }
    socket.on('round-started', d => {
        document.getElementById('lobby').style.display="none"; document.getElementById('game').style.display="block"; document.getElementById('voting').style.display="none";
        document.getElementById('qText').innerText = d.q; speak(d.q);
        let tl = 30; clearInterval(tInt); tInt = setInterval(() => { document.getElementById('corner-code').innerText = "00:" + (tl < 10 ? "0" + tl : tl); if(tl<=0) clearInterval(tInt); tl--; }, 1000);
    });
    socket.on('show-voting', d => {
        clearInterval(tInt); document.getElementById('corner-code').innerText = curCode; document.getElementById('voting').style.display="flex";
        const c1=document.getElementById('card1'), c2=document.getElementById('card2');
        c1.innerHTML = d.ans1==='EMPTY' ? "<i>Молчание...</i>" : (d.type==='draw'?`<img src="${d.ans1}" style="width:100%">` : (d.type==='voice'?`<button class="audio-btn" onclick="new Audio('${d.ans1}').play()">▶ СЛУШАТЬ</button>` : d.ans1));
        c2.innerHTML = d.ans2==='EMPTY' ? "<i>Молчание...</i>" : (d.type==='draw'?`<img src="${d.ans2}" style="width:100%">` : (d.type==='voice'?`<button class="audio-btn" onclick="new Audio('${d.ans2}').play()">▶ СЛУШАТЬ</button>` : d.ans2));
        if(d.isSolo) { c2.style.display="none"; speak("Одиночное выступление!"); }
        else speak("Чей вариант лучше?");
        if(d.ans1==='EMPTY') speak("Первый игрок промолчал.");
        if(d.ans2==='EMPTY') speak("Второй игрок тоже ничего не сказал.");
    });
    socket.on('voting-results', d => {
        document.getElementById('card1').innerHTML += `<br><small>${d.p1.emoji} ${d.p1.name} (${d.v1})</small>`;
        if(!d.isSolo) document.getElementById('card2').innerHTML += `<br><small>${d.p2.emoji} ${d.p2.name} (${d.v2})</small>`;
    });
    socket.on('final-results', d => {
        playMusic('final'); document.getElementById('game').style.display="none"; document.getElementById('final').style.display="block";
        document.getElementById('winner').innerText = d.players[0].emoji + " " + d.players[0].name;
        setTimeout(() => { document.getElementById('final').style.display="none"; document.getElementById('credits').style.display="block"; setTimeout(() => socket.emit('finish-credits', curCode), 18000); }, 6000);
    });
    socket.on('go-to-menu', () => location.href='index.html');
</script>
</body>
</html>
