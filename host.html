<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ГРЕХО-СМЕХ | HOST</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap');
        body { margin: 0; padding: 0; overflow: hidden; background: #fbc02d; font-family: 'Montserrat', sans-serif; text-align: center; color: #3e2723; }
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; }
        .screen { display: none; height: 100vh; width: 100vw; flex-direction: column; align-items: center; justify-content: center; position: absolute; }
        #lobby { display: flex; }

        /* ГЕОМЕТРИЧЕСКИЕ ПЕРСОНАЖИ */
        .char { width: 140px; height: 140px; border: 7px solid #000; position: absolute; display: flex; align-items: center; justify-content: center; animation: breathe 3s infinite ease-in-out; transform: translate(-50%, -50%); }
        .cube { border-radius: 25px; } .circle { border-radius: 50%; } .poly { clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%); }
        .eyes { width: 50%; height: 15px; background: #000; border-radius: 10px; position: relative; }
        .eyes::after, .eyes::before { content:''; position:absolute; width:8px; height:8px; background:#fff; border-radius:50%; top:2px; }
        .eyes::before { left: 4px; } .eyes::after { right: 4px; }
        @keyframes breathe { 0%, 100% { transform: translate(-50%, -50%) scale(1) rotate(-3deg); } 50% { transform: translate(-50%, -50%) scale(1.1) rotate(3deg); } }

        .bubble { background: #fff; border: 8px solid #3e2723; border-radius: 30px; padding: 30px; width: 42%; font-size: 45px; font-weight: 900; box-shadow: 15px 15px 0 rgba(0,0,0,0.1); }
        #card1 { transform: rotate(-2deg); } #card2 { transform: rotate(2deg); }
        .room-code-box { background: #fff; border: 8px solid #000; padding: 20px 60px; transform: rotate(-2deg); margin-bottom: 50px; }
        .main-btn { background: #4caf50; border: 6px solid #000; color: #fff; padding: 20px 60px; font-size: 35px; border-radius: 100px; cursor: pointer; font-weight: 900; }
        .score-row { font-size: 40px; background: #000; color: #fff; padding: 10px 40px; border-radius: 15px; margin: 10px; border: 4px solid #fff; display: flex; justify-content: space-between; width: 600px; }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <div id="lobby" class="screen">
        <h1 style="font-size: 90px; text-shadow: 6px 6px 0 #fff; margin:0;">ГРЕХО-СМЕХ</h1>
        <div class="room-code-box"><span>КОД:</span><br><b id="roomCode" style="font-size: 100px;">...</b></div>
        <div id="playerList" style="position:relative; width:600px; height:500px;"></div>
        <button onclick="socket.emit('start-game', curCode)" class="main-btn">ПОГНАЛИ!</button>
    </div>

    <div id="game" class="screen">
        <h2 id="qText" style="font-size: 60px; background: #fff; padding: 20px 40px; border: 8px solid #000; transform: rotate(-1deg);"></h2>
        <div id="voting" style="display:none; width:100%; justify-content:center; gap:40px; margin-top:40px;">
            <div id="card1" class="bubble"></div>
            <div id="card2" class="bubble"></div>
        </div>
    </div>

    <div id="scores" class="screen">
        <h1>СЧЁТ</h1><div id="scoreList"></div>
        <button onclick="socket.emit('next-after-scores', curCode)" class="main-btn" style="margin-top:20px; font-size:20px;">ДАЛЕЕ</button>
    </div>

    <div id="final" class="screen"><h1>ПОБЕДИТЕЛЬ</h1><div id="winner" style="font-size: 120px; color: #ef5350;"></div></div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let curCode = "", angle = 0;
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');

    function drawSpiral() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        ctx.translate(canvas.width/2, canvas.height/2); ctx.rotate(angle);
        for(let i=0; i<12; i++){
            ctx.beginPath(); ctx.rotate(Math.PI/6); ctx.moveTo(0,0);
            ctx.lineTo(2000, 400); ctx.lineTo(2000, -400);
            ctx.fillStyle = i%2==0 ? '#fbc02d' : '#f9a825'; ctx.fill();
        }
        angle += 0.005; requestAnimationFrame(drawSpiral);
    }
    drawSpiral();

    socket.emit('create-room', sessionStorage.getItem('lastCode'));
    socket.on('room-created', c => { curCode = c; sessionStorage.setItem('lastCode', c); document.getElementById('roomCode').innerText = c; });

    socket.on('player-list-update', players => {
        const list = document.getElementById('playerList');
        list.innerHTML = "";
        players.forEach((p, i) => {
            const a = (i / players.length) * Math.PI * 2 - Math.PI/2;
            const x = Math.cos(a) * 250 + 300; const y = Math.sin(a) * 250 + 250;
            list.innerHTML += `<div class="char ${p.char?.shape || 'cube'}" style="left:${x}px; top:${y}px; background:${p.char?.color || '#fff'}">
                <div class="eyes"></div><b style="position:absolute; bottom:-35px; color:#000">${p.name}</b>
            </div>`;
        });
    });

    socket.on('round-started', d => {
        document.getElementById('lobby').style.display='none'; document.getElementById('scores').style.display='none';
        document.getElementById('game').style.display='flex'; document.getElementById('voting').style.display='none';
        document.getElementById('qText').innerText = d.q;
    });

    socket.on('show-voting', d => {
        document.getElementById('voting').style.display='flex';
        document.getElementById('card1').innerText = d.ans1;
        document.getElementById('card2').innerText = d.ans2 || "...";
    });

    socket.on('show-scores', d => {
        document.getElementById('game').style.display='none'; document.getElementById('scores').style.display='flex';
        document.getElementById('scoreList').innerHTML = d.players.sort((a,b)=>b.score-a.score).map((p,i)=>`
            <div class="score-row"><span>${i+1}. ${p.name}</span><b>${p.score}</b></div>
        `).join('');
    });

    socket.on('final-results', d => {
        document.getElementById('scores').style.display='none'; document.getElementById('final').style.display='flex';
        document.getElementById('winner').innerText = d.players[0].name;
    });
</script>
</body>
</html>
