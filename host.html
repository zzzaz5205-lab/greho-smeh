<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>СМЕХЛЫСТ | HOST</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Montserrat:wght@900&family=Roboto+Mono:wght@700&display=swap');
        
        body { 
            margin: 0; padding: 0; overflow: hidden; background: #fbc02d;
            font-family: 'Montserrat', sans-serif; color: #3e2723; text-align: center;
        }

        /* ГИПНО-СПИРАЛЬ */
        #spiral-bg {
            position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            background: repeating-conic-gradient(from 0deg, #f9a825 0deg 15deg, #fbc02d 15deg 30deg);
            animation: rotate 60s linear infinite; z-index: -1;
        }
        @keyframes rotate { 100% { transform: rotate(360deg); } }

        /* ТАЙМЕР */
        #digital-timer {
            position: absolute; top: 20px; left: 30px; background: #000; color: #fff;
            padding: 10px 20px; font-family: 'Roboto Mono'; font-size: 80px;
            border: 5px solid #fff; transform: rotate(-5deg); z-index: 1000; display: none;
        }

        /* КОД В УГЛУ */
        .top-code {
            position: absolute; top: 15px; right: 20px; background: #fff;
            padding: 10px 20px; border: 6px solid #000; transform: rotate(2deg);
        }
        .top-code span { font-size: 14px; display: block; color: #777; }
        .top-code b { font-size: 40px; font-family: 'Roboto Mono'; }

        /* ЭКРАНЫ */
        .screen { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; position: absolute; width: 100%; }
        #lobby { display: flex; }

        /* ПЕРСОНАЖИ-МОНСТРЫ */
        .char { 
            width: 140px; height: 140px; border: 6px solid #000; position: absolute;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #fff; transition: 0.8s ease-out; animation: wobble 2.5s infinite;
        }
        .shape-square { border-radius: 20px; }
        .shape-circle { border-radius: 50%; }
        .shape-poly { clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%); }
        
        .eyes { width: 50%; height: 15px; background: #000; border-radius: 10px; position: relative; }
        .eyes::before, .eyes::after { content:''; position:absolute; width:8px; height:8px; background:#fff; border-radius:50%; top:2px; }
        .eyes::before { left: 15%; } .eyes::after { right: 15%; }

        @keyframes wobble { 0%, 100% { transform: translate(-50%, -50%) rotate(-3deg) scale(1); } 50% { transform: translate(-50%, -50%) rotate(3deg) scale(1.05); } }

        /* БАБЛЫ */
        .bubble {
            background: #fff; border: 8px solid #000; border-radius: 30px;
            padding: 40px; width: 44%; min-height: 250px; font-size: 55px;
            font-weight: 900; box-shadow: 20px 20px 0 rgba(0,0,0,0.1);
        }
        #card1 { transform: rotate(-3deg); } #card2 { transform: rotate(3deg); border-color: #ef5350; }

        /* СЧЕТ 3D */
        .score-item { display: flex; align-items: center; margin: 10px; }
        .rank-num { font-size: 100px; font-family: 'Luckiest Guy'; color: #fff; text-shadow: 8px 8px 0 #5d4037; width: 120px; }
        .score-name { background: #000; color: #fff; padding: 10px 40px; border-radius: 15px; font-size: 40px; width: 500px; display: flex; justify-content: space-between; }

        .main-btn { background: #4caf50; border: 6px solid #000; color: #fff; padding: 20px 60px; font-size: 35px; border-radius: 100px; cursor: pointer; font-family: 'Luckiest Guy'; }
    </style>
</head>
<body onclick="playMusic('lobby')">
    <div id="spiral-bg"></div>
    <div id="digital-timer">30</div>
    <div id="corner-code" class="top-code" style="display:none;"><span>JOIN AT:</span><b id="c-val">...</b></div>

    <div id="lobby" class="screen">
        <h1 style="font-size: 100px; font-family: 'Luckiest Guy'; color: #fff; text-shadow: 10px 10px 0 #000;">ГРЕХО-СМЕХ</h1>
        <div style="background:#000; color:#ffeb3b; padding:20px 80px; border:8px solid #fff; font-size:120px; font-family:'Roboto Mono'; transform:rotate(-2deg);">...</div>
        <div id="playerList" style="position:relative; width:800px; height:500px;"></div>
        <button onclick="socket.emit('start-game', curCode)" class="main-btn">ПОГНАЛИ!</button>
    </div>

    <div id="game" class="screen">
        <h2 id="qText" style="font-size: 65px; text-shadow: 6px 6px 0 #fff; max-width: 90%;"></h2>
        <div style="display:none; justify-content:center; gap:30px; width:100%" id="voting">
            <div id="card1" class="bubble"></div>
            <div id="card2" class="bubble"></div>
        </div>
    </div>

    <div id="scores" class="screen">
        <h1 style="font-size:80px; font-family:'Luckiest Guy'; color:#fff; text-shadow:8px 8px 0 #000;">КТО ВЫИГРЫВАЕТ?</h1>
        <div id="scoreList"></div>
        <button onclick="socket.emit('next-after-scores', curCode)" class="main-btn" style="margin-top:20px">ДАЛЕЕ</button>
    </div>

    <div id="final" class="screen">
        <h1 style="font-size:80px; font-family:'Luckiest Guy';">ПОБЕДИТЕЛЬ</h1>
        <div id="winner" style="font-size:150px; color:#ef5350;"></div>
    </div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io(); 
    let curCode = "", countdownInt, audioInited = false;
    let gameSettings = { timer: 30, voice: 'male' };
    const music = { lobby: new Audio('lobby.mp3'), game: new Audio('game.mp3'), final: new Audio('final.mp3') };

    function playMusic(t) { Object.values(music).forEach(m=>{m.pause();m.currentTime=0;}); music[t].loop=true; music[t].volume=0.3; music[t].play(); }

    socket.emit('create-room', sessionStorage.getItem('lastCode'));
    socket.on('room-created', c => { curCode = c; sessionStorage.setItem('lastCode', c); document.querySelector('#lobby div').innerText = c; document.getElementById('c-val').innerText = c; });

    socket.on('player-list-update', players => {
        const list = document.getElementById('playerList'); list.innerHTML = "";
        players.forEach((p, i) => {
            const a = (i / players.length) * Math.PI * 2;
            const x = Math.cos(a) * 350 + 400; const y = Math.sin(a) * 250 + 250;
            list.innerHTML += `<div class="char shape-${p.char.shape}" style="left:${x}px; top:${y}px; border-color:${p.char.color}">
                <div class="eyes"></div><b style="color:#000; margin-top:10px">${p.name}</b>
            </div>`;
        });
    });

    function speak(t, cb) {
        window.speechSynthesis.cancel(); const m = new SpeechSynthesisUtterance(t);
        const vs = window.speechSynthesis.getVoices();
        m.voice = vs.find(v => v.lang.includes('ru') && v.name.includes('David')) || vs[0];
        m.pitch = 0.45; m.rate = 0.9; m.onend = cb; window.speechSynthesis.speak(m);
    }

    socket.on('round-started', d => {
        document.getElementById('lobby').style.display='none'; document.getElementById('scores').style.display='none';
        document.getElementById('game').style.display='flex'; document.getElementById('voting').style.display='none';
        document.getElementById('qText').innerText = d.q; speak(d.q);
        
        let tl = 30; const tEl = document.getElementById('digital-timer');
        tEl.style.display='block'; tInt = setInterval(() => { tEl.innerText=tl; if(tl<=5) tEl.style.color='red'; if(tl<=0) clearInterval(tInt); tl--; }, 1000);
    });

    socket.on('show-voting', d => {
        clearInterval(tInt); document.getElementById('digital-timer').style.display='none';
        document.getElementById('voting').style.display='flex';
        document.getElementById('card1').innerText = d.ans1;
        document.getElementById('card2').innerText = d.ans2 || "...";
        speak("Чей ответ лучше?");
    });

    socket.on('voting-results', d => {
        document.getElementById('card1').innerHTML += `<div style="font-size:25px; color:blue">${d.p1.name}</div>`;
        if(!d.isSolo) document.getElementById('card2').innerHTML += `<div style="font-size:25px; color:red">${d.p2.name}</div>`;
        setTimeout(() => speak(d.aiComment), 1000);
    });

    socket.on('show-scores', d => {
        document.getElementById('game').style.display='none'; document.getElementById('scores').style.display='flex';
        document.getElementById('scoreList').innerHTML = d.players.sort((a,b)=>b.score-a.score).map((p,i)=>`
            <div class="score-item"><div class="rank-num">${i+1}</div><div class="score-name"><span>${p.name}</span><b>${p.score}</b></div></div>
        `).join('');
    });
</script>
</body>
</html>
