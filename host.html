<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- Иконка геймпада -->
    <link rel="icon" href="https://fav.farm/🎮" />
    <title>ГРЕХО-СМЕХ | ЭКРАН ХОСТА</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Roboto+Mono:wght@700&display=swap');
        
        body { 
            font-family: 'Montserrat', sans-serif; 
            background: #1a1a2e; 
            color: white; 
            text-align: center; 
            margin: 0; 
            overflow: hidden; 
            user-select: none;
        }

        /* ГИГАНТСКИЙ КОД В УГЛУ */
        .top-code { 
            position: absolute; top: 20px; right: 20px; 
            background: #e94560; padding: 15px 40px; 
            border-radius: 20px; font-weight: 900; 
            border: 4px solid white; z-index: 1000; 
            font-family: 'Roboto Mono', monospace; 
            font-size: 70px; 
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.8);
            letter-spacing: 5px;
        }

        #lobby, #game, #final, #credits { display: none; padding: 20px; }
        #lobby { display: block; }

        /* ЛОББИ */
        .logo { font-size: 80px; color: #e94560; margin: 20px; text-transform: uppercase; letter-spacing: 5px; }
        #roomCodeBig { 
            background: #0f3460; padding: 30px 80px; 
            border: 6px solid #e94560; display: inline-block; 
            border-radius: 30px; font-size: 130px; 
            font-family: 'Roboto Mono', monospace; color: #f1c40f;
            text-shadow: 5px 5px 0 #000; margin: 30px 0;
        }

        /* НАСТРОЙКИ */
        .settings-btn { position: absolute; top: 20px; left: 20px; font-size: 50px; cursor: pointer; z-index: 1100; transition: 0.3s; }
        .settings-btn:hover { transform: rotate(90deg); }
        .modal { 
            display: none; position: fixed; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); background: #16213e; 
            padding: 50px; border: 6px solid #e94560; border-radius: 30px; 
            z-index: 2000; width: 500px; box-shadow: 0 0 100px #000;
        }
        .modal.active { display: block; }

        /* ИГРОВОЕ ПОЛЕ */
        .ans-card { 
            background: #0f3460; padding: 30px; border-radius: 25px; 
            width: 44%; border: 6px solid #e94560; font-size: 35px; 
            min-height: 380px; display: inline-block; vertical-align: top; 
            margin: 15px; position: relative; transition: 0.5s;
        }
        .ans-card.solo { width: 75%; background: #444; border-color: #888; color: #ccc; }
        img.drawing { width: 100%; height: auto; max-height: 400px; border-radius: 15px; background: white; }

        /* КНОПКА АУДИО (ВОЙС-РЕЖИМ) */
        .audio-btn {
            background: linear-gradient(135deg, #e94560 0%, #950740 100%);
            border: none; color: white; padding: 30px 50px; 
            border-radius: 20px; font-size: 26px; font-weight: bold;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            gap: 15px; margin: 20px auto; transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .audio-btn:hover { transform: scale(1.1); filter: brightness(1.2); }

        /* ТИТРЫ */
        #credits { position: fixed; top: 100%; left: 0; width: 100%; height: 400%; background: #000; z-index: 5000; }
        .credits-scroll { 
            position: absolute; width: 100%; 
            animation: scrollCredits 20s linear forwards; 
            font-size: 35px; line-height: 2;
        }
        @keyframes scrollCredits { 
            0% { top: 100%; } 
            100% { top: -350%; } 
        }

        .player-chip { 
            background:#e94560; padding:15px 35px; border-radius:50px; 
            margin:10px; display: inline-block; font-weight: bold; font-size: 26px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body onclick="initAudio()">

<!-- Код в углу -->
<div id="corner-code" class="top-code" style="display:none;">...</div>

<!-- Модалка настроек -->
<div id="settings-modal" class="modal">
    <h1 style="color:#f1c40f; margin-top:0;">НАСТРОЙКИ</h1>
    <div style="margin:30px 0; text-align: left;">
        <label style="font-size: 24px;">РЕЖИМ ИГРЫ:</label><br><br>
        <select id="gameMode" style="padding:20px; font-size:22px; width:100%; border-radius:15px; background:#1a1a2e; color:white; border:2px solid #e94560;">
            <option value="classic">Грехо-Смех (Классика)</option>
            <option value="text">Смехо-Текст (Отзывы)</option>
            <option value="draw">Рисовалка (Шедевры)</option>
            <option value="voice">Войс-Смех (Аудио)</option>
        </select>
    </div>
    <button onclick="toggleSettings()" style="padding:15px 40px; background:#e94560; color:white; border:none; border-radius:15px; font-size:20px; cursor:pointer;">СОХРАНИТЬ</button>
</div>

<!-- ЛОББИ -->
<div id="lobby">
    <div class="settings-btn" onclick="toggleSettings()">⚙️</div>
    <div class="logo">ГРЕХО-СМЕХ</div>
    <div style="font-size: 28px; color: #ccc;">Введите код на телефоне:</div>
    <div id="roomCodeBig">...</div>
    <div id="playerList" style="margin: 40px; min-height: 100px;"></div>
    <button onclick="startGame()" style="padding:30px 80px; background:#27ae60; color:white; border-radius:60px; font-size:35px; font-weight:bold; border:none; cursor:pointer; box-shadow: 0 8px 0 #1e8449;">НАЧАТЬ ПАРТИЮ</button>
</div>

<!-- ИГРА -->
<div id="game">
    <h2 id="qText" style="font-size: 55px; margin: 40px; text-shadow: 0 5px 15px #000;"></h2>
    <div id="voting" style="display:none;">
        <div id="card1" class="ans-card"></div>
        <div id="card2" class="ans-card" style="border-color:#3498db"></div>
    </div>
</div>

<!-- ПОБЕДИТЕЛЬ -->
<div id="final">
    <h1 style="font-size: 70px; margin-top: 100px;">🏆 ПОБЕДИТЕЛЬ:</h1>
    <div id="winner" style="color:#f1c40f; font-size: 110px; font-weight: 900; text-shadow: 0 0 30px #f1c40f;"></div>
</div>

<!-- ТИТРЫ -->
<div id="credits">
    <div class="credits-scroll">
        <h1 style="font-size: 100px; color:#e94560;">ГРЕХО-СМЕХ</h1>
        <h2 style="color:#f1c40f">СПАСИБО ЗА ИГРУ!</h2>
        <div style="margin-top:150px;">
            <b style="color:#e94560">АМБАССАДОР:</b><br>
            Ванга Фiйко Перфоратор<br><br>
            <b style="color:#e94560">МОДЕРАЦИЯ:</b><br>
            Дима Moderass<br><br>
            <b style="color:#e94560">РАЗРАБОТКА:</b><br>
            Греха & ИИ-шка
        </div>
        <div style="margin-top:200px; font-size: 30px; opacity: 0.6;">
            СЕРВЕР ОЧИЩЕН. ВОЗВРАЩАЕМСЯ В МЕНЮ...
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let currentCode = "";
    let isAudioInited = false;

    // МУЗЫКА
    const music = {
        lobby: new Audio('https://cdn.pixabay.com/audio/2022/03/10/audio_f5f69f2001.mp3'),
        game: new Audio('https://cdn.pixabay.com/audio/2022/01/18/audio_d19d678d8a.mp3'),
        final: new Audio('https://cdn.pixabay.com/audio/2021/08/04/audio_c363842422.mp3')
    };

    function playMusic(t) {
        Object.values(music).forEach(m => { m.pause(); m.currentTime = 0; });
        music[t].loop = true;
        music[t].volume = 0.25;
        music[t].play().catch(() => {});
    }

    function initAudio() {
        if (!isAudioInited) {
            playMusic('lobby');
            isAudioInited = true;
        }
    }

    function toggleSettings() { document.getElementById('settings-modal').classList.toggle('active'); }

    // ПОДКЛЮЧЕНИЕ
    socket.emit('create-room');
    socket.on('room-created', c => { 
        currentCode = c;
        document.getElementById('roomCodeBig').innerText = c; 
        document.getElementById('corner-code').innerText = c;
    });
    
    socket.on('player-joined', p => { 
        // Если есть аватарка (Twitch), используем её, иначе эмодзи
        const icon = p.avatar ? `<img src="${p.avatar}" style="width:40px; border-radius:50%; vertical-align:middle; margin-right:10px;">` : p.emoji;
        document.getElementById('playerList').innerHTML += `<div id="p-${p.id}" class="player-chip">${icon} ${p.name}</div>`; 
    });

    socket.on('update-player-emoji', data => {
        const pDiv = document.getElementById(`p-${data.id}`);
        if(pDiv) {
            const name = pDiv.innerText.trim().split(' ').pop();
            pDiv.innerHTML = `${data.emoji} ${name}`;
        }
    });

    function startGame() { 
        playMusic('game');
        document.getElementById('corner-code').style.display = 'block';
        socket.emit('start-game', { code: currentCode, mode: document.getElementById('gameMode').value }); 
    }

    // ДИКТОР (Робо-Павел)
    function speak(text, callback) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        const voices = window.speechSynthesis.getVoices();
        msg.voice = voices.find(v => v.name.includes('Pavel') || v.lang.includes('ru')) || voices[0];
        msg.pitch = 0.5; // Бас
        msg.rate = 0.9;
        msg.onend = callback;
        window.speechSynthesis.speak(msg);
    }

    function clearBoard() {
        document.getElementById('voting').style.display = "none";
        document.getElementById('card1').innerHTML = "";
        document.getElementById('card2').innerHTML = "";
        document.getElementById('card1').className = "ans-card";
        document.getElementById('card2').className = "ans-card";
    }

    socket.on('round-started', d => {
        clearBoard();
        document.getElementById('lobby').style.display="none";
        document.getElementById('game').style.display="block";
        document.getElementById('qText').innerText = d.q;
        speak(d.q);
    });

    socket.on('show-voting', d => {
        document.getElementById('voting').style.display="flex";
        const c1 = document.getElementById('card1');
        const c2 = document.getElementById('card2');
        
        if (d.isSolo) c1.className += " solo";

        const drawElement = (content, card) => {
            if (d.type === 'voice') {
                card.innerHTML = `<button class="audio-btn pulse" onclick="new Audio('${content}').play()">▶ СЛУШАТЬ ГОЛОС</button>`;
            } else if (d.type === 'draw') {
                card.innerHTML = `<img src="${content}" class="drawing">`;
            } else {
                card.innerText = content;
            }
        };

        drawElement(d.ans1, c1);
        if (!d.isSolo) {
            drawElement(d.ans2, c2);
            // Диктор читает ответы, если это текст
            if (d.type !== 'draw' && d.type !== 'voice') {
                speak("Первый вариант...", () => {
                    speak(d.ans1, () => {
                        setTimeout(() => {
                            speak("Второй вариант...", () => speak(d.ans2));
                        }, 600);
                    });
                });
            }
        } else {
            c2.style.display = "none";
            speak("Одиночное выступление. Слушаем ответ:", () => {
                if (d.type === 'classic' || d.type === 'text') speak(d.ans1);
            });
        }
    });

    socket.on('voting-results', d => {
        const reveal = (player, card, color) => {
            if(!player) return;
            card.innerHTML += `<br><div style="color:${color}; font-size:24px; margin-top:20px;">${player.emoji || ''} ${player.name} (Голосов: ${d.v1 || d.v2})</div>`;
        };
        reveal(d.p1, document.getElementById('card1'), '#f1c40f');
        if (!d.isSolo) reveal(d.p2, document.getElementById('card2'), '#3498db');
        speak("Результаты на экране!");
    });

    socket.on('final-results', d => {
        playMusic('final');
        document.getElementById('game').style.display="none";
        document.getElementById('final').style.display="block";
        document.getElementById('winner').innerText = (d.players[0].emoji || '') + " " + d.players[0].name;
        
        speak("Игра окончена! Победил " + d.players[0].name + ". А теперь — титры!");

        setTimeout(() => {
            document.getElementById('final').style.display="none";
            document.getElementById('credits').style.display="block";
            // Через 18 секунд (длина анимации + запас) кикаем всех в меню
            setTimeout(() => {
                socket.emit('finish-credits', currentCode);
            }, 18000);
        }, 7000);
    });

    // Если сервер прислал команду на выход (после титров)
    socket.on('go-to-menu', () => { window.location.href = 'index.html'; });
</script>
</body>
</html>
