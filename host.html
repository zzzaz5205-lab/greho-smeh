<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ГРЕХО-СМЕХ | HOST</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Roboto+Mono:wght@700&display=swap');
        body { margin: 0; padding: 0; overflow: hidden; background: #fbc02d; font-family: 'Montserrat', sans-serif; color: #3e2723; text-align: center; perspective: 1500px; }
        .spiral { position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; background: repeating-conic-gradient(from 0deg, #f9a825 0deg 20deg, #fbc02d 20deg 40deg); animation: rotateSpiral 40s linear infinite; z-index: -1; }
        @keyframes rotateSpiral { 100% { transform: rotate(360deg); } }
        
        #digital-timer { position: absolute; top: 20px; left: 30px; font-size: 85px; font-family: 'Roboto Mono'; font-weight: 900; text-shadow: 6px 6px 0 #000; color: #fff; z-index: 1000; display: none; transform: rotate(-5deg); }
        .screen { display: none; height: 100vh; width: 100vw; flex-direction: column; align-items: center; justify-content: center; position: absolute; top:0; left:0; }
        
        /* БАБЛЫ С ФИКСИРОВАННЫМ ЦЕНТРОМ */
        #voting { display: none; width: 100%; height: 400px; position: relative; margin-top: 50px; }
        .bubble { 
            background: #fff; border: 8px solid #3e2723; border-radius: 25px; 
            padding: 30px; width: 40%; min-height: 200px; font-size: 40px; 
            font-weight: 900; box-shadow: 15px 15px 0 rgba(0,0,0,0.1); 
            position: absolute; top: 50%; transition: all 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            display: flex; align-items: center; justify-content: center;
        }
        #card1 { left: 5%; transform: translateY(-50%) rotate(-3deg); }
        #card2 { right: 5%; transform: translateY(-50%) rotate(3deg); }
        .bubble.refusal { background: #bbb !important; color: #666 !important; border-color: #666 !important; }

        /* АНИМАЦИИ СОЛО */
        .solo-center { left: 50% !important; transform: translate(-50%, -50%) rotate(0deg) scale(1.1) !important; z-index: 100; }
        .kicked-out { transform: translate(150%, -50%) rotate(40deg) !important; opacity: 0; }

        /* НАСТРОЙКИ (ИСПРАВЛЕНЫ) */
        .modal { 
            display: none; position: fixed; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); /* СТРОГО ЦЕНТР */
            background: #fff; border: 8px solid #3e2723; padding: 40px; 
            border-radius: 30px; z-index: 5000; width: 450px; text-align: left;
            box-shadow: 20px 20px 0 rgba(0,0,0,0.3);
        }
        .modal.active { display: block; }
        .setting-row { display: flex; justify-content: space-between; margin: 15px 0; font-weight: bold; }

        #qText { font-size: 50px; background:#fff; padding:15px 40px; border:6px solid #3e2723; transform:rotate(-1deg); transition: 0.5s; max-width: 80%; margin-bottom: 20px; }
        .q-vanish { opacity: 0; transform: scale(0.7) !important; }
        .score-bar { background: #3e2723; color: #fff; font-size: 40px; padding: 15px 45px; border-radius: 20px; width: 550px; display: flex; justify-content: space-between; border: 5px solid #fff; margin: 10px; animation: slideUp 0.5s forwards; }
        @keyframes slideUp { from { transform: translateY(100px); } to { transform: translateY(0); } }
        
        .points-badge { position: absolute; top: -30px; right: -30px; background: #ef5350; color: #fff; border: 5px solid #3e2723; width: 90px; height: 90px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 32px; animation: popBadge 0.4s forwards; z-index: 10; }
        @keyframes popBadge { from { transform: scale(0); } to { transform: scale(1); } }
        
        @keyframes flyDown { to { transform: translate(-50%, 200%) scale(0.5); opacity: 0; } }
        .exit-zoom { animation: flyDown 0.8s forwards ease-in !important; left: 50% !important; }

        #credits-screen { background: #000; color: #fff; display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; overflow: hidden; }
        .credits-wrap { position: absolute; width: 100%; animation: scrl 15s linear forwards; }
        @keyframes scrl { from { top: 100%; } to { top: -150%; } }
    </style>
</head>
<body onclick="startAudio()">
    <div class="spiral"></div>
    <div id="digital-timer"></div>

    <div id="settings-modal" class="modal">
        <h2 style="text-align:center">⚙️ НАСТРОЙКИ</h2>
        <div class="setting-row">ТАЙМЕР: <input type="number" id="timerVal" value="30" style="width:50px"></div>
        <div class="setting-row">18+ РЕЖИМ: <input type="checkbox" id="plus18"></div>
        <div class="setting-row">АДСКИЙ РЕЖИМ: <input type="checkbox" id="hellMode"></div>
        <div class="setting-row">БОНУС X2: <input type="checkbox" id="bonus2"></div>
        <button onclick="saveSettings()" style="width:100%; background:#4caf50; padding:12px; color:#fff; border:4px solid #3e2723; cursor:pointer; font-weight:bold; border-radius:10px;">СОХРАНИТЬ</button>
    </div>

    <div id="lobby" class="screen" style="display:flex">
        <div onclick="document.getElementById('settings-modal').classList.add('active')" style="position:absolute; top:20px; left:20px; font-size:50px; cursor:pointer;">⚙️</div>
        <h1 style="font-size: 80px; text-shadow: 6px 6px 0 #fff;">ГРЕХО-СМЕХ</h1>
        <div style="background:#000; color:#ffeb3b; padding:15px 60px; border:8px solid #fff; font-size:100px; transform:rotate(-2deg);" id="bigCode">...</div>
        <div id="playerList" style="display:flex; flex-wrap:wrap; justify-content:center; margin-top:20px;"></div>
        <button onclick="socket.emit('start-game', curCode)" style="background:#4caf50; border:6px solid #3e2723; color:#fff; padding:25px 70px; font-size:35px; border-radius:100px; cursor:pointer; margin-top:30px; font-weight:900;">ПОГНАЛИ!</button>
    </div>

    <div id="tutorial" class="screen">
        <h2 id="tut-text" style="background:#fff; padding:40px; border:8px solid #3e2723; border-radius:20px; font-size:35px; max-width:80%;"></h2>
    </div>

    <div id="game" class="screen">
        <h2 id="qText"></h2>
        <div id="voting">
            <div id="card1" class="bubble"><div id="ans-text-1"></div><div id="badge-1" class="points-badge"></div></div>
            <div id="card2" class="bubble"><div id="ans-text-2"></div><div id="badge-2" class="points-badge"></div></div>
        </div>
    </div>

    <div id="scores" class="screen"><h1>ТЕКУЩИЙ СЧЁТ</h1><div id="scoreList"></div></div>
    <div id="final" class="screen"><h1>ПОБЕДИТЕЛЬ</h1><div id="winner" style="font-size:120px; color:#ef5350"></div></div>

    <div id="credits-screen"><div class="credits-wrap"><h1>ГРЕХО-СМЕХ</h1><br>Ванга Фiйко Перфоратор<br>Дима Moderass<br>Греха и ИИ-шка<br><br>СПАСИБО ЗА ИГРУ!</div></div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io(); let curCode = "", cdnInt;
    let gameSettings = { timer: 30, voice: 'male' };

    socket.emit('create-room', sessionStorage.getItem('lastCode'));
    socket.on('room-created', c => { curCode = c; document.getElementById('bigCode').innerText = c; });
    socket.on('player-list-update', players => {
        document.getElementById('playerList').innerHTML = players.map(p => `<div style="background:#fff; border:4px solid #3e2723; border-radius:15px; padding:10px 20px; margin:5px; font-weight:bold;">${p.emoji} ${p.name}</div>`).join('');
    });

    function saveSettings() {
        gameSettings = { timer: parseInt(document.getElementById('timerVal').value), eighteenPlus: document.getElementById('plus18').checked, hellMode: document.getElementById('hellMode').checked, bonus2: document.getElementById('bonus2').checked };
        socket.emit('update-settings', { code: curCode, settings: gameSettings });
        document.getElementById('settings-modal').classList.remove('active');
    }

    function speak(t, cb) {
        window.speechSynthesis.cancel(); const m = new SpeechSynthesisUtterance(t);
        const vs = window.speechSynthesis.getVoices();
        m.voice = vs.find(v => v.lang.includes('ru') && v.name.includes('David')) || vs[0];
        m.pitch = 0.45; m.rate = 0.9; m.onend = cb; window.speechSynthesis.speak(m);
    }

    function runTimer(sec) {
        let tl = sec; const tEl = document.getElementById('digital-timer');
        tEl.style.display = 'block'; tEl.innerText = tl; tEl.style.color = "#fff";
        clearInterval(cdnInt);
        cdnInt = setInterval(() => {
            tl--; tEl.innerText = tl;
            if(tl <= 5) tEl.style.color = "red";
            if(tl <= 0) { clearInterval(cdnInt); tEl.style.display = 'none'; }
        }, 1000);
    }

    socket.on('start-tutorial', d => {
        document.getElementById('lobby').style.display='none'; document.getElementById('tutorial').style.display='flex';
        const rules = ["Добро пожаловать в Грехо-Смех!", "Пишите смешные ответы на мои вопросы.", "Голосуйте за лучших и побеждайте!", "Поехали!"];
        let i = 0;
        function next() {
            if(i<rules.length) { document.getElementById('tut-text').innerText = rules[i]; speak(rules[i], () => { i++; setTimeout(next, 800); }); }
            else socket.emit('tutorial-finished', curCode);
        }
        next();
    });

    socket.on('round-started', d => {
        document.getElementById('tutorial').style.display="none"; document.getElementById('scores').style.display="none";
        document.getElementById('game').style.display='flex'; document.getElementById('game').classList.remove('exit-zoom');
        const q = document.getElementById('qText'); q.innerText = d.q; q.classList.remove('q-vanish');
        speak(d.q); runTimer(d.time);
    });

    socket.on('show-voting', d => {
        document.getElementById('voting').style.display = 'block';
        const c1 = document.getElementById('card1'), c2 = document.getElementById('card2');
        const b1 = document.getElementById('badge-1'), b2 = document.getElementById('badge-2');
        c1.className = 'bubble'; c2.className = 'bubble';
        b1.style.display = 'none'; b2.style.display = 'none';
        
        const format = (a) => Array.isArray(a) ? a.join('<br>') : a;

        if(d.isSolo) {
            document.getElementById('ans-text-1').innerHTML = format(d.ans1);
            document.getElementById('ans-text-2').innerText = "Я отказываюсь на это отвечать!";
            c2.classList.add('refusal');
            setTimeout(() => { c2.classList.add('kicked-out'); c1.classList.add('solo-center'); }, 1500);
        } else {
            document.getElementById('ans-text-1').innerHTML = format(d.ans1);
            document.getElementById('ans-text-2').innerHTML = format(d.ans2);
            speak("Чей ответ лучше?");
        }
        runTimer(20);
    });

    socket.on('voting-results', d => {
        const b1 = document.getElementById('badge-1'), b2 = document.getElementById('badge-2');
        b1.innerText = d.v1; b1.style.display = 'flex';
        if(!d.isSolo) { b2.innerText = d.v2; b2.style.display = 'flex'; }
        
        setTimeout(() => {
            b1.innerText = "+" + d.p1Points; b1.style.background = "#4caf50";
            if(!d.isSolo) { b2.innerText = "+" + d.p2Points; b2.style.background = "#4caf50"; }
            document.getElementById('qText').classList.add('q-vanish');
            setTimeout(() => { document.getElementById('card1').classList.add('exit-zoom'); if(!d.isSolo) document.getElementById('card2').classList.add('exit-zoom'); }, 1200);
        }, 2000);
    });

    socket.on('show-scores', d => {
        document.getElementById('game').style.display='none'; document.getElementById('scores').style.display='flex';
        document.getElementById('scoreList').innerHTML = d.players.sort((a,b)=>b.score-a.score).map((p,i)=>`<div class="score-bar"><span>${i+1}. ${p.emoji} ${p.name}</span><b>${p.score}</b></div>`).join('');
        runTimer(15);
    });

    socket.on('final-results', d => {
        document.getElementById('scores').style.display='none'; document.getElementById('final').style.display='flex'; 
        document.getElementById('winner').innerText = d.players[0].name;
        setTimeout(() => { document.getElementById('final').style.display='none'; document.getElementById('credits-screen').style.display='flex'; setTimeout(() => socket.emit('finish-credits', curCode), 15000); }, 6000);
    });
    function startAudio() {}
</script>
</body>
</html>
