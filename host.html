<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ГРЕХО-СМЕХ | HOST</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Roboto+Mono:wght@700&display=swap');
        body { margin: 0; padding: 0; overflow: hidden; background: #fbc02d; font-family: 'Montserrat', sans-serif; text-align: center; }
        
        /* ГИПНО-ФОН */
        .spiral { position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; background: repeating-conic-gradient(from 0deg, #f9a825 0deg 20deg, #fbc02d 20deg 40deg); animation: rotate 60s linear infinite; z-index: -1; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }

        /* ГЕОМЕТРИЧЕСКИЕ ФИГУРЫ */
        .char-box { 
            position: absolute; width: 140px; height: 140px; border: 6px solid #000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 10px 10px 0 rgba(0,0,0,0.2); transition: 0.8s ease-out;
            animation: breathe 3s infinite ease-in-out;
        }
        .cube { border-radius: 20px; }
        .circle { border-radius: 50%; }
        .poly { clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%); }

        /* ГЛАЗА КАК В СМЕХЛЫСТЕ */
        .eyes { width: 60%; height: 18px; background: #000; border-radius: 10px; position: relative; margin-top: -10px; }
        .eyes::before, .eyes::after { content: ''; position: absolute; width: 8px; height: 8px; background: #fff; border-radius: 50%; top: 3px; }
        .eyes::before { left: 15%; } .eyes::after { right: 15%; }

        .char-name { position: absolute; bottom: -35px; background: #000; color: #fff; padding: 2px 15px; border-radius: 5px; font-size: 18px; }

        @keyframes breathe { 0%, 100% { transform: translate(-50%, -50%) scale(1) rotate(-2deg); } 50% { transform: translate(-50%, -50%) scale(1.1) rotate(2deg); } }

        /* ЦЕНТР */
        #lobby-ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; }
        #bigCode { font-size: 110px; background: #000; color: #ffeb3b; padding: 10px 60px; border: 6px solid #fff; transform: rotate(-2deg); font-family: 'Roboto Mono'; box-shadow: 20px 20px 0 rgba(0,0,0,0.3); }

        .main-btn { background: #4caf50; border: 6px solid #000; color: #fff; padding: 20px 60px; font-size: 35px; border-radius: 100px; cursor: pointer; margin-top: 40px; }
    </style>
</head>
<body>
    <div class="spiral"></div>

    <div id="lobby-ui">
        <h1 style="font-size: 80px; color: #fff; text-shadow: 6px 6px 0 #000; margin: 0;">ГРЕХО-СМЕХ</h1>
        <div id="bigCode">...</div>
        <br>
        <button onclick="socket.emit('start-game', curCode)" class="main-btn">ПОГНАЛИ!</button>
    </div>

    <div id="playerList"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let curCode = "";

    socket.emit('create-room', sessionStorage.getItem('lastCode'));
    socket.on('room-created', c => { 
        curCode = c; 
        sessionStorage.setItem('lastCode', c); 
        document.getElementById('bigCode').innerText = c; 
    });

    socket.on('player-list-update', players => {
        const list = document.getElementById('playerList');
        list.innerHTML = "";
        const radius = 350; // Расстояние от центра

        players.forEach((p, i) => {
            const angle = (i / players.length) * (Math.PI * 2) - (Math.PI / 2);
            const x = Math.cos(angle) * radius + window.innerWidth / 2;
            const y = Math.sin(angle) * radius + window.innerHeight / 2;

            const div = document.createElement('div');
            div.className = `char-box ${p.shape}`;
            div.style.left = x + 'px';
            div.style.top = y + 'px';
            div.style.backgroundColor = p.color;
            div.innerHTML = `<div class="eyes"></div><div class="char-name">${p.name}</div>`;
            list.appendChild(div);
        });
    });

    socket.on('round-started', d => {
        document.getElementById('lobby-ui').style.display = 'none';
        document.getElementById('playerList').style.display = 'none';
        // Тут пойдет текст вопроса...
    });
</script>
</body>
</html>
