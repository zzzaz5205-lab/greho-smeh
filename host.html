<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ГРЕХО-СМЕХ | HOST</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Montserrat:wght@900&display=swap');
        body { margin: 0; padding: 0; overflow: hidden; background: #fbc02d; font-family: 'Montserrat', sans-serif; text-align: center; color: #3e2723; }
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; }
        .screen { display: none; height: 100vh; width: 100vw; flex-direction: column; align-items: center; justify-content: center; position: absolute; }
        #lobby { display: flex; }
        
        /* КАРТОЧКА РАУНДА */
        #round-intro { font-size: 150px; font-family: 'Luckiest Guy'; color: #fff; text-shadow: 15px 15px 0 #000; z-index: 2000; display: none; }

        .bubble {
            background: #fff; border: 8px solid #000; border-radius: 40px;
            padding: 30px; width: 45%; min-height: 300px; font-size: 45px;
            font-weight: 900; box-shadow: 20px 20px 0 rgba(0,0,0,0.2);
            display: flex; flex-direction: column; justify-content: center;
        }
        
        .char { width: 130px; height: 130px; border: 6px solid #000; position: absolute; transform: translate(-50%, -50%); animation: breathe 3s infinite ease-in-out; }
        .red-angry { background: #ff4757; border-radius: 50%; }
        .blue-sad { background: #2e86de; border-radius: 20px; }
        /* Другие классы персонажей из прошлого кода... */

        @keyframes breathe { 0%, 100% { transform: translate(-50%, -50%) scale(1) rotate(-3deg); } 50% { transform: translate(-50%, -50%) scale(1.1) rotate(3deg); } }
        
        #qText { font-size: 60px; color: #fff; text-shadow: 6px 6px 0 #000; margin: 20px; }
        .main-btn { background: #4caf50; border: 6px solid #000; color: #fff; padding: 20px 60px; font-size: 35px; border-radius: 100px; cursor: pointer; font-family: 'Luckiest Guy'; box-shadow: 0 10px 0 #2e7d32; }
    </style>
</head>
<body onclick="startAudio()">
    <canvas id="bg-canvas"></canvas>
    <div id="round-intro" class="animate__animated">РАУНД 1</div>

    <div id="lobby" class="screen">
        <h1 class="animate__animated animate__jackInTheBox" style="font-size: 100px; font-family:'Luckiest Guy'; color:#fff; text-shadow:10px 10px 0 #000">ГРЕХО-СМЕХ</h1>
        <div id="bigCode" style="font-size:100px; background:#000; color:#ffeb3b; padding:10px 50px; border:5px solid #fff; transform:rotate(-2deg)">...</div>
        <div id="playerList" style="position:relative; width:600px; height:500px;"></div>
        <button onclick="socket.emit('start-game', curCode)" class="main-btn">ПОГНАЛИ!</button>
    </div>

    <div id="game" class="screen">
        <h2 id="qText" class="animate__animated animate__fadeInDown"></h2>
        <div id="voting" style="display:none; width:100%; justify-content:space-around;">
            <div id="card1" class="bubble" style="transform:rotate(-2deg)"></div>
            <div id="card2" class="bubble" style="transform:rotate(2deg)"></div>
        </div>
    </div>

    <div id="scores" class="screen">
        <h1 style="font-size:80px; font-family:'Luckiest Guy';">КТО ВПЕРЕДИ?</h1>
        <div id="scoreList"></div>
        <button onclick="socket.emit('next-round', curCode)" class="main-btn" style="margin-top:30px">СЛЕД. РАУНД</button>
    </div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let curCode = "", angle = 0;
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');

    function drawSpiral() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        ctx.translate(canvas.width/2, canvas.height/2);
        ctx.rotate(angle);
        for(let i=0; i<14; i++){
            ctx.beginPath(); ctx.rotate(Math.PI/7); ctx.moveTo(0,0);
            ctx.lineTo(2000, 500); ctx.lineTo(2000, -500);
            ctx.fillStyle = i%2===0 ? '#fbc02d' : '#f9a825'; ctx.fill();
        }
        angle += 0.005; requestAnimationFrame(drawSpiral);
    }
    drawSpiral();

    socket.on('room-created', c => { curCode = c; document.getElementById('bigCode').innerText = c; });
    socket.emit('create-room', sessionStorage.getItem('lastCode'));

    socket.on('round-started', d => {
        const intro = document.getElementById('round-intro');
        intro.innerText = d.round === 3 ? "ФИНАЛ: ТРИХЛЫСТ" : "РАУНД " + d.round;
        intro.style.display = 'block';
        intro.className = "animate__animated animate__zoomInDown";
        
        setTimeout(() => {
            intro.className = "animate__animated animate__zoomOutUp";
            setTimeout(() => {
                intro.style.display = 'none';
                document.getElementById('lobby').style.display='none';
                document.getElementById('scores').style.display='none';
                document.getElementById('game').style.display='flex';
                document.getElementById('voting').style.display='none';
                document.getElementById('qText').innerText = d.q;
            }, 1000);
        }, 2000);
    });

    socket.on('show-voting', d => {
        document.getElementById('voting').style.display='flex';
        document.getElementById('card1').innerText = d.ans1;
        document.getElementById('card2').innerText = d.ans2;
    });

    socket.on('show-scores', d => {
        document.getElementById('game').style.display='none';
        document.getElementById('scores').style.display='flex';
        document.getElementById('scoreList').innerHTML = d.players.sort((a,b)=>b.score-a.score).map(p => `<h2>${p.name}: ${p.score}</h2>`).join('');
    });
</script>
</body>
</html>
