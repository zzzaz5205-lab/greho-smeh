<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ГРЕХО-СМЕХ | HOST</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Roboto+Mono:wght@700&display=swap');
        body { 
            margin: 0; padding: 0; overflow: hidden;
            background: #fbc02d;
            background-image: radial-gradient(#f9a825 25%, transparent 25%), radial-gradient(#f9a825 25%, transparent 25%);
            background-size: 80px 80px; background-position: 0 0, 40px 40px;
            font-family: 'Montserrat', sans-serif; color: #3e2723; text-align: center;
        }
        .top-code-box { position: absolute; top: 15px; right: 20px; background: #fff; padding: 10px 25px; border: 5px solid #3e2723; transform: rotate(2deg); z-index: 1000; }
        .top-code-box b { font-size: 45px; color: #000; font-family: 'Roboto Mono'; }
        #lobby, #game, #scores, #final, #credits { display: none; padding: 20px; height: 100vh; box-sizing: border-box; }
        #lobby { display: block; }
        #qText { font-size: 60px; color: #fff; text-shadow: 4px 4px 0 #3e2723; background: #fbc02d; padding: 20px; margin-top: 50px; width: 90%; display: inline-block; }
        .bubble { background: #fff; border: 6px solid #3e2723; border-radius: 20px; padding: 30px; width: 40%; min-height: 200px; font-size: 45px; font-weight: 900; box-shadow: 15px 15px 0 rgba(0,0,0,0.1); display: flex; flex-direction: column; justify-content: center; }
        .score-row { display: flex; align-items: center; justify-content: center; margin: 10px; }
        .score-name { font-size: 40px; background: #3e2723; color: #fff; padding: 5px 30px; border-radius: 10px; width: 350px; text-align: left; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; border: 8px solid #3e2723; padding: 30px; border-radius: 20px; z-index: 2000; width: 400px; text-align: left; }
        .modal.active { display: block; }
        .player-chip { background: #3e2723; color: #fff; padding: 10px 20px; border-radius: 50px; margin: 5px; display: inline-block; font-size: 22px; }
    </style>
</head>
<body onclick="startAudio()">
    <div id="corner-code" class="top-code-box" style="display:none;"><span id="ui-join">Join at:</span><br><b id="c-val">...</b></div>

    <div id="settings-modal" class="modal">
        <h2 id="ui-settings-title">SETTINGS</h2>
        <label>Language:</label>
        <select id="langSel">
            <option value="ru">Русский</option>
            <option value="en">English</option>
            <option value="zh">中文 (Chinese)</option>
        </select>
        <label>Voice:</label>
        <select id="voiceType"><option value="male">Male</option><option value="female">Female</option></select>
        <label>Timer:</label><input type="number" id="timerVal" value="30">
        <br><br><button onclick="saveSettings()" style="width:100%; padding:10px; font-weight:bold; cursor:pointer;">SAVE</button>
    </div>

    <div id="lobby">
        <div onclick="toggleSet()" style="position:absolute; top:20px; left:20px; font-size:50px; cursor:pointer;">⚙️</div>
        <h1 style="font-size: 80px; text-shadow: 4px 4px 0 #fff;">ГРЕХО-СМЕХ</h1>
        <div style="background:#fff; border:8px solid #3e2723; padding:20px 80px; display:inline-block;">
            <span id="ui-room-code">ROOM CODE:</span><br>
            <b id="bigCode" style="font-size: 120px; font-family:'Roboto Mono';">...</b>
        </div>
        <div id="playerList" style="margin-top: 30px;"></div>
        <br><button onclick="startGame()" id="ui-start-btn" style="background:#4caf50; border:6px solid #3e2723; color:#fff; padding:20px 60px; font-size:35px; font-weight:900; border-radius:100px; cursor:pointer;">PLAY!</button>
    </div>

    <div id="game">
        <h1 id="roundTag" style="color:#fff; font-size:30px;">ROUND 1</h1>
        <h2 id="qText"></h2>
        <div style="display:none; justify-content:center; gap:30px; margin-top:40px;" id="voting">
            <div id="card1" class="bubble"></div>
            <div id="card2" class="bubble"></div>
        </div>
    </div>

    <div id="scores">
        <h1 id="ui-scores-title" style="font-size:60px;">SCORES</h1>
        <div id="scoreList"></div>
        <button onclick="socket.emit('next-after-scores', curCode)" id="ui-next-btn" style="padding:15px 40px; font-size:22px; cursor:pointer; margin-top:20px;">NEXT</button>
    </div>

    <div id="final"><h1 id="ui-winner-title">WINNER:</h1><div id="winner" style="font-size: 100px; color: #d32f2f;"></div></div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io(); let curCode = "", audioInited = false;
    let gameSettings = { timer: 30, voice: 'male', lang: 'ru' };
    const music = { lobby: new Audio('lobby.mp3'), game: new Audio('game.mp3'), final: new Audio('final.mp3') };

    const uiTexts = {
        ru: { join: "Присоединяйся:", code: "КОД КОМНАТЫ:", start: "ПОГНАЛИ!", round: "РАУНД", scores: "ТЕКУЩИЙ СЧЁТ", next: "ДАЛЕЕ", winner: "ПОБЕДИТЕЛЬ:", vote: "Чей ответ лучше?", settings: "НАСТРОЙКИ" },
        en: { join: "Join at:", code: "ROOM CODE:", start: "START GAME!", round: "ROUND", scores: "CURRENT SCORES", next: "NEXT ROUND", winner: "WINNER:", vote: "Which is funnier?", settings: "SETTINGS" },
        zh: { join: "加入方式:", code: "房间代码:", start: "开始游戏!", round: "轮次", scores: "当前分数", next: "下一轮", winner: "获胜者:", vote: "哪个更好笑？", settings: "设置" }
    };

    function translateUI() {
        const t = uiTexts[gameSettings.lang];
        document.getElementById('ui-join').innerText = t.join;
        document.getElementById('ui-room-code').innerText = t.code;
        document.getElementById('ui-start-btn').innerText = t.start;
        document.getElementById('ui-scores-title').innerText = t.scores;
        document.getElementById('ui-next-btn').innerText = t.next;
        document.getElementById('ui-winner-title').innerText = t.winner;
        document.getElementById('ui-settings-title').innerText = t.settings;
    }

    function playM(t) { Object.values(music).forEach(m=>{m.pause();m.currentTime=0;}); music[t].loop=true; music[t].volume=0.3; music[t].play(); }
    function startAudio() { if(!audioInited){ playM('lobby'); audioInited=true; } }
    function toggleSet() { document.getElementById('settings-modal').classList.toggle('active'); }

    function saveSettings() {
        gameSettings.lang = document.getElementById('langSel').value;
        gameSettings.voice = document.getElementById('voiceType').value;
        gameSettings.timer = parseInt(document.getElementById('timerVal').value);
        translateUI();
        socket.emit('update-settings', { code: curCode, settings: gameSettings });
        toggleSet();
    }

    socket.emit('create-room');
    socket.on('room-created', c => { curCode = c; document.getElementById('bigCode').innerText = c; document.getElementById('c-val').innerText = c; translateUI(); });
    socket.on('player-list-update', players => { document.getElementById('playerList').innerHTML = players.map(p => `<div class="player-chip">${p.emoji} ${p.name}</div>`).join(''); });

    function startGame() { playM('game'); document.getElementById('corner-code').style.display='block'; socket.emit('start-game', { code: curCode, mode: document.getElementById('gameMode').value }); }

    function speak(t) {
        window.speechSynthesis.cancel(); const m = new SpeechSynthesisUtterance(t);
        const vs = window.speechSynthesis.getVoices();
        // УСТАНОВКА ЯЗЫКА ДЛЯ ДИКТОРА
        if(gameSettings.lang === 'ru') m.lang = 'ru-RU';
        else if(gameSettings.lang === 'zh') m.lang = 'zh-CN';
        else m.lang = 'en-US';

        if(gameSettings.voice === 'male') { m.pitch = 0.4; m.rate = 0.85; }
        else { m.pitch = 1.1; m.rate = 1.0; }
        window.speechSynthesis.speak(m);
    }

    socket.on('round-started', d => {
        document.getElementById('lobby').style.display="none"; document.getElementById('game').style.display="block"; 
        document.getElementById('scores').style.display="none"; document.getElementById('voting').style.display="none";
        document.getElementById('roundTag').innerText = uiTexts[gameSettings.lang].round + " " + d.round;
        document.getElementById('qText').innerText = d.q; speak(d.q);
    });

    socket.on('show-voting', d => {
        document.getElementById('voting').style.display="flex";
        const c1=document.getElementById('card1'), c2=document.getElementById('card2');
        const rend = (v, c) => { if(d.type==='draw') c.innerHTML=`<img src="${v}" style="width:100%">`; else c.innerText=v; };
        rend(d.ans1, c1); if(!d.isSolo) { c2.style.display="flex"; rend(d.ans2, c2); } else c2.style.display="none";
        speak(uiTexts[gameSettings.lang].vote);
    });

    socket.on('voting-results', d => {
        document.getElementById('card1').innerHTML += `<br><small>${d.p1.emoji} ${d.p1.name} (+${d.p1.lastPoints})</small>`;
        if(!d.isSolo) document.getElementById('card2').innerHTML += `<br><small>${d.p2.emoji} ${d.p2.name} (+${d.p2.lastPoints})</small>`;
    });

    socket.on('show-scores', d => {
        document.getElementById('game').style.display="none"; document.getElementById('scores').style.display="block";
        document.getElementById('scoreList').innerHTML = d.players.sort((a,b)=>b.score - a.score).map((p, i) => `
            <div class="score-row"><div style="font-size:50px; width:60px;">${i+1}</div><div class="score-name">${p.emoji} ${p.name}</div><div style="font-size:40px; margin-left:15px;">${p.score}</div></div>
        `).join('');
    });

    socket.on('final-results', d => {
        playM('final'); document.getElementById('scores').style.display="none"; document.getElementById('final').style.display="block";
        document.getElementById('winner').innerText = d.players[0].emoji + " " + d.players[0].name;
    });
    socket.on('go-to-menu', () => location.href='index.html');
</script>
</body>
</html>
