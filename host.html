<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ГРЕХО-СМЕХ | HOST</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Roboto+Mono:wght@700&display=swap');
        body { margin: 0; padding: 0; overflow: hidden; background: #fbc02d; font-family: 'Montserrat', sans-serif; color: #3e2723; text-align: center; perspective: 1200px; }
        
        /* КАНВАС СПИРАЛИ */
        .spiral { position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; background: repeating-conic-gradient(from 0deg, #f9a825 0deg 20deg, #fbc02d 20deg 40deg); animation: rotateSpiral 40s linear infinite; z-index: -1; }
        @keyframes rotateSpiral { 100% { transform: rotate(360deg); } }

        /* АДСКИЙ РЕЖИМ (ВИЗУАЛ) */
        .hell-mode-active .spiral { background: repeating-conic-gradient(from 0deg, #ff0000 0deg 20deg, #1a0000 20deg 40deg); animation-duration: 5s !important; }
        .hell-mode-active { animation: shake 0.2s infinite; }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 20% { transform: translate(-3px, 0px); } 50% { transform: translate(-1px, 2px); } 100% { transform: translate(1px, -1px); } }

        /* ЭКРАНЫ */
        .screen { display: none; height: 100vh; width: 100vw; flex-direction: column; align-items: center; justify-content: center; position: absolute; top:0; left:0; }
        
        /* ТУТОРИАЛ */
        #tutorial { background: rgba(0,0,0,0.8); color: white; }
        .tutorial-card { background: #fff; color: #000; padding: 30px; border-radius: 20px; border: 8px solid #3e2723; font-size: 30px; max-width: 600px; transform: rotate(-2deg); }

        /* НАСТРОЙКИ (МОДАЛКА) */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; border: 8px solid #3e2723; padding: 30px; border-radius: 20px; z-index: 2000; width: 450px; text-align: left; box-shadow: 20px 20px 0 rgba(0,0,0,0.2); }
        .modal.active { display: block; }
        .setting-row { display: flex; justify-content: space-between; margin: 15px 0; font-weight: bold; }

        .bubble { background: #fff; border: 8px solid #3e2723; border-radius: 25px; padding: 30px; width: 40%; font-size: 40px; font-weight: 900; position: absolute; transition: 0.8s; }
        #card1 { left: 5%; top: 50%; transform: translateY(-50%) rotate(-3deg); }
        #card2 { right: 5%; top: 50%; transform: translateY(-50%) rotate(3deg); }
        
        #digital-timer { position: absolute; top: 20px; left: 30px; font-size: 85px; font-family: 'Roboto Mono'; font-weight: 900; text-shadow: 6px 6px 0 #000; color: #fff; z-index: 1000; }
        .player-node { width: 130px; height: 130px; background: #fff; border: 5px solid #3e2723; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="spiral"></div>
    <div id="digital-timer" style="display:none"></div>

    <!-- ТУТОРИАЛ -->
    <div id="tutorial" class="screen">
        <div class="tutorial-card">
            <h2 id="tut-title">ПРАВИЛА ИГРЫ</h2>
            <p id="tut-text">Слушайте Диктора...</p>
        </div>
        <div id="tut-players" style="display:flex; position:fixed; bottom: 20px;"></div>
    </div>

    <!-- НАСТРОЙКИ -->
    <div id="settings-modal" class="modal">
        <h2 style="text-align:center">⚙️ НАСТРОЙКИ</h2>
        <div class="setting-row">ТАЙМЕР: <input type="number" id="timerVal" value="30" style="width:60px"></div>
        <div class="setting-row">18+ РЕЖИМ: <input type="checkbox" id="plus18"></div>
        <div class="setting-row">АДСКИЙ РЕЖИМ: <input type="checkbox" id="hellMode"></div>
        <div class="setting-row">БОНУС X2: <input type="checkbox" id="bonus2"></div>
        <button onclick="saveSettings()" style="width:100%; background:#4caf50; padding:10px; color:#fff; border:4px solid #3e2723; cursor:pointer; font-weight:bold;">СОХРАНИТЬ</button>
    </div>

    <!-- ЛОББИ -->
    <div id="lobby" class="screen" style="display:flex">
        <div onclick="document.getElementById('settings-modal').classList.add('active')" style="position:absolute; top:20px; left:20px; font-size:50px; cursor:pointer;">⚙️</div>
        <h1>ГРЕХО-СМЕХ</h1>
        <div style="background:#000; color:#ffeb3b; padding:15px 60px; border:8px solid #fff; font-size:100px;" id="bigCode">...</div>
        <div id="playerList" style="display:flex; flex-wrap:wrap; justify-content:center; margin-top:20px;"></div>
        <button onclick="socket.emit('start-game', curCode)" style="background:#4caf50; border:6px solid #3e2723; color:#fff; padding:20px 60px; font-size:30px; border-radius:100px; cursor:pointer; margin-top:30px; font-weight:900;">ПОГНАЛИ!</button>
    </div>

    <div id="game" class="screen">
        <h2 id="qText" style="font-size: 55px; background:#fff; padding:20px; border:6px solid #3e2723; transform:rotate(-1deg);"></h2>
        <div id="voting" style="display:none; width:100%; height: 350px; position: relative;">
            <div id="card1" class="bubble"></div>
            <div id="card2" class="bubble"></div>
        </div>
    </div>

    <div id="scores" class="screen"><h1>СЧЁТ</h1><div id="scoreList"></div></div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io(); let curCode = "", cdnInt;
    let gameSettings = { timer: 30, eighteenPlus: false, hellMode: false, bonusX2: false };

    socket.emit('create-room', sessionStorage.getItem('lastCode'));
    socket.on('room-created', c => { curCode = c; document.getElementById('bigCode').innerText = c; });
    socket.on('player-list-update', players => {
        document.getElementById('playerList').innerHTML = players.map(p => `<div class="player-node"><span>${p.emoji}</span>${p.name}</div>`).join('');
    });

    function saveSettings() {
        gameSettings = {
            timer: parseInt(document.getElementById('timerVal').value),
            eighteenPlus: document.getElementById('plus18').checked,
            hellMode: document.getElementById('hellMode').checked,
            bonusX2: document.getElementById('bonus2').checked
        };
        socket.emit('update-settings', { code: curCode, settings: gameSettings });
        document.getElementById('settings-modal').classList.remove('active');
    }

    function speak(t, cb) {
        window.speechSynthesis.cancel(); const m = new SpeechSynthesisUtterance(t);
        const vs = window.speechSynthesis.getVoices();
        m.voice = vs.find(v => v.lang.includes('ru') && v.name.includes('David')) || vs[0];
        m.pitch = gameSettings.hellMode ? 0.1 : 0.45; // В адском режиме голос еще ниже
        m.rate = 0.9; m.onend = cb; window.speechSynthesis.speak(m);
    }

    // ТУТОРИАЛ
    socket.on('start-tutorial', d => {
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('tutorial').style.display = 'flex';
        document.getElementById('tut-players').innerHTML = document.getElementById('playerList').innerHTML;
        
        let rules = [
            "Добро пожаловать в Грехо-Смех. Правила просты.",
            "Я даю вам безумный вопрос. Вы пишете на него еще более безумный ответ.",
            "Затем мы выбираем лучшего. Победитель забирает всё, проигравший — позор.",
            "Начинаем!"
        ];
        
        let i = 0;
        function nextRule() {
            if (i < rules.length) {
                document.getElementById('tut-text').innerText = rules[i];
                speak(rules[i], () => {
                    i++; setTimeout(nextRule, 1000);
                });
            } else {
                socket.emit('tutorial-finished', curCode);
            }
        }
        nextRule();
    });

    socket.on('round-started', d => {
        if (gameSettings.hellMode) document.body.classList.add('hell-mode-active');
        document.getElementById('tutorial').style.display = 'none';
        document.getElementById('scores').style.display = 'none';
        document.getElementById('game').style.display='flex';
        document.getElementById('voting').style.display = 'none';
        document.getElementById('qText').innerText = d.q; speak(d.q);
        
        let tl = d.time; const tEl = document.getElementById('digital-timer');
        tEl.style.display = 'block'; tEl.innerText = tl;
        clearInterval(cdnInt);
        cdnInt = setInterval(() => {
            tl--; tEl.innerText = tl;
            if(tl <= 0) clearInterval(cdnInt);
        }, 1000);
    });

    socket.on('show-voting', d => {
        document.getElementById('voting').style.display = 'flex';
        document.getElementById('card1').innerText = d.ans1;
        document.getElementById('card2').innerText = d.ans2;
    });

    socket.on('show-scores', d => {
        document.getElementById('game').style.display='none'; document.getElementById('scores').style.display='flex';
        document.getElementById('scoreList').innerHTML = d.players.map(p => `<h2>${p.name}: ${p.score}</h2>`).join('');
    });
</script>
</body>
</html>
