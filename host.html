<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ГРЕХО-СМЕХ | ИМБА HOST</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Montserrat:wght@900&family=Roboto+Mono:wght@700&display=swap');
        
        body { margin: 0; padding: 0; overflow: hidden; background: #fbc02d; font-family: 'Montserrat', sans-serif; text-align: center; color: #3e2723; }
        
        /* ГИПНО-СПИРАЛЬ */
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; filter: blur(1px); }

        /* ТАЙМЕР */
        #digital-timer {
            position: absolute; top: 20px; left: 30px; font-size: 100px;
            font-family: 'Roboto Mono'; font-weight: 900; color: #fff;
            text-shadow: 8px 8px 0 #000; z-index: 1000; display: none;
        }

        .screen { display: none; height: 100vh; width: 100vw; flex-direction: column; align-items: center; justify-content: center; position: absolute; }
        #lobby { display: flex; }

        /* КРУГОВОЕ ЛОББИ */
        .lobby-wrap { position: relative; width: 800px; height: 600px; display: flex; align-items: center; justify-content: center; }
        .player-wrapper { position: absolute; transition: 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        /* ПЕРСОНАЖИ SVG */
        .char { 
            width: 140px; height: 140px; border: 7px solid #000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transform: translate(-50%, -50%); animation: breathe 3s infinite ease-in-out;
            background: #fff; box-shadow: 12px 12px 0 rgba(0,0,0,0.2);
        }
        .red-angry { background: #ff4757; border-radius: 50%; }
        .orange-evil { background: #ffa502; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); }
        .blue-sad { background: #2e86de; border-radius: 30px; }
        .green-derpy { background: #2ed573; border-radius: 50% 50% 10% 10%; }
        .purple-smug { background: #a4b0be; clip-path: polygon(25% 0%, 75% 0%, 100% 100%, 0% 100%); }

        .eyes { width: 50%; height: 15px; background: #000; border-radius: 10px; position: relative; }
        .eyes::after, .eyes::before { content: ''; position: absolute; width: 8px; height: 8px; background: #fff; border-radius: 50%; top: 2px; }
        .eyes::before { left: 4px; } .eyes::after { right: 4px; }
        
        @keyframes breathe { 0%, 100% { transform: translate(-50%, -50%) scale(1) rotate(-3deg); } 50% { transform: translate(-50%, -50%) scale(1.1) rotate(3deg); } }

        /* БАБЛЫ ОТВЕТОВ */
        .bubble {
            background: #fff; border: 8px solid #000; border-radius: 35px;
            padding: 40px; width: 44%; min-height: 280px; font-size: 50px;
            font-weight: 900; box-shadow: 20px 20px 0 rgba(0,0,0,0.2);
            animation: animate__backInUp 0.6s;
        }

        #bigCode { font-size: 110px; background: #000; color: #ffeb3b; padding: 20px 60px; border: 8px solid #fff; transform: rotate(-2deg); font-family: 'Roboto Mono'; }
        
        .main-btn { background: #4caf50; border: 6px solid #000; color: #fff; padding: 20px 60px; font-size: 40px; border-radius: 100px; cursor: pointer; font-family: 'Luckiest Guy'; box-shadow: 0 10px 0 #2e7d32; }
    </style>
</head>
<body onclick="startAudio()">
    <canvas id="bg-canvas"></canvas>
    <div id="digital-timer">30</div>

    <div id="lobby" class="screen">
        <h1 class="animate__animated animate__bounceIn" style="font-size: 100px; font-family: 'Luckiest Guy'; color: #fff; text-shadow: 10px 10px 0 #000;">ГРЕХО-СМЕХ</h1>
        <div class="lobby-wrap">
            <div id="playerList"></div>
            <div id="bigCode">...</div>
        </div>
        <button onclick="socket.emit('start-game', curCode)" class="main-btn animate__animated animate__pulse animate__infinite">ПОГНАЛИ!</button>
    </div>

    <div id="game" class="screen">
        <h2 id="qText" style="font-size: 65px; text-shadow: 5px 5px 0 #fff; max-width: 90%;"></h2>
        <div style="display:none; justify-content:center; gap:30px; width:100%" id="voting">
            <div id="card1" class="bubble" style="transform: rotate(-2deg)"></div>
            <div id="card2" class="bubble" style="transform: rotate(2deg)"></div>
        </div>
    </div>

    <div id="scores" class="screen">
        <h1 style="font-size:80px; font-family: 'Luckiest Guy';">КТО ЛУЧШИЙ?</h1>
        <div id="scoreList" style="width:100%"></div>
        <button onclick="socket.emit('next-after-scores', curCode)" class="main-btn">ДАЛЕЕ</button>
    </div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let curCode = "", tInt, angle = 0;
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    const music = { lobby: new Audio('lobby.mp3'), game: new Audio('game.mp3'), final: new Audio('final.mp3') };

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    function drawSpiral() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        ctx.save(); ctx.translate(canvas.width/2, canvas.height/2); ctx.rotate(angle);
        for(let i=0; i<14; i++) {
            ctx.beginPath(); ctx.rotate(Math.PI/7); ctx.moveTo(0,0);
            ctx.lineTo(2000, 500); ctx.lineTo(2000, -500);
            ctx.fillStyle = i%2===0 ? '#fbc02d' : '#f9a825'; ctx.fill();
        }
        ctx.restore(); angle += 0.005; requestAnimationFrame(drawSpiral);
    }
    drawSpiral();

    socket.emit('create-room', sessionStorage.getItem('lastCode'));
    socket.on('room-created', c => { curCode = c; sessionStorage.setItem('lastCode', c); document.getElementById('bigCode').innerText = c; });

    socket.on('player-list-update', players => {
        const list = document.getElementById('playerList'); list.innerHTML = "";
        const radius = 330;
        players.forEach((p, i) => {
            const a = (i / players.length) * Math.PI * 2 - Math.PI/2;
            const x = Math.cos(a) * radius; const y = Math.sin(a) * radius;
            list.innerHTML += `<div class="player-wrapper" style="transform: translate(${x}px, ${y}px)">
                <div class="char ${p.char}"><div class="eyes"></div><b style="position:absolute; bottom:-40px; background:#000; color:#fff; padding:2px 10px;">${p.name}</b></div>
            </div>`;
        });
    });

    function speak(t, cb) {
        window.speechSynthesis.cancel(); const m = new SpeechSynthesisUtterance(t);
        const vs = window.speechSynthesis.getVoices();
        m.voice = vs.find(v => v.lang.includes('ru') && v.name.includes('David')) || vs[0];
        m.pitch = 0.45; m.rate = 0.9; m.onend = cb; window.speechSynthesis.speak(m);
    }

    socket.on('round-started', d => {
        document.getElementById('lobby').style.display='none'; document.getElementById('scores').style.display='none';
        document.getElementById('game').style.display='flex'; document.getElementById('voting').style.display='none';
        document.getElementById('qText').innerText = d.q; speak(d.q);
        
        let tl = 30; const tEl = document.getElementById('digital-timer');
        tEl.style.display='block'; tEl.style.color='#fff';
        clearInterval(tInt); tInt = setInterval(() => { tEl.innerText=tl; if(tl<=5) tEl.style.color='red'; if(tl<=0) clearInterval(tInt); tl--; }, 1000);
    });

    socket.on('show-voting', d => {
        clearInterval(tInt); document.getElementById('digital-timer').style.display='none';
        document.getElementById('voting').style.display='flex';
        document.getElementById('card1').innerText = d.ans1; document.getElementById('card2').innerText = d.ans2 || "...";
        speak("Чей ответ лучше?");
    });

    socket.on('voting-results', d => {
        document.getElementById('card1').innerHTML += `<div class="animate__animated animate__bounceIn" style="font-size:25px; color:blue; margin-top:20px;">${d.p1.name} (+${d.v1*100})</div>`;
        if(d.p2) document.getElementById('card2').innerHTML += `<div class="animate__animated animate__bounceIn" style="font-size:25px; color:red; margin-top:20px;">${d.p2.name} (+${d.v2*100})</div>`;
        setTimeout(() => speak(d.aiComment), 1500);
    });

    socket.on('show-scores', d => {
        document.getElementById('game').style.display='none'; document.getElementById('scores').style.display='flex';
        document.getElementById('scoreList').innerHTML = d.players.sort((a,b)=>b.score-a.score).map((p,i)=>`
            <div class="animate__animated animate__fadeInLeft" style="background:#000; color:#fff; font-size:40px; padding:10px 40px; border-radius:15px; margin:10px; width:600px; display:flex; justify-content:space-between; border:4px solid #fff;">
                <span>${i+1}. ${p.name}</span><b>${p.score}</b>
            </div>`).join('');
    });

    function startAudio() { /* Music context */ }
</script>
</body>
</html>
