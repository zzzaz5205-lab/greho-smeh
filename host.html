<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ГРЕХО-СМЕХ | HOST</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap');
        body { margin: 0; padding: 0; overflow: hidden; background: #fbc02d; font-family: 'Montserrat', sans-serif; color: #3e2723; text-align: center; perspective: 1500px; }
        .spiral { position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; background: repeating-conic-gradient(from 0deg, #f9a825 0deg 20deg, #fbc02d 20deg 40deg); animation: rotateSpiral 40s linear infinite; z-index: -1; }
        @keyframes rotateSpiral { 100% { transform: rotate(360deg); } }
        #digital-timer { position: absolute; top: 20px; left: 30px; font-size: 85px; font-weight: 900; text-shadow: 6px 6px 0 #000; color: #fff; z-index: 1000; display: none; }
        .screen { display: none; height: 100vh; width: 100vw; flex-direction: column; align-items: center; justify-content: center; position: absolute; top:0; left:0; }
        
        .bubble { background: #fff; border: 8px solid #3e2723; border-radius: 25px; padding: 25px; width: 40%; min-height: 180px; font-size: 35px; font-weight: 900; box-shadow: 15px 15px 0 rgba(0,0,0,0.1); position: absolute; top: 50%; transition: all 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55); display: flex; align-items: center; justify-content: center; }
        #card1 { left: 5%; transform: translateY(-50%) rotate(-3deg); }
        #card2 { right: 5%; transform: translateY(-50%) rotate(3deg); }
        
        /* АНИМАЦИЯ УЛЕТАНИЯ ВНИЗ */
        @keyframes flyDownFix {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); top: 50%; left: 50%; }
            100% { opacity: 0; transform: translate(-50%, 1000px) scale(0.5); top: 50%; left: 50%; }
        }
        .exit-zoom { animation: flyDownFix 1s forwards ease-in !important; left: 50% !important; right: auto !important; }
        .solo-center { left: 50% !important; transform: translate(-50%, -50%) rotate(0deg) scale(1.1) !important; }
        .kicked-out { transform: translate(150%, -50%) rotate(40deg) !important; opacity: 0; }

        #settings-modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 10000; align-items: center; justify-content: center; }
        .modal { background: #fff; border: 8px solid #3e2723; border-radius: 30px; width: 800px; height: 380px; display: flex; overflow: hidden; }
        .modal-sidebar { width: 30%; background: #3e2723; padding: 15px; display: flex; flex-direction: column; gap: 5px; }
        .tab-btn { padding: 12px; background: none; border: none; color: #fff; font-weight: 900; font-size: 16px; text-align: left; cursor: pointer; border-radius: 10px; }
        .tab-btn.active { background: #fbc02d; color: #3e2723; }
        .modal-body { width: 70%; padding: 20px 40px; overflow-y: auto; background: #fff; text-align: left; }
        
        #qText { font-size: 50px; background:#fff; padding:15px 40px; border:6px solid #3e2723; transform:rotate(-1deg); transition: 0.4s; position: absolute; top: 10%; }
        .points-badge { position: absolute; top: -25px; right: -25px; background: #ef5350; color: #fff; border: 5px solid #3e2723; width: 85px; height: 85px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 30px; animation: popBadge 0.4s forwards; }
    </style>
</head>
<body onclick="startAudio()">
    <div class="spiral"></div>
    <div id="digital-timer"></div>
    <div id="settings-modal-overlay">
        <div class="modal">
            <div class="modal-sidebar">
                <button class="tab-btn active" onclick="openTab(event, 'tab-modes')">ОБЩЕЕ</button>
                <button class="tab-btn" onclick="openTab(event, 'tab-events')">СОБЫТИЯ</button>
                <div style="flex-grow:1"></div>
                <button onclick="toggleSet()" style="background:#4caf50; color:#fff; padding:12px; border-radius:12px; font-weight:900; border:none; cursor:pointer;">ОК</button>
            </div>
            <div class="modal-body">
                <div id="tab-modes" class="tab-content active"><h2>ГРЕХО-СМЕХ</h2><p>Классический режим</p></div>
                <div id="tab-events" class="tab-content"><h2>СОБЫТИЯ</h2><p>x2 Очки включены</p></div>
            </div>
        </div>
    </div>

    <div id="lobby" class="screen" style="display:flex">
        <button style="position:absolute; top:20px; left:20px; padding:15px; background:#3e2723; color:#fff; border-radius:10px; cursor:pointer;" onclick="toggleSet()">Настройки игры</button>
        <h1 style="font-size: 80px; text-shadow: 6px 6px #fff;">ГРЕХО-СМЕХ</h1>
        <div style="background:#000; color:#ffeb3b; padding:15px 60px; font-size:100px;" id="bigCode">...</div>
        <div id="playerList" style="display:flex; flex-wrap:wrap; justify-content:center; margin-top:20px;"></div>
        <button onclick="socket.emit('start-game', curCode)" style="background:#4caf50; border:6px solid #3e2723; color:#fff; padding:20px 60px; font-size:35px; border-radius:100px; cursor:pointer; margin-top:30px; font-weight:900;">ПОГНАЛИ!</button>
    </div>

    <div id="game" class="screen">
        <h2 id="qText"></h2>
        <div id="voting" style="display:none; width:100%; height: 400px; position: relative;">
            <div id="card1" class="bubble"><div id="ans-text-1"></div><div id="badge-1" class="points-badge"></div></div>
            <div id="card2" class="bubble"><div id="ans-text-2"></div><div id="badge-2" class="points-badge"></div></div>
        </div>
    </div>

    <div id="scores" class="screen"><h1>ТЕКУЩИЙ СЧЁТ</h1><div id="scoreList"></div></div>
    <div id="final" class="screen"><h1>ПОБЕДИТЕЛЬ</h1><div id="winner" style="font-size:120px; color:#ef5350"></div></div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io(); let curCode = "", cdnInt;
    function toggleSet() { const o = document.getElementById('settings-modal-overlay'); o.style.display = (o.style.display === 'flex') ? 'none' : 'flex'; }
    function openTab(e, t) { document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active')); document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); document.getElementById(t).classList.add('active'); e.currentTarget.classList.add('active'); }
    function runTimer(sec) { let tl = sec; const tEl = document.getElementById('digital-timer'); tEl.style.display = 'block'; tInt = setInterval(() => { tEl.innerText = tl; if(tl <= 0) { clearInterval(tInt); tEl.style.display = 'none'; } tl--; }, 1000); }

    socket.emit('create-room', sessionStorage.getItem('lastCode'));
    socket.on('room-created', c => { curCode = c; sessionStorage.setItem('lastCode', c); document.getElementById('bigCode').innerText = c; });
    socket.on('player-list-update', players => { document.getElementById('playerList').innerHTML = players.map(p => `<div style="background:#fff; border:5px solid #3e2723; padding:10px 20px; border-radius:15px; margin:5px; font-weight:bold;">${p.emoji} ${p.name}</div>`).join(''); });

    socket.on('round-started', d => {
        document.getElementById('lobby').style.display="none"; document.getElementById('scores').style.display="none";
        document.getElementById('game').style.display='flex'; document.getElementById('game').classList.remove('exit-zoom');
        document.getElementById('voting').style.display = 'none';
        document.getElementById('qText').innerText = d.q; runTimer(d.time);
    });

    socket.on('show-voting', d => {
        document.getElementById('voting').style.display = 'block';
        const c1 = document.getElementById('card1'), c2 = document.getElementById('card2');
        const b1 = document.getElementById('badge-1'), b2 = document.getElementById('badge-2');
        c1.className = 'bubble'; c2.className = 'bubble'; b1.style.display = 'none'; b2.style.display = 'none';
        document.getElementById('ans-text-1').innerHTML = Array.isArray(d.ans1) ? d.ans1.join('<br>') : d.ans1;
        document.getElementById('ans-text-2').innerHTML = d.isSolo ? "Отказ!" : (Array.isArray(d.ans2) ? d.ans2.join('<br>') : d.ans2);
        if(d.isSolo) { c2.classList.add('refusal'); setTimeout(() => { c2.classList.add('kicked-out'); c1.classList.add('solo-center'); }, 1500); }
        runTimer(20);
    });

    socket.on('voting-results', d => {
        const b1 = document.getElementById('badge-1'), b2 = document.getElementById('badge-2');
        b1.innerText = "+" + d.p1Points; b1.style.display = 'flex';
        if(!d.isSolo) { b2.innerText = "+" + d.p2Points; b2.style.background = "#4caf50"; b2.style.display = 'flex'; }
        setTimeout(() => { document.getElementById('card1').classList.add('exit-zoom'); document.getElementById('card2').classList.add('exit-zoom'); }, 3000);
    });

    socket.on('show-scores', d => { document.getElementById('game').style.display='none'; document.getElementById('scores').style.display='flex'; document.getElementById('scoreList').innerHTML = d.players.map((p,i)=>`<h2>${i+1}. ${p.name}: ${p.score}</h2>`).join(''); runTimer(10); });
    socket.on('final-results', d => { document.getElementById('scores').style.display='none'; document.getElementById('final').style.display='flex'; document.getElementById('winner').innerText = d.players[0].name; });
    function startAudio() {}
</script>
</body>
</html>
