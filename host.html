<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ГРЕХО-СМЕХ | HOST</title>
    <link rel="icon" href="https://fav.farm/🎮" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Roboto+Mono:wght@700&display=swap');
        
        :root {
            --yellow: #fbc02d;
            --dark: #3e2723;
            --red: #ef5350;
            --green: #4caf50;
            --blue: #2196f3;
        }

        body { 
            margin: 0; padding: 0; overflow: hidden; 
            background: var(--yellow); font-family: 'Montserrat', sans-serif; 
            color: var(--dark); text-align: center; perspective: 1500px; 
        }

        /* ГИПНО-СПИРАЛЬ */
        .spiral { 
            position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; 
            background: repeating-conic-gradient(from 0deg, #f9a825 0deg 20deg, #fbc02d 20deg 40deg); 
            animation: rotateSpiral 40s linear infinite; z-index: -1; 
        }
        @keyframes rotateSpiral { 100% { transform: rotate(360deg); } }

        /* ТАЙМЕР */
        #digital-timer { 
            position: absolute; top: 20px; left: 30px; 
            font-size: 85px; font-family: 'Roboto Mono'; font-weight: 900; 
            text-shadow: 6px 6px 0 #000; color: #fff; z-index: 1000; display: none; 
            transform: rotate(-5deg); 
        }

        /* КОД В УГЛУ */
        .top-code-box { 
            position: absolute; top: 15px; right: 20px; 
            background: #fff; color: #000; padding: 10px 25px; 
            border: 5px solid var(--dark); transform: rotate(2deg); 
            box-shadow: 10px 10px 0 rgba(0,0,0,0.1); z-index: 100;
        }
        .top-code-box b { font-size: 45px; font-family: 'Roboto Mono'; }

        .screen { display: none; height: 100vh; width: 100vw; flex-direction: column; align-items: center; justify-content: center; position: absolute; top:0; left:0; transition: 0.5s; }

        /* --- НАСТРОЙКИ (ЦЕНТР + ТАБЫ) --- */
        #settings-modal-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: rgba(0,0,0,0.8); z-index: 10000; align-items: center; justify-content: center;
        }
        .modal { 
            background: #fff; border: 8px solid var(--dark); border-radius: 30px; 
            width: 850px; height: 380px !important; /* УМЕНЬШЕННАЯ ВЫСОТА */
            display: flex; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        .modal-sidebar { width: 30%; background: var(--dark); padding: 15px; display: flex; flex-direction: column; gap: 5px; }
        .tab-btn { padding: 12px; background: none; border: none; color: #fff; font-weight: 900; font-size: 16px; text-align: left; cursor: pointer; border-radius: 10px; transition: 0.2s; }
        .tab-btn.active { background: var(--yellow); color: var(--dark); }
        .modal-body { width: 70%; padding: 20px 40px; overflow-y: auto; background: #fff; text-align: left; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 2px dashed #ddd; padding-bottom: 5px; }

        /* Тумблеры */
        .switch { position: relative; display: inline-block; width: 50px; height: 28px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; border: 2px solid var(--dark); }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; border: 2px solid var(--dark); }
        input:checked + .slider { background-color: var(--green); }
        input:checked + .slider:before { transform: translateX(22px); }

        /* ИГРОВЫЕ КАРТОЧКИ */
        .bubble { background: #fff; border: 8px solid var(--dark); border-radius: 25px; padding: 25px; width: 42%; min-height: 200px; font-size: 35px; font-weight: 900; box-shadow: 15px 15px 0 rgba(0,0,0,0.1); position: absolute; top: 50%; transition: all 0.8s; display: flex; align-items: center; justify-content: center; text-align: center; }
        #card1 { left: 5%; transform: translateY(-50%) rotate(-3deg); }
        #card2 { right: 5%; transform: translateY(-50%) rotate(3deg); }
        .bubble img { max-height: 180px; width: auto; border-radius: 15px; }

        /* АНИМАЦИИ */
        .solo-center { left: 50% !important; transform: translate(-50%, -50%) scale(1.1) !important; z-index: 100; }
        .kicked-out { transform: translate(150%, -50%) rotate(40deg) !important; opacity: 0; }
        @keyframes flyDownFix {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); top: 50%; left: 50%; }
            100% { opacity: 0; transform: translate(-50%, 1000px) scale(0.5); top: 50%; left: 50%; }
        }
        .exit-zoom { animation: flyDownFix 1s forwards ease-in !important; left: 50% !important; }

        /* ОЧКИ */
        .points-badge { position: absolute; top: -25px; right: -25px; background: var(--red); color: #fff; border: 5px solid var(--dark); width: 85px; height: 85px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 30px; animation: popBadge 0.4s forwards; }
        @keyframes popBadge { from { transform: scale(0); } to { transform: scale(1); } }

        #qText { font-size: 50px; background:#fff; padding:15px 40px; border:6px solid var(--dark); transform:rotate(-1deg); transition: 0.4s; position: absolute; top: 10%; }
        .score-bar { background: var(--dark); color: #fff; font-size: 45px; padding: 15px 45px; border-radius: 20px; width: 600px; display: flex; justify-content: space-between; border: 5px solid #fff; margin: 15px; }
        
        .btn-open-settings { position: absolute; top: 20px; left: 20px; padding: 12px 25px; background: var(--dark); color: #fff; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; }
        .player-node { background: #fff; border: 5px solid var(--dark); padding: 15px; border-radius: 20px; margin: 10px; font-weight: bold; }

        /* ТИТРЫ */
        #credits-screen { background: #000 !important; color: #fff !important; display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9000; overflow: hidden; flex-direction: column; align-items: center; }
        .credits-wrap { position: absolute; width: 100%; top: 100%; animation: scrollCredits 25s linear forwards; }
        @keyframes scrollCredits { from { top: 100%; } to { top: -450%; } }
        .joke-card { background: #1a1a1a; border-left: 10px solid var(--yellow); padding: 20px; margin: 20px auto; width: 65%; text-align: left; font-size: 24px; color: #fff; }
    </style>
</head>
<body onclick="startAudio()">
    <div class="spiral"></div>
    <div id="digital-timer"></div>
    <div id="corner-code" class="top-code-box" style="display:none;"><span>КОД:</span><b id="c-val">...</b></div>

    <!-- МОДАЛКА -->
    <div id="settings-modal-overlay">
        <div class="modal">
            <div class="modal-sidebar">
                <button class="tab-btn active" onclick="openTab(event, 'tab-modes')">РЕЖИМЫ</button>
                <button class="tab-btn" onclick="openTab(event, 'tab-events')">СОБЫТИЯ</button>
                <button class="tab-btn" onclick="openTab(event, 'tab-sounds')">ЗВУКИ</button>
                <button class="tab-btn" onclick="openTab(event, 'tab-general')">ОБЩЕЕ</button>
                <div style="flex-grow:1"></div>
                <button onclick="saveSettings()" style="background:var(--green); color:#fff; padding:12px; border-radius:12px; font-weight:900; border:none; cursor:pointer;">ОК</button>
            </div>
            <div class="modal-body">
                <div id="tab-modes" class="tab-content active">
                    <h2>РЕЖИМЫ</h2>
                    <div class="setting-row"><label>ГРЕХО-СМЕХ (Текст)</label> <input type="radio" name="m" value="classic" checked></div>
                    <div class="setting-row"><label>ГРЕХ-РИСУНКОВ</label> <input type="radio" name="m" value="draw"></div>
                    <div class="setting-row"><label>ГРЕХ-ВОКАЛА</label> <input type="radio" name="m" value="voice"></div>
                </div>
                <div id="tab-events" class="tab-content">
                    <h2>СОБЫТИЯ</h2>
                    <div class="setting-row"><label>АДСКИЙ РЕЖИМ</label> <label class="switch"><input type="checkbox" id="hellMode"><span class="slider"></span></label></div>
                    <div class="setting-row"><label>18+ (GEMINI)</label> <label class="switch"><input type="checkbox" id="plus18"><span class="slider"></span></label></div>
                    <div class="setting-row"><label>БОНУС X2</label> <label class="switch"><input type="checkbox" id="bonus2" checked><span class="slider"></span></label></div>
                </div>
                <div id="tab-sounds" class="tab-content">
                    <h2>ЗВУКИ</h2>
                    <div class="setting-row"><label>ДИКТОР:</label> 
                        <select id="voiceType"><option value="male">🧔 МУЖСКОЙ</option><option value="female">👩 ЖЕНСКИЙ</option></select>
                    </div>
                </div>
                <div id="tab-general" class="tab-content">
                    <h2>ОБЩЕЕ</h2>
                    <div class="setting-row"><label>ТАЙМЕР (СЕК):</label> <input type="number" id="timerVal" value="30"></div>
                    <div class="setting-row">
                        <label>МОДЕРАЦИЯ:</label> 
                        <label class="switch"><input type="checkbox" id="modToggle" onchange="document.getElementById('mB').style.display=this.checked?'block':'none'"><span class="slider"></span></label>
                    </div>
                    <button id="mB" style="display:none; width:100%; background:var(--blue); color:#fff; padding:10px; border:none; border-radius:10px; font-weight:bold; cursor:pointer;" onclick="copyM()">КОПИРОВАТЬ ССЫЛКУ</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ЭКРАН ЛОББИ -->
    <div id="lobby" class="screen" style="display:flex">
        <button class="btn-open-settings" onclick="toggleSet()">Настройки игры</button>
        <h1 style="font-size: 80px; text-shadow: 6px 6px #fff; margin:0;">ГРЕХО-СМЕХ</h1>
        <div style="background:#000; color:#ffeb3b; padding:15px 60px; font-size:100px; transform:rotate(-2deg); margin:20px;" id="bigCode">...</div>
        <div id="playerList" style="display:flex; flex-wrap:wrap; justify-content:center; margin-top:20px;"></div>
        <button onclick="socket.emit('start-game', curCode)" style="background:var(--green); border:6px solid var(--dark); color:#fff; padding:20px 60px; font-size:35px; border-radius:100px; cursor:pointer; margin-top:30px; font-weight:900;">ПОГНАЛИ!</button>
    </div>

    <div id="game" class="screen">
        <h2 id="qText"></h2>
        <div id="voting">
            <div id="card1" class="bubble"><div id="ans-text-1"></div><div id="badge-1" class="points-badge"></div></div>
            <div id="card2" class="bubble"><div id="ans-text-2"></div><div id="badge-2" class="points-badge"></div></div>
        </div>
    </div>

    <div id="scores" class="screen"><h1>ТЕКУЩИЙ СЧЁТ</h1><div id="scoreList"></div></div>
    <div id="final" class="screen"><h1>ПОБЕДИТЕЛЬ</h1><div id="winner" style="font-size:120px; color:var(--red)"></div></div>

    <div id="credits-screen">
        <div class="credits-wrap" id="credits-content"></div>
    </div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io(); let curCode = "", cdnInt;
    let gameSettings = { timer: 30, voice: 'male' };
    const music = { lobby: new Audio('lobby.mp3'), game: new Audio('game.mp3'), final: new Audio('final.mp3') };

    function toggleSet() { const o = document.getElementById('settings-modal-overlay'); o.style.display = (o.style.display === 'flex') ? 'none' : 'flex'; }
    function openTab(e, t) { document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active')); document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); document.getElementById(t).classList.add('active'); e.currentTarget.classList.add('active'); }
    
    function saveSettings() {
        const mode = document.querySelector('input[name="m"]:checked').value;
        gameSettings.timer = parseInt(document.getElementById('timerVal').value);
        gameSettings.voice = document.getElementById('voiceType').value;
        gameSettings.hellMode = document.getElementById('hellMode').checked;
        gameSettings.bonus2 = document.getElementById('bonus2').checked;
        gameSettings.eighteenPlus = document.getElementById('plus18').checked;
        gameSettings.moderation = document.getElementById('modToggle').checked;
        socket.emit('update-settings', { code: curCode, settings: gameSettings, mode });
        toggleSet();
    }

    function copyM() { const link = window.location.origin + "/mod?code=" + curCode; navigator.clipboard.writeText(link); alert("Ссылка скопирована!"); }
    function playM(t) { Object.values(music).forEach(m=>{m.pause();m.currentTime=0;}); music[t].loop=true; music[t].volume=0.1; music[t].play(); }
    function startAudio() { if(!window.aiInited){ playM('lobby'); window.aiInited=true; } }

    socket.emit('create-room', sessionStorage.getItem('lastCode'));
    socket.on('room-created', c => { curCode = c; sessionStorage.setItem('lastCode', c); document.getElementById('bigCode').innerText = c; document.getElementById('c-val').innerText = c; });
    socket.on('player-list-update', players => { document.getElementById('playerList').innerHTML = players.map(p => `<div class="player-node"><span>${p.emoji}</span>${p.name}</div>`).join(''); });

    function speak(t, cb) {
        window.speechSynthesis.cancel(); const m = new SpeechSynthesisUtterance(t);
        const vs = window.speechSynthesis.getVoices();
        m.voice = vs.find(v => v.lang.includes('ru') && (gameSettings.voice==='male' ? (v.name.includes('David') || v.name.includes('Pavel')) : true)) || vs[0];
        m.pitch = 0.45; m.rate = 0.9; m.onend = cb; window.speechSynthesis.speak(m);
    }

    function runTimer(sec) {
        let tl = sec; const tEl = document.getElementById('digital-timer'); tEl.style.display = 'block'; tEl.innerText = tl;
        clearInterval(cdnInt); cdnInt = setInterval(() => { tl--; tEl.innerText = tl; if(tl <= 5) tEl.style.color = "red"; if(tl <= 0) { clearInterval(cdnInt); tEl.style.display = 'none'; } }, 1000);
    }

    socket.on('round-started', d => {
        document.getElementById('lobby').style.display="none"; document.getElementById('scores').style.display="none";
        document.getElementById('game').style.display='flex'; document.getElementById('game').classList.remove('exit-zoom');
        document.getElementById('voting').style.display = 'none';
        const q = document.getElementById('qText'); q.innerText = d.q; q.style.opacity = "1";
        speak(d.q); runTimer(d.time); playM('game');
        document.getElementById('corner-code').style.display = "block";
    });

    socket.on('show-voting', d => {
        document.getElementById('voting').style.display = "block";
        const c1 = document.getElementById('card1'), c2 = document.getElementById('card2');
        const b1 = document.getElementById('badge-1'), b2 = document.getElementById('badge-2');
        c1.className = 'bubble'; c2.className = 'bubble'; b1.style.display = 'none'; b2.style.display = 'none';
        
        const rend = (val, card) => {
            if(d.type === 'draw') card.innerHTML = `<img src="${val}">`;
            else if(d.type === 'voice') card.innerHTML = `<button style="background:var(--red); color:#fff; border:none; padding:15px; border-radius:10px; font-weight:bold; cursor:pointer;" onclick="new Audio('${val}').play()">▶ СЛУШАТЬ</button>`;
            else card.innerText = Array.isArray(val) ? val.join('\n') : val;
        };

        rend(d.ans1, c1);
        if(d.isSolo) { c2.innerText = "Я отказываюсь на это отвечать!"; c2.classList.add('refusal'); setTimeout(() => { c2.classList.add('kicked-out'); c1.classList.add('solo-center'); }, 1500); }
        else { rend(d.ans2, c2); speak("Чей ответ лучше?"); }
        runTimer(20);
    });

    socket.on('voting-results', d => {
        const b1 = document.getElementById('badge-1'), b2 = document.getElementById('badge-2');
        if(!d.bothEmpty) { b1.innerText = d.v1; b1.style.display = 'flex'; if(!d.isSolo) { b2.innerText = d.v2; b2.style.display = 'flex'; } }
        setTimeout(() => {
            if(!d.bothEmpty) { b1.innerText = "+" + d.p1Points; b1.style.background = "#4caf50"; if(!d.isSolo) { b2.innerText = "+" + d.p2Points; b2.style.background = "#4caf50"; } }
            document.getElementById('qText').style.opacity = "0";
            speak(d.aiComment);
            setTimeout(() => { document.getElementById('card1').classList.add('exit-zoom'); document.getElementById('card2').classList.add('exit-zoom'); }, 1500);
        }, 2000);
    });

    socket.on('show-scores', d => {
        document.getElementById('game').style.display='none'; document.getElementById('scores').style.display='flex';
        document.getElementById('scoreList').innerHTML = d.players.sort((a,b)=>b.score-a.score).map((p,i)=>`
            <div class="score-bar"><span>${i+1}. ${p.emoji} ${p.name}</span><b>${p.score}</b></div>
        `).join('');
        runTimer(10);
    });

    socket.on('final-results', d => {
        playM('final'); document.getElementById('scores').style.display='none'; document.getElementById('final').style.display='flex'; 
        document.getElementById('winner').innerText = d.players[0].name;
        
        let html = `<h1 style="font-size:80px; color:var(--yellow); margin-bottom:50px;">ГРЕХО-СМЕХ</h1><h3>ЗАЛ СЛАВЫ:</h3>`;
        d.best.forEach(j => { html += `<div class="joke-card">"${j.text}"<br><small>Автор: ${j.emoji} ${j.author} (${j.votes} гол.)</small></div>`; });
        if(d.worst && d.worst.length > 0) { html += `<br><h3>ЗАЛ ПОЗОРА:</h3>`; d.worst.forEach(j => { html += `<div class="joke-card" style="opacity:0.6; border-color:#888;">"${j.text}"<br><small>Автор: ${j.emoji} ${j.author}</small></div>`; }); }
        html += `<br><div style="font-size:40px; line-height:2;"><b style="color:var(--red)">АВТОРЫ:</b><br>Грексюр Поносович<br>Джемини Завозилов</div><br><h1>СПАСИБО!</h1>`;
        document.getElementById('credits-content').innerHTML = html;

        setTimeout(() => { 
            document.getElementById('final').style.display='none';
            document.getElementById('credits-screen').style.display='flex';
            setTimeout(() => socket.emit('finish-credits', curCode), 22000);
        }, 6000);
    });
</script>
</body>
</html>
