<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ГРЕХО-СМЕХ | HOST</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Roboto+Mono:wght@700&display=swap');
        body { margin: 0; padding: 0; overflow: hidden; background: #2196f3; font-family: 'Montserrat', sans-serif; color: #fff; text-align: center; }
        .screen { display: none; height: 100vh; width: 100vw; flex-direction: column; align-items: center; justify-content: center; position: absolute; top:0; left:0; }
        #lobby { display: flex; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; color: #000; padding: 30px; border: 8px solid #000; z-index: 2000; width: 400px; border-radius: 20px; }
        .modal.active { display: block; }
        #timer-container { position: fixed; bottom: 0; left: 0; width: 100%; height: 20px; background: rgba(0,0,0,0.3); display: none; }
        #timer-bar { width: 100%; height: 100%; background: #ffeb3b; }
        .main-btn { background: #4caf50; border: 6px solid #000; color: #fff; padding: 20px 60px; font-size: 35px; border-radius: 50px; cursor: pointer; font-weight: 900; }
        .bubble { background: #fff; color: #000; padding: 30px; border: 6px solid #000; border-radius: 20px; width: 40%; font-size: 45px; font-weight: 900; }
        #bigCode { font-size: 100px; background: #000; color: #ffeb3b; padding: 10px 60px; border: 5px solid #fff; display: inline-block; }
    </style>
</head>
<body onclick="startAudio()">
    <div id="timer-container"><div id="timer-bar"></div></div>
    
    <div id="settings-modal" class="modal">
        <h2>⚙️ НАСТРОЙКИ</h2>
        <label>Голос:</label> <select id="voiceType"><option value="male">МУЖСКОЙ</option><option value="female">ЖЕНСКИЙ</option></select><br><br>
        <label>Таймер (сек):</label> <input type="number" id="timerVal" value="30"><br><br>
        <label>Модерация:</label> <input type="checkbox" id="modToggle"><br><br>
        <button onclick="saveSettings()" style="width:100%; padding:10px; background:#4caf50; color:#fff; cursor:pointer;">СОХРАНИТЬ</button>
    </div>

    <div id="lobby" class="screen">
        <div onclick="toggleSet()" style="position:absolute; top:20px; left:20px; font-size:50px; cursor:pointer;">⚙️</div>
        <h1>ГРЕХО-СМЕХ</h1>
        <div id="bigCode">...</div>
        <div id="playerList" style="margin: 20px;"></div>
        <button onclick="startGame()" class="main-btn">ПОГНАЛИ!</button>
    </div>

    <div id="game" class="screen">
        <h2 id="qText" style="font-size: 50px;"></h2>
        <div style="display:none; justify-content:center; gap:20px; width:100%" id="voting">
            <div id="card1" class="bubble"></div>
            <div id="card2" class="bubble"></div>
        </div>
    </div>

    <div id="scores" class="screen">
        <h1>СЧЁТ</h1>
        <div id="scoreList"></div>
        <button onclick="socket.emit('next-after-scores', curCode)" class="main-btn">ДАЛЕЕ</button>
    </div>

    <div id="final" class="screen"><div id="winner" style="font-size:100px;"></div></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io(); let curCode = "";
        let gameSettings = { timer: 30, voice: 'male' };

        function toggleSet() { document.getElementById('settings-modal').classList.toggle('active'); }
        function saveSettings() {
            gameSettings.voice = document.getElementById('voiceType').value;
            gameSettings.timer = parseInt(document.getElementById('timerVal').value);
            socket.emit('update-settings', { code: curCode, settings: gameSettings });
            toggleSet();
        }

        socket.emit('create-room', sessionStorage.getItem('lastCode'));
        socket.on('room-created', c => { curCode = c; sessionStorage.setItem('lastCode', c); document.getElementById('bigCode').innerText = c; });
        socket.on('player-list-update', players => { document.getElementById('playerList').innerHTML = players.map(p => `<span>${p.emoji} ${p.name} </span>`).join(''); });

        function startGame() { socket.emit('start-game', curCode); }

        function speak(t) {
            window.speechSynthesis.cancel(); const m = new SpeechSynthesisUtterance(t);
            const vs = window.speechSynthesis.getVoices();
            let ru = vs.find(v => v.lang.includes('ru'));
            m.voice = ru; m.pitch = gameSettings.voice === 'male' ? 0.5 : 1.2;
            window.speechSynthesis.speak(m);
        }

        socket.on('round-started', d => {
            document.querySelectorAll('.screen').forEach(s => s.style.display='none');
            document.getElementById('game').style.display='flex';
            document.getElementById('qText').innerText = d.q; speak(d.q);
            document.getElementById('timer-container').style.display = 'block';
            let bar = document.getElementById('timer-bar');
            bar.style.width = "100%"; bar.style.transition = `width ${gameSettings.timer}s linear`;
            setTimeout(() => bar.style.width = "0%", 100);
        });

        socket.on('show-voting', d => {
            document.getElementById('timer-container').style.display = 'none';
            document.getElementById('voting').style.display = 'flex';
            document.getElementById('card1').innerText = d.ans1;
            if(!d.isSolo) document.getElementById('card2').innerText = d.ans2;
            speak("Чей ответ лучше?");
        });

        socket.on('show-scores', d => {
            document.querySelectorAll('.screen').forEach(s => s.style.display='none');
            document.getElementById('scores').style.display='flex';
            document.getElementById('scoreList').innerHTML = d.players.map(p => `<div>${p.emoji} ${p.name}: ${p.score}</div>`).join('');
        });

        socket.on('final-results', d => {
            document.querySelectorAll('.screen').forEach(s => s.style.display='none');
            document.getElementById('final').style.display='flex';
            document.getElementById('winner').innerText = "ПОБЕДИЛ " + d.players[0].name;
        });

        function startAudio() {}
    </script>
</body>
</html>
