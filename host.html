<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ГРЕХО-СМЕХ | HOST</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap');
        
        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 0; overflow: hidden;
            background: #fbc02d; font-family: 'Montserrat', sans-serif;
            color: #3e2723; text-align: center;
        }

        /* АНИМИРОВАННАЯ СПИРАЛЬ */
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; }

        #digital-timer {
            position: absolute; top: 30px; left: 40px;
            font-size: 100px; color: #fff;
            text-shadow: 8px 8px 0 #000; z-index: 1000;
        }

        .screen { display: none; height: 100vh; width: 100vw; flex-direction: column; align-items: center; justify-content: center; }
        #lobby { display: flex; }

        /* КОД КОМНАТЫ */
        .room-code-panel {
            background: #fff; border: 10px solid #000;
            padding: 20px 60px; transform: rotate(-2deg);
            box-shadow: 20px 20px 0 rgba(0,0,0,0.2);
        }
        .room-code-panel b { font-size: 120px; color: #000; letter-spacing: 5px; }

        /* КРУГ ИГРОКОВ */
        .player-circle {
            position: relative; width: 600px; height: 600px; margin: 40px;
        }
        .player-avatar {
            position: absolute; width: 130px; height: 130px;
            background: #fff; border: 6px solid #000; border-radius: 30px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.5s; animation: breathe 3s infinite ease-in-out;
        }
        @keyframes breathe {
            0%, 100% { transform: translate(-50%, -50%) scale(1) rotate(-3deg); }
            50% { transform: translate(-50%, -50%) scale(1.1) rotate(3deg); }
        }

        /* БАБЛЫ ОТВЕТОВ */
        .quiplash-bubble {
            background: #fff; border: 8px solid #000; border-radius: 40px;
            padding: 40px; width: 45%; font-size: 50px; font-weight: 900;
            box-shadow: 15px 15px 0 rgba(0,0,0,0.1); position: relative;
        }
        .quiplash-bubble::after {
            content: ''; position: absolute; bottom: -30px; left: 50px;
            border-width: 30px 30px 0 0; border-style: solid; border-color: #000 transparent;
        }

        .main-btn {
            background: #4caf50; border: 6px solid #000; color: #fff;
            padding: 20px 60px; font-size: 40px; border-radius: 100px;
            cursor: pointer; box-shadow: 0 10px 0 #2e7d32;
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div id="digital-timer">30</div>

    <!-- ЛОББИ -->
    <div id="lobby" class="screen">
        <h1 style="font-size: 100px; color: #fff; text-shadow: 8px 8px 0 #000;">ГРЕХО-СМЕХ</h1>
        <div class="room-code-panel">
            <span style="font-size: 20px; font-weight: bold;">ЗАХОДИТЕ ПО КОДУ:</span><br>
            <b id="roomCode">...</b>
        </div>
        <div class="player-circle" id="playerList"></div>
        <button onclick="socket.emit('start-game', curCode)" class="main-btn">ПОГНАЛИ!</button>
    </div>

    <!-- ИГРА -->
    <div id="game" class="screen">
        <div style="background:#000; color:#fff; padding:10px 40px; font-size:30px; margin-bottom:20px;" id="roundLabel">РАУНД 1</div>
        <h2 id="qText" style="font-size: 70px; text-shadow: 5px 5px 0 #fff; max-width: 90%;"></h2>
        <div id="voting" style="display:none; width:100%; justify-content:space-around; margin-top:50px;">
            <div id="card1" class="quiplash-bubble" style="transform:rotate(-2deg)"></div>
            <div id="card2" class="quiplash-bubble" style="transform:rotate(2deg)"></div>
        </div>
    </div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let curCode = "";

    // КАНВАС-СПИРАЛЬ (Quiplash Style)
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let angle = 0;

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    function drawSpiral() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        ctx.save();
        ctx.translate(canvas.width/2, canvas.height/2);
        ctx.rotate(angle);
        for(let i=0; i<15; i++) {
            ctx.beginPath();
            ctx.rotate(Math.PI / 7.5);
            ctx.moveTo(0,0);
            ctx.lineTo(2000, 500);
            ctx.lineTo(2000, -500);
            ctx.fillStyle = i % 2 === 0 ? '#fbc02d' : '#f9a825';
            ctx.fill();
        }
        ctx.restore();
        angle += 0.005;
        requestAnimationFrame(drawSpiral);
    }
    drawSpiral();

    socket.emit('create-room', sessionStorage.getItem('lastCode'));
    socket.on('room-created', c => { curCode = c; document.getElementById('roomCode').innerText = c; });

    socket.on('player-list-update', players => {
        const list = document.getElementById('playerList');
        list.innerHTML = "";
        players.forEach((p, i) => {
            const a = (i / players.length) * Math.PI * 2;
            const x = Math.cos(a) * 250 + 300;
            const y = Math.sin(a) * 250 + 300;
            list.innerHTML += `<div class="player-avatar" style="left:${x}px; top:${y}px">
                <span style="font-size:60px">${p.emoji}</span>
                <b style="color:#000">${p.name}</b>
            </div>`;
        });
    });

    // Озвучка и остальная логика...
    socket.on('round-started', d => {
        document.getElementById('lobby').style.display='none';
        document.getElementById('game').style.display='flex';
        document.getElementById('qText').innerText = d.q;
    });
</script>
</body>
</html>
