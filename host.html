<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ГРЕХО-СМЕХ | HOST</title>
    <link rel="icon" href="https://fav.farm/🎮" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Roboto+Mono:wght@700&display=swap');
        body { margin: 0; padding: 0; overflow: hidden; background: #fbc02d; font-family: 'Montserrat', sans-serif; color: #3e2723; text-align: center; perspective: 1200px; }
        .spiral { position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; background: repeating-conic-gradient(from 0deg, #f9a825 0deg 20deg, #fbc02d 20deg 40deg); animation: rotateSpiral 40s linear infinite; z-index: -1; }
        @keyframes rotateSpiral { 100% { transform: rotate(360deg); } }
        
        #digital-timer { position: absolute; top: 20px; left: 30px; font-size: 85px; font-family: 'Roboto Mono'; font-weight: 900; text-shadow: 6px 6px 0 #000; color: #fff; z-index: 1000; display: none; transform: rotate(-5deg); }
        .screen { display: none; height: 100vh; width: 100vw; flex-direction: column; align-items: center; justify-content: center; position: absolute; top:0; left:0; transition: 0.5s; }

        /* --- ФИНАЛЬНЫЙ ФИКС НАСТРОЕК --- */
        #settings-modal-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: rgba(0,0,0,0.75); z-index: 10000; align-items: center; justify-content: center;
        }
        .modal { 
            background: #fff; border: 8px solid #3e2723; border-radius: 30px; 
            width: 850px; height: 400px; /* Идеальная высота */
            display: flex; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        /* Сайдбар слева */
        .modal-sidebar { 
            width: 30%; background: #3e2723; padding: 15px; 
            display: flex; flex-direction: column; gap: 8px; 
        }
        .tab-btn { 
            padding: 15px; background: none; border: none; color: #fff; 
            font-weight: 900; font-size: 16px; text-align: left; cursor: pointer; 
            border-radius: 12px; transition: 0.2s; 
        }
        .tab-btn.active { background: #fbc02d; color: #3e2723; }
        
        /* Тело настроек справа */
        .modal-body { width: 70%; padding: 30px 40px; overflow-y: auto; text-align: left; background: #fff; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px dashed #ddd; padding-bottom: 10px; }
        .setting-row label { font-size: 20px; font-weight: 900; }
        input[type="number"], select { padding: 8px; font-size: 18px; border: 3px solid #3e2723; border-radius: 10px; font-family: 'Montserrat'; font-weight: bold; background: #eee; }
        input[type="checkbox"] { width: 25px; height: 25px; cursor: pointer; }

        /* ОСТАЛЬНЫЕ ЭЛЕМЕНТЫ */
        .bubble { background: #fff; border: 8px solid #3e2723; border-radius: 25px; padding: 25px; width: 40%; min-height: 200px; font-size: 35px; font-weight: 900; box-shadow: 15px 15px 0 rgba(0,0,0,0.1); position: absolute; top: 50%; transition: 0.8s; display: flex; align-items: center; justify-content: center; text-align: center; }
        #card1 { left: 5%; transform: translateY(-50%) rotate(-3deg); }
        #card2 { right: 5%; transform: translateY(-50%) rotate(3deg); }
        .solo-center { left: 50% !important; transform: translate(-50%, -50%) scale(1.1) !important; }
        .kicked-out { transform: translate(150%, -50%) rotate(40deg) !important; opacity: 0; }
        .score-bar { background: #3e2723; color: #fff; font-size: 40px; padding: 12px 40px; border-radius: 20px; width: 600px; display: flex; justify-content: space-between; border: 5px solid #fff; margin: 10px; box-shadow: 10px 10px 0 rgba(0,0,0,0.2); animation: slideUp 0.5s forwards; }
        @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .btn-open-settings { position: absolute; top: 20px; left: 20px; padding: 15px 30px; background: #3e2723; color: #fff; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; }
        #credits-screen { background: #000 !important; color: #fff; display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9000; overflow: hidden; flex-direction: column; align-items: center; }
        .credits-wrap { position: absolute; width: 100%; top: 100%; animation: scrollCredits 25s linear forwards; }
        @keyframes scrollCredits { from { top: 100%; } to { top: -450%; } }
        .joke-card { background: #1a1a1a; border-left: 8px solid #fbc02d; padding: 15px; margin: 15px auto; width: 65%; text-align: left; font-size: 22px; color: #fff; }
    </style>
</head>
<body onclick="startAudio()">
    <div class="spiral"></div>
    <div id="digital-timer"></div>
    
    <div id="settings-modal-overlay">
        <div class="modal">
            <div class="modal-sidebar">
                <button class="tab-btn active" onclick="openTab(event, 'tab-modes')">РЕЖИМЫ</button>
                <button class="tab-btn" onclick="openTab(event, 'tab-events')">СОБЫТИЯ</button>
                <button class="tab-btn" onclick="openTab(event, 'tab-sounds')">ЗВУКИ</button>
                <button class="tab-btn" onclick="openTab(event, 'tab-general')">ОБЩЕЕ</button>
                <div style="flex-grow:1"></div>
                <button onclick="saveSettings()" style="background:#4caf50; color:#fff; padding:15px; border-radius:10px; font-weight:900; border:none; cursor:pointer;">ОК</button>
            </div>
            <div class="modal-body">
                <!-- Вкладка Режимы -->
                <div id="tab-modes" class="tab-content active">
                    <h2 style="color:#3e2723">РЕЖИМЫ ИГРЫ</h2>
                    <div class="setting-row"><label>ГРЕХО-СМЕХ (Текст)</label> <input type="radio" name="m" value="classic" checked></div>
                    <div class="setting-row"><label>ГРЕХ-РИСУНКОВ</label> <input type="radio" name="m" value="draw"></div>
                    <div class="setting-row"><label>ГРЕХ-ВОКАЛА</label> <input type="radio" name="m" value="voice"></div>
                </div>
                <!-- Вкладка События -->
                <div id="tab-events" class="tab-content">
                    <h2 style="color:#3e2723">СОБЫТИЯ</h2>
                    <div class="setting-row"><label>АДСКИЙ РЕЖИМ</label> <input type="checkbox" id="hellMode"></div>
                    <div class="setting-row"><label>18+ РЕЖИМ</label> <input type="checkbox" id="plus18"></div>
                    <div class="setting-row"><label>БОНУС X2</label> <input type="checkbox" id="bonus2" checked></div>
                </div>
                <!-- Вкладка Звуки -->
                <div id="tab-sounds" class="tab-content">
                    <h2 style="color:#3e2723">ЗВУКИ</h2>
                    <div class="setting-row"><label>ДИКТОР:</label> 
                        <select id="voiceType">
                            <option value="male">МУЖСКОЙ (БАС)</option>
                            <option value="female">ЖЕНСКИЙ</option>
                        </select>
                    </div>
                </div>
                <!-- Вкладка Общее -->
                <div id="tab-general" class="tab-content">
                    <h2 style="color:#3e2723">ОБЩИЕ НАСТРОЙКИ</h2>
                    <div class="setting-row"><label>ТАЙМЕР (СЕК):</label> <input type="number" id="timerVal" value="30"></div>
                    <div class="setting-row">
                        <label>МОДЕРАЦИЯ:</label> 
                        <input type="checkbox" id="modToggle" onchange="document.getElementById('mB').style.display=this.checked?'block':'none'">
                    </div>
                    <button id="mB" onclick="copyM()" style="display:none; width:100%; background:#2196f3; color:#fff; padding:10px; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">СКОПИРОВАТЬ ССЫЛКУ</button>
                </div>
            </div>
        </div>
    </div>

    <div id="lobby" class="screen" style="display:flex">
        <button class="btn-open-settings" onclick="toggleSet()">Настройки игры</button>
        <h1 style="font-size: 80px; text-shadow: 6px 6px 0 #fff; margin:0;">ГРЕХО-СМЕХ</h1>
        <div style="background:#000; color:#ffeb3b; padding:15px 60px; border:8px solid #fff; font-size:100px; transform:rotate(-2deg); margin:20px;" id="bigCode">...</div>
        <div id="playerList" style="display:flex; flex-wrap:wrap; justify-content:center; margin-top:20px;"></div>
        <button onclick="socket.emit('start-game', curCode)" style="background:#4caf50; border:6px solid #3e2723; color:#fff; padding:25px 70px; font-size:35px; border-radius:100px; cursor:pointer; margin-top:30px; font-weight:900;">ПОГНАЛИ!</button>
    </div>

    <div id="game" class="screen">
        <h2 id="qText" style="font-size:50px; background:#fff; padding:20px; border:6px solid #3e2723; transform:rotate(-1deg)"></h2>
        <div id="voting" style="height:400px; width:100%; position:relative;">
            <div id="card1" class="bubble"><div id="ans-text-1"></div><div id="badge-1" style="position:absolute; top:-20px; right:-20px; background:#ef5350; color:#fff; width:70px; height:70px; border-radius:50%; display:none; align-items:center; justify-content:center; font-size:24px; border:4px solid #3e2723;"></div></div>
            <div id="card2" class="bubble"><div id="ans-text-2"></div><div id="badge-2" style="position:absolute; top:-20px; right:-20px; background:#ef5350; color:#fff; width:70px; height:70px; border-radius:50%; display:none; align-items:center; justify-content:center; font-size:24px; border:4px solid #3e2723;"></div></div>
        </div>
    </div>

    <div id="scores" class="screen"><h1>ТЕКУЩИЙ СЧЁТ</h1><div id="scoreList"></div></div>
    <div id="final" class="screen"><h1>ПОБЕДИТЕЛЬ</h1><div id="winner" style="font-size:120px; color:#ef5350"></div></div>

    <div id="credits-screen">
        <div class="credits-wrap" id="credits-content"></div>
    </div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io(); let curCode = "", cdnInt;
    let gameSettings = { timer: 30, voice: 'male' };
    const music = { lobby: new Audio('lobby.mp3'), game: new Audio('game.mp3'), final: new Audio('final.mp3') };

    function toggleSet() { 
        const o = document.getElementById('settings-modal-overlay');
        o.style.display = (o.style.display === 'flex') ? 'none' : 'flex';
    }
    
    function openTab(e, tabName) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabName).classList.add('active');
        e.currentTarget.classList.add('active');
    }

    function saveSettings() {
        const mode = document.querySelector('input[name="m"]:checked').value;
        gameSettings.timer = parseInt(document.getElementById('timerVal').value);
        gameSettings.voice = document.getElementById('voiceType').value;
        gameSettings.hellMode = document.getElementById('hellMode').checked;
        gameSettings.bonus2 = document.getElementById('bonus2').checked;
        gameSettings.eighteenPlus = document.getElementById('plus18').checked;
        gameSettings.moderation = document.getElementById('modToggle').checked;
        socket.emit('update-settings', { code: curCode, settings: gameSettings, mode });
        toggleSet();
    }

    function copyM() { const link = window.location.origin + "/mod?code=" + curCode; navigator.clipboard.writeText(link); alert("Ссылка скопирована!"); }
    function playM(t) { Object.values(music).forEach(m=>{m.pause();m.currentTime=0;}); music[t].loop=true; music[t].volume=0.1; music[t].play(); }
    function startAudio() { if(!window.ai){ playM('lobby'); window.ai=true; } }

    socket.emit('create-room', sessionStorage.getItem('lastCode'));
    socket.on('room-created', c => { curCode = c; sessionStorage.setItem('lastCode', c); document.getElementById('bigCode').innerText = c; });
    socket.on('player-list-update', players => { document.getElementById('playerList').innerHTML = players.map(p => `<div style="background:#fff; border:4px solid #3e2723; border-radius:15px; padding:10px 20px; margin:5px; font-weight:bold;">${p.emoji} ${p.name}</div>`).join(''); });

    function speak(t, cb) {
        window.speechSynthesis.cancel(); const m = new SpeechSynthesisUtterance(t);
        const vs = window.speechSynthesis.getVoices();
        m.voice = vs.find(v => v.lang.includes('ru') && (gameSettings.voice==='male' ? (v.name.includes('David') || v.name.includes('Pavel')) : true)) || vs[0];
        m.pitch = 0.45; m.rate = 0.9; m.onend = cb; window.speechSynthesis.speak(m);
    }

    function runTimer(sec) {
        let tl = sec; const tEl = document.getElementById('digital-timer');
        tEl.style.display = 'block'; tEl.innerText = tl;
        clearInterval(cdnInt); cdnInt = setInterval(() => { tl--; tEl.innerText = tl; if(tl <= 0) { clearInterval(cdnInt); tEl.style.display = 'none'; } }, 1000);
    }

    socket.on('round-started', d => {
        document.getElementById('lobby').style.display="none"; document.getElementById('scores').style.display="none";
        document.getElementById('game').style.display='flex'; document.getElementById('voting').style.display = 'none';
        document.getElementById('qText').innerText = d.q; speak(d.q); runTimer(d.time); playM('game');
    });

    socket.on('show-voting', d => {
        document.getElementById('voting').style.display = "block";
        const c1 = document.getElementById('card1'), c2 = document.getElementById('card2');
        const b1 = document.getElementById('badge-1'), b2 = document.getElementById('badge-2');
        c1.className = 'bubble'; c2.className = 'bubble'; b1.style.display = 'none'; b2.style.display = 'none';
        
        const rend = (val, card) => {
            if(d.type === 'draw') card.innerHTML = `<img src="${val}" style="width:100%; border-radius:15px;">`;
            else if(d.type === 'voice') card.innerHTML = `<button style="background:#ef5350; color:#fff; border:none; padding:15px; border-radius:10px; font-weight:bold; cursor:pointer;" onclick="new Audio('${val}').play()">▶ СЛУШАТЬ</button>`;
            else card.innerText = Array.isArray(val) ? val.join('\n') : val;
        };

        rend(d.ans1, c1);
        if(d.isSolo) { c2.innerText = "Я отказываюсь отвечать!"; c2.classList.add('refusal'); setTimeout(() => { c2.classList.add('kicked-out'); c1.classList.add('solo-center'); }, 1500); }
        else { rend(d.ans2, c2); speak("Чей ответ лучше?"); }
        runTimer(20);
    });

    socket.on('voting-results', d => {
        const b1 = document.getElementById('badge-1'), b2 = document.getElementById('badge-2');
        b1.innerText = d.v1; b1.style.display = 'flex';
        if(!d.isSolo) { b2.innerText = d.v2; b2.style.display = 'flex'; }
        setTimeout(() => {
            b1.innerText = "+" + d.p1Points; b1.style.background = "#4caf50";
            if(!d.isSolo) { b2.innerText = "+" + d.p2Points; b2.style.background = "#4caf50"; }
            setTimeout(() => { document.getElementById('card1').classList.add('exit-zoom'); document.getElementById('card2').classList.add('exit-zoom'); }, 1500);
        }, 2000);
    });

    socket.on('show-scores', d => {
        document.getElementById('game').style.display='none'; document.getElementById('scores').style.display='flex';
        document.getElementById('scoreList').innerHTML = d.players.sort((a,b)=>b.score-a.score).map((p,i)=>`
            <div class="score-bar"><span>${i+1}. ${p.emoji} ${p.name}</span><b>${p.score}</b></div>
        `).join('');
        runTimer(10);
    });

    socket.on('final-results', d => {
        playM('final'); document.getElementById('scores').style.display='none'; document.getElementById('final').style.display='flex'; 
        document.getElementById('winner').innerText = d.players[0].name;
        
        let html = `<h1 style="font-size:80px; color:#fbc02d; margin-bottom:50px;">ГРЕХО-СМЕХ</h1><br><h3>ЗАЛ СЛАВЫ:</h3>`;
        d.best.forEach(j => { html += `<div class="joke-card">"${j.text}"<br><small>Автор: ${j.emoji} ${j.author} (${j.votes} гол.)</small></div>`; });
        if(d.worst.length > 0) {
            html += `<br><h3>ЗАЛ ПОЗОРА:</h3>`;
            d.worst.forEach(j => { html += `<div class="joke-card" style="opacity:0.6; border-color:#888;">"${j.text}"<br><small>Автор: ${j.emoji} ${j.author}</small></div>`; });
        }
        html += `<br><div style="font-size:40px; line-height:2;"><b style="color:#ef5350">АВТОРЫ:</b><br>Грексюр Поносович<br>Джемини Завозилов</div><br><h1>СПАСИБО!</h1>`;
        document.getElementById('credits-content').innerHTML = html;

        setTimeout(() => { 
            document.getElementById('final').style.display='none';
            document.getElementById('credits-screen').style.display='flex';
            setTimeout(() => socket.emit('finish-credits', curCode), 22000);
        }, 6000);
    });
</script>
</body>
</html>
