<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>HOST | ГРЕХО-СМЕХ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap');
        body { margin: 0; padding: 0; overflow: hidden; background: #fbc02d; font-family: 'Montserrat', sans-serif; color: #3e2723; text-align: center; }
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; }
        .screen { display: none; height: 100vh; width: 100vw; flex-direction: column; align-items: center; justify-content: center; position: absolute; }
        #lobby { display: flex; }
        .room-code-panel { background: #fff; border: 8px solid #000; padding: 15px 40px; transform: rotate(-2deg); box-shadow: 10px 10px 0 rgba(0,0,0,0.2); }
        .player-circle { position: relative; width: 500px; height: 500px; margin: 30px; }
        .avatar { position: absolute; width: 120px; height: 120px; background: #fff; border: 5px solid #000; border-radius: 25px; display: flex; flex-direction: column; align-items: center; justify-content: center; transform: translate(-50%, -50%); animation: wobble 3s infinite ease-in-out; }
        @keyframes wobble { 0%, 100% { transform: translate(-50%, -50%) rotate(-3deg); } 50% { transform: translate(-50%, -50%) rotate(3deg); } }
        .bubble { background: #fff; border: 6px solid #3e2723; border-radius: 20px; padding: 30px; width: 40%; font-size: 40px; font-weight: 900; box-shadow: 10px 10px 0 rgba(0,0,0,0.1); }
        .main-btn { background: #4caf50; border: 6px solid #000; color: #fff; padding: 20px 60px; font-size: 30px; border-radius: 100px; cursor: pointer; font-weight: 900; }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div id="lobby" class="screen">
        <h1 style="font-size: 70px; color: #fff; text-shadow: 6px 6px 0 #000;">ГРЕХО-СМЕХ</h1>
        <div class="room-code-panel">
            <span style="font-size: 18px; font-weight: bold;">КОД:</span><br>
            <b id="roomCode" style="font-size: 90px;">...</b>
        </div>
        <div class="player-circle" id="playerList"></div>
        <button onclick="socket.emit('start-game', curCode)" class="main-btn">ПОГНАЛИ!</button>
    </div>

    <div id="game" class="screen">
        <h2 id="qText" style="font-size: 50px; background: #fff; border: 6px solid #000; padding: 20px; transform: rotate(-1deg);"></h2>
        <div id="voting" style="display:none; width:100%; justify-content:center; gap:30px; margin-top:40px;">
            <div id="card1" class="bubble" style="transform:rotate(-2deg)"></div>
            <div id="card2" class="bubble" style="transform:rotate(2deg)"></div>
        </div>
    </div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let curCode = "";
    
    // SPIRAL BACKGROUND
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let angle = 0;
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();
    function draw() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        ctx.save(); ctx.translate(canvas.width/2, canvas.height/2); ctx.rotate(angle);
        for(let i=0; i<12; i++){ ctx.beginPath(); ctx.rotate(Math.PI/6); ctx.moveTo(0,0); ctx.lineTo(2000, 400); ctx.lineTo(2000, -400); ctx.fillStyle = i%2==0 ? '#fbc02d' : '#f9a825'; ctx.fill(); }
        ctx.restore(); angle += 0.005; requestAnimationFrame(draw);
    }
    draw();

    socket.emit('create-room', sessionStorage.getItem('lastCode'));
    socket.on('room-created', c => { curCode = c; document.getElementById('roomCode').innerText = c; });

    socket.on('player-list-update', players => {
        const list = document.getElementById('playerList');
        list.innerHTML = "";
        players.forEach((p, i) => {
            const a = (i / players.length) * Math.PI * 2;
            const x = Math.cos(a) * 230 + 250;
            const y = Math.sin(a) * 230 + 250;
            list.innerHTML += `<div class="avatar" style="left:${x}px; top:${y}px">
                <span style="font-size:50px">${p.emoji}</span>
                <b style="color:#000; font-size:14px">${p.name}</b>
            </div>`;
        });
    });

    socket.on('round-started', d => {
        document.getElementById('lobby').style.display='none';
        document.getElementById('game').style.display='flex';
        document.getElementById('voting').style.display='none';
        document.getElementById('qText').innerText = d.q;
    });

    socket.on('show-voting', d => {
        document.getElementById('voting').style.display='flex';
        document.getElementById('card1').innerText = d.ans1;
        document.getElementById('card2').innerText = d.ans2 || "...";
    });
</script>
</body>
</html>
