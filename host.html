<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ГРЕХО-СМЕХ | HOST</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap');
        body { margin: 0; padding: 0; overflow: hidden; background: #2196f3; font-family: 'Montserrat', sans-serif; color: #fff; text-align: center; }
        .spiral { position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; background: repeating-conic-gradient(from 0deg, #1a237e 0deg 20deg, #0d47a1 20deg 40deg); animation: rotateSpiral 40s linear infinite; z-index: -1; opacity: 0.8; }
        @keyframes rotateSpiral { 100% { transform: rotate(360deg); } }

        .screen { display: none; height: 100vh; width: 100vw; flex-direction: column; align-items: center; justify-content: center; position: absolute; }
        #lobby { display: flex; }

        /* КРУГ ИГРОКОВ */
        .lobby-container { position: relative; width: 800px; height: 600px; display: flex; align-items: center; justify-content: center; }
        .player-wrapper { position: absolute; top: 50%; left: 50%; transition: 0.8s ease-out; }
        
        /* ПЕРСОНАЖИ */
        .player-node { 
            width: 130px; height: 130px; border: 6px solid #000; border-radius: 20px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transform: translate(-50%, -50%); animation: wobble 2.5s infinite ease-in-out;
            background: #fff; color: #000;
        }
        .red-angry { background: #ff4757 !important; border-radius: 50%; }
        .orange-evil { background: #ffa502 !important; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); }
        .blue-sad { background: #2e86de !important; border-radius: 30px; }
        .green-derpy { background: #2ed573 !important; border-radius: 50% 50% 10% 10%; }
        .purple-smug { background: #a4b0be !important; clip-path: polygon(25% 0%, 75% 0%, 100% 100%, 0% 100%); }

        .eyes { width: 50%; height: 15px; background: #000; border-radius: 10px; position: relative; }
        .eyes::after, .eyes::before { content: ''; position: absolute; width: 6px; height: 6px; background: #fff; border-radius: 50%; top: 2px; }
        .eyes::before { left: 4px; } .eyes::after { right: 4px; }

        #roomCode { background: #000; color: #ffeb3b; padding: 15px 40px; border: 5px solid #fff; font-size: 80px; transform: rotate(-2deg); box-shadow: 10px 10px 0 rgba(0,0,0,0.3); }
        .main-btn { background: #4caf50; border: 5px solid #000; color: #fff; padding: 20px 50px; font-size: 30px; border-radius: 50px; cursor: pointer; font-weight: 900; margin-top: 20px; }
        @keyframes wobble { 0%, 100% { transform: translate(-50%, -50%) rotate(-3deg); } 50% { transform: translate(-50%, -50%) rotate(3deg); } }
    </style>
</head>
<body>
    <div class="spiral"></div>
    <div id="lobby" class="screen">
        <h1 style="font-size: 60px; text-shadow: 4px 4px 0 #000; margin: 0;">ГРЕХО-СМЕХ</h1>
        <div class="lobby-container">
            <div id="playerList"></div>
            <div id="roomCode">...</div>
        </div>
        <button onclick="socket.emit('start-game', curCode)" class="main-btn">ПОГНАЛИ!</button>
    </div>

    <div id="game" class="screen">
        <h2 id="qText" style="font-size: 50px; background: #fff; color: #000; padding: 20px; border: 6px solid #000;"></h2>
        <div id="voting" style="display:none; justify-content:center; gap:20px; width:100%">
            <div id="card1" style="background:#fff; color:#000; padding:30px; border:5px solid #000; width:40%; font-size:30px;"></div>
            <div id="card2" style="background:#fff; color:#000; padding:30px; border:5px solid #000; width:40%; font-size:30px;"></div>
        </div>
    </div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let curCode = "";

    socket.emit('create-room', sessionStorage.getItem('lastCode'));
    socket.on('room-created', c => { curCode = c; sessionStorage.setItem('lastCode', c); document.getElementById('roomCode').innerText = c; });

    socket.on('player-list-update', players => {
        const list = document.getElementById('playerList');
        list.innerHTML = "";
        const radius = 280;
        players.forEach((p, i) => {
            const angle = (i / players.length) * (Math.PI * 2) - (Math.PI / 2);
            const x = Math.cos(angle) * radius;
            const y = Math.sin(angle) * radius;
            list.innerHTML += `<div class="player-wrapper" style="transform: translate(${x}px, ${y}px)">
                <div class="player-node ${p.char}">
                    <div class="eyes"></div>
                    <b style="position:absolute; bottom:-30px; font-size:16px; background:#000; color:#fff; padding:2px 10px;">${p.name}</b>
                </div>
            </div>`;
        });
    });

    socket.on('round-started', d => {
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game').style.display = 'flex';
        document.getElementById('qText').innerText = d.q;
    });

    socket.on('show-voting', d => {
        document.getElementById('voting').style.display = 'flex';
        document.getElementById('card1').innerText = d.ans1;
        document.getElementById('card2').innerText = d.ans2 || "...";
    });
</script>
</body>
</html>
