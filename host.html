<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ГРЕХО-СМЕХ | HOST</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Montserrat:wght@900&display=swap');
        
        body { 
            margin: 0; padding: 0; overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            background: #fbc02d; /* Цвет фона из Смехлыста */
        }

        /* АНИМИРОВАННАЯ СПИРАЛЬ */
        .spiral {
            position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(#fbc02d, #f9a825, #fbc02d, #f9a825, #fbc02d);
            animation: rotate 20s linear infinite;
            z-index: -1;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* ИНТЕРФЕЙС */
        .container { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .logo { 
            font-family: 'Luckiest Guy', cursive; font-size: 120px; color: white;
            text-shadow: 8px 8px 0px #3e2723; transform: rotate(-5deg);
            animation: bounce 0.5s ease-in-out infinite alternate;
        }
        @keyframes bounce { from { transform: rotate(-5deg) scale(1); } to { transform: rotate(-5deg) scale(1.05); } }

        .room-code {
            background: white; border: 8px solid #3e2723; padding: 20px 60px;
            font-size: 80px; font-weight: 900; color: #3e2723;
            transform: rotate(2deg); box-shadow: 15px 15px 0px rgba(0,0,0,0.1);
        }

        /* БАБЛЫ ОТВЕТОВ */
        .voting-container { display: flex; gap: 40px; margin-top: 50px; width: 90%; justify-content: center; }
        .bubble {
            background: white; border: 6px solid #3e2723; padding: 40px;
            border-radius: 40px; width: 45%; font-size: 40px; font-weight: 900;
            box-shadow: 10px 10px 0px #3e2723; position: relative;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* ПЕРСОНАЖИ */
        .player-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 40px; }
        .avatar {
            width: 100px; height: 100px; border: 4px solid #3e2723;
            display: flex; align-items: center; justify-content: center;
            background: white; border-radius: 20px; transition: 0.3s;
        }
        
        .question-text { font-size: 50px; color: white; text-shadow: 4px 4px 0 #3e2723; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="spiral"></div>

    <div id="lobby" class="container">
        <div class="logo">ГРЕХО-СМЕХ</div>
        <div class="room-code" id="roomCode">....</div>
        <div class="player-list" id="playerList"></div>
        <button onclick="socket.emit('start-game', code)" style="margin-top:50px; padding:20px 50px; font-size:30px; border-radius:50px; border:none; cursor:pointer; background:#ef5350; color:white; font-weight:900;">ВСЕ ЗДЕСЬ!</button>
    </div>

    <div id="game" class="container" style="display:none;">
        <div class="question-text" id="qText">Вопрос...</div>
        <div class="voting-container" id="votingArea">
            <div class="bubble" id="ans1" style="transform: rotate(-2deg);">ОТВЕТ 1</div>
            <div class="bubble" id="ans2" style="transform: rotate(2deg);">ОТВЕТ 2</div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let code = "";

        socket.emit('create-room');
        socket.on('room-created', c => { code = c; document.getElementById('roomCode').innerText = c; });

        socket.on('player-joined', players => {
            const list = document.getElementById('playerList');
            list.innerHTML = players.map(p => `
                <div class="avatar" style="border-color:${p.color}">
                    <div style="font-size:40px">${p.name[0]}</div>
                </div>
            `).join('');
        });

        socket.on('round-started', data => {
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game').style.display = 'flex';
            document.getElementById('qText').innerText = data.pairs[0].q;
        });

        socket.on('start-voting', pair => {
            document.getElementById('votingArea').style.display = 'flex';
            document.getElementById('ans1').innerText = pair.ans1;
            document.getElementById('ans2').innerText = pair.ans2;
        });
    </script>
</body>
</html>
