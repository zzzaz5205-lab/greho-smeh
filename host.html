<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ГРЕХО-СМЕХ | HOST</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Roboto+Mono:wght@700&display=swap');
        body { margin: 0; padding: 0; overflow: hidden; background: #fbc02d; font-family: 'Montserrat', sans-serif; color: #3e2723; text-align: center; perspective: 1200px; }
        .spiral { position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; background: repeating-conic-gradient(from 0deg, #f9a825 0deg 20deg, #fbc02d 20deg 40deg); animation: rotateSpiral 40s linear infinite; z-index: -1; }
        @keyframes rotateSpiral { 100% { transform: rotate(360deg); } }
        
        #digital-timer { position: absolute; top: 20px; left: 30px; font-size: 85px; font-family: 'Roboto Mono'; font-weight: 900; text-shadow: 6px 6px 0 #000; color: #fff; z-index: 1000; display: none; }
        .screen { display: none; height: 100vh; width: 100vw; flex-direction: column; align-items: center; justify-content: center; position: absolute; top:0; left:0; }
        
        /* ИСПРАВЛЕННЫЕ НАСТРОЙКИ */
        #settings-modal-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: rgba(0,0,0,0.8); z-index: 10000; align-items: center; justify-content: center;
        }
        .modal { 
            background: #fff; border: 8px solid #3e2723; border-radius: 30px; 
            width: 850px; height: 400px; display: flex; overflow: hidden; box-shadow: 0 0 50px #000;
        }
        .modal-sidebar { width: 30%; background: #3e2723; padding: 15px; display: flex; flex-direction: column; gap: 5px; }
        .tab-btn { padding: 15px; background: none; border: none; color: #fff; font-weight: 900; font-size: 18px; text-align: left; cursor: pointer; border-radius: 10px; }
        .tab-btn.active { background: #fbc02d; color: #3e2723; }
        .modal-body { width: 70%; padding: 20px 40px; overflow-y: auto; text-align: left; background: #fff; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* КАРТОЧКИ ИГРЫ */
        .bubble { background: #fff; border: 8px solid #3e2723; border-radius: 25px; padding: 20px; width: 42%; min-height: 250px; font-size: 40px; font-weight: 900; position: absolute; top: 50%; transition: 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55); display: flex; align-items: center; justify-content: center; }
        #card1 { left: 5%; transform: translateY(-50%) rotate(-3deg); }
        #card2 { right: 5%; transform: translateY(-50%) rotate(3deg); }
        .solo-center { left: 50% !important; transform: translate(-50%, -50%) scale(1.1) !important; }
        .kicked-out { transform: translate(150%, -50%) rotate(45deg) !important; opacity: 0; }

        .points-badge { position: absolute; top: -30px; right: -30px; background: #ef5350; color: #fff; border: 5px solid #3e2723; width: 85px; height: 85px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 32px; animation: pop 0.4s forwards; }
        @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
        
        .audio-btn { background: #ef5350; color: #fff; padding: 20px; border: 4px solid #3e2723; border-radius: 15px; font-size: 24px; cursor: pointer; font-weight: bold; }
        .player-node { background: #fff; border: 5px solid #3e2723; padding: 10px 20px; border-radius: 15px; margin: 5px; font-weight: bold; }
    </style>
</head>
<body onclick="startAudio()">
    <div class="spiral"></div>
    <div id="digital-timer"></div>
    
    <!-- МОДАЛКА -->
    <div id="settings-modal-overlay">
        <div class="modal">
            <div class="modal-sidebar" id="sidebar">
                <button class="tab-btn active" onclick="openTab(event, 'tab-modes')">РЕЖИМЫ</button>
                <button class="tab-btn" onclick="openTab(event, 'tab-events')">СОБЫТИЯ</button>
                <button class="tab-btn" onclick="openTab(event, 'tab-sounds')">ЗВУКИ</button>
                <div style="flex-grow:1"></div>
                <button onclick="saveSettings()" style="background:#4caf50; color:#fff; padding:15px; border-radius:10px; font-weight:bold; cursor:pointer;">ОК</button>
            </div>
            <div class="modal-body">
                <div id="tab-modes" class="tab-content active">
                    <h2>ИГРОВЫЕ РЕЖИМЫ</h2>
                    <div style="margin-bottom:10px;"><input type="radio" name="m" value="classic" checked id="m1"> <label for="m1">ГРЕХО-СМЕХ (Текст)</label></div>
                    <div style="margin-bottom:10px;"><input type="radio" name="m" value="draw" id="m2"> <label for="m2">ГРЕХ-РИСУНКИ</label></div>
                    <div style="margin-bottom:10px;"><input type="radio" name="m" value="voice" id="m3"> <label for="m3">ГРЕХ-ВОКАЛ</label></div>
                </div>
                <div id="tab-events" class="tab-content">
                    <h2>СОБЫТИЯ</h2>
                    <div>Адский режим: <input type="checkbox" id="hellMode"></div><br>
                    <div>Бонус X2: <input type="checkbox" id="bonus2" checked></div>
                </div>
                <div id="tab-sounds" class="tab-content">
                    <h2>ЗВУКИ</h2>
                    <div>Голос: <select id="voiceType"><option value="male">МУЖСКОЙ (БАС)</option><option value="female">ЖЕНСКИЙ</option></select></div>
                </div>
            </div>
        </div>
    </div>

    <div id="lobby" class="screen" style="display:flex">
        <button style="position:absolute; top:20px; left:20px; padding:15px; background:#3e2723; color:#fff; border-radius:10px; cursor:pointer;" onclick="toggleSet()">Настройки игры</button>
        <h1 style="font-size:80px; text-shadow:6px 6px #fff;">ГРЕХО-СМЕХ</h1>
        <div style="background:#000; color:#ffeb3b; padding:15px 60px; font-size:100px; transform:rotate(-2deg);" id="bigCode">...</div>
        <div id="playerList" style="display:flex; flex-wrap:wrap; justify-content:center; margin-top:20px;"></div>
        <button onclick="socket.emit('start-game', curCode)" style="background:#4caf50; border:6px solid #3e2723; color:#fff; padding:20px 60px; font-size:35px; border-radius:100px; cursor:pointer; margin-top:30px; font-weight:900;">ПОГНАЛИ!</button>
    </div>

    <div id="game" class="screen">
        <h2 id="qText" style="font-size:50px; background:#fff; padding:20px; border:6px solid #3e2723;"></h2>
        <div id="voting" style="height:400px; width:100%; position:relative;">
            <div id="card1" class="bubble"><div id="ans-text-1"></div><div id="badge-1" class="points-badge"></div></div>
            <div id="card2" class="bubble"><div id="ans-text-2"></div><div id="badge-2" class="points-badge"></div></div>
        </div>
    </div>

    <div id="scores" class="screen"><h1>СЧЁТ</h1><div id="scoreList"></div></div>
    <div id="final" class="screen"><h1>ПОБЕДИТЕЛЬ</h1><div id="winner" style="font-size:120px; color:#ef5350"></div></div>

    <div id="credits-screen" style="background:#000; color:#fff; display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:9000; overflow:hidden; flex-direction:column; align-items:center;">
        <div class="credits-wrap" id="credits-content" style="position:absolute; width:100%; top:100%; animation: scrl 20s linear forwards;">
             <h1 style="color:#fbc02d; font-size:80px;">ГРЕХО-СМЕХ</h1><br>
             <h2>АВТОРЫ:</h2>
             <p style="font-size:40px;">Грексюр Поносович<br>Джемини Завозилов</p>
             <h2>СПАСИБО ЗА ИГРУ!</h2>
        </div>
    </div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io(); let curCode = "", cdnInt;
    let gameSettings = { timer: 30, voice: 'male' };
    const music = { lobby: new Audio('lobby.mp3'), game: new Audio('game.mp3'), final: new Audio('final.mp3') };

    function toggleSet() { const o = document.getElementById('settings-modal-overlay'); o.style.display = (o.style.display === 'flex') ? 'none' : 'flex'; }
    function openTab(e, t) { document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active')); document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); document.getElementById(t).classList.add('active'); e.currentTarget.classList.add('active'); }
    function saveSettings() {
        const mode = document.querySelector('input[name="m"]:checked').value;
        gameSettings.timer = parseInt(document.getElementById('timerVal').value);
        gameSettings.voice = document.getElementById('voiceType').value;
        socket.emit('update-settings', { code: curCode, settings: gameSettings, mode });
        toggleSet();
    }

    socket.emit('create-room', sessionStorage.getItem('lastCode'));
    socket.on('room-created', c => { curCode = c; sessionStorage.setItem('lastCode', c); document.getElementById('bigCode').innerText = c; });
    socket.on('player-list-update', players => { document.getElementById('playerList').innerHTML = players.map(p => `<div class="player-node">${p.emoji} ${p.name}</div>`).join(''); });

    function speak(t, cb) { window.speechSynthesis.cancel(); const m = new SpeechSynthesisUtterance(t); const vs = window.speechSynthesis.getVoices(); m.voice = vs.find(v => v.lang.includes('ru') && (gameSettings.voice==='male' ? v.name.includes('David') : true)) || vs[0]; m.pitch = 0.45; m.rate = 0.9; m.onend = cb; window.speechSynthesis.speak(m); }
    function runTimer(sec) { let tl = sec; const tEl = document.getElementById('digital-timer'); tEl.style.display = 'block'; tInt = setInterval(() => { tEl.innerText = tl; if(tl <= 0) { clearInterval(tInt); tEl.style.display = 'none'; } tl--; }, 1000); }

    socket.on('round-started', d => {
        document.getElementById('lobby').style.display="none"; document.getElementById('scores').style.display="none";
        document.getElementById('game').style.display='flex'; document.getElementById('voting').style.display = 'none';
        document.getElementById('qText').innerText = d.q; speak(d.q); runTimer(d.time);
    });

    socket.on('show-voting', d => {
        document.getElementById('voting').style.display = 'block';
        const c1 = document.getElementById('card1'), c2 = document.getElementById('card2');
        const b1 = document.getElementById('badge-1'), b2 = document.getElementById('badge-2');
        b1.style.display = 'none'; b2.style.display = 'none';
        
        const rend = (val, card) => {
            if(d.type === 'draw') card.innerHTML = `<img src="${val}" style="width:100%; border-radius:15px;">`;
            else if(d.type === 'voice') card.innerHTML = `<button class="audio-btn" onclick="new Audio('${val}').play()">▶ СЛУШАТЬ</button>`;
            else card.innerText = Array.isArray(val) ? val.join('\n') : val;
        };

        rend(d.ans1, c1); rend(d.ans2, c2);
        if(d.isSolo) { c2.classList.add('refusal'); setTimeout(() => { c2.classList.add('kicked-out'); c1.classList.add('solo-center'); }, 1500); }
        runTimer(15);
    });

    socket.on('voting-results', d => {
        const b1 = document.getElementById('badge-1'), b2 = document.getElementById('badge-2');
        b1.innerText = "+" + d.p1Points; b1.style.display = 'flex';
        if(!d.isSolo) { b2.innerText = "+" + d.p2Points; b2.style.display = 'flex'; }
        setTimeout(() => { document.getElementById('card1').className='bubble exit-zoom'; document.getElementById('card2').className='bubble exit-zoom'; }, 3000);
    });

    socket.on('show-scores', d => { document.getElementById('game').style.display='none'; document.getElementById('scores').style.display='flex'; document.getElementById('scoreList').innerHTML = d.players.map(p=>`<h2>${p.name}: ${p.score}</h2>`).join(''); });
    socket.on('final-results', d => { document.getElementById('scores').style.display='none'; document.getElementById('final').style.display='flex'; document.getElementById('winner').innerText = d.players[0].name; setTimeout(() => { document.getElementById('final').style.display='none'; document.getElementById('credits-screen').style.display='flex'; }, 5000); });
</script>
</body>
</html>
