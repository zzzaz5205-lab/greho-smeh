<!-- Внутри <style> в host.html добавь/обнови эти стили -->
<style>
    /* Улучшенные настройки */
    .setting-row { 
        display: flex; justify-content: space-between; align-items: center; 
        margin-bottom: 25px; padding: 15px; background: #f9f9f9;
        border: 3px solid var(--dark); border-radius: 15px;
    }

    /* Кастомная галочка (Toggle) */
    .switch {
        position: relative; display: inline-block; width: 60px; height: 34px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
        position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
        background-color: #ccc; transition: .4s; border-radius: 34px; border: 3px solid var(--dark);
    }
    .slider:before {
        position: absolute; content: ""; height: 20px; width: 20px; left: 4px; bottom: 4px;
        background-color: white; transition: .4s; border-radius: 50%; border: 2px solid var(--dark);
    }
    input:checked + .slider { background-color: var(--green); }
    input:checked + .slider:before { transform: translateX(26px); }

    /* Улучшенный селектор и числовой ввод */
    select, .timer-input {
        padding: 10px; border: 3px solid var(--dark); border-radius: 10px;
        font-family: 'Montserrat'; font-weight: bold; font-size: 18px;
        background: var(--yellow); cursor: pointer;
    }
    input[type="number"] { width: 80px; text-align: center; }

    .modal h2 { font-family: 'Montserrat'; color: var(--red); text-align: center; font-size: 32px; margin-top: 0; }
</style>

<!-- Обнови верстку модалки в host.html -->
<div id="tab-events" class="tab-content">
    <h2>СОБЫТИЯ</h2>
    <div class="setting-row">
        <label>Адский режим</label>
        <label class="switch"><input type="checkbox" id="hellMode"><span class="slider"></span></label>
    </div>
    <div class="setting-row">
        <label>18+ Режим</label>
        <label class="switch"><input type="checkbox" id="plus18"><span class="slider"></span></label>
    </div>
    <div class="setting-row">
        <label>Бонус X2</label>
        <label class="switch"><input type="checkbox" id="bonus2" checked><span class="slider"></span></label>
    </div>
</div>

<div id="tab-sounds" class="tab-content">
    <h2>ЗВУКИ</h2>
    <div class="setting-row">
        <label>Голос Диктора:</label> 
        <select id="voiceType">
            <option value="male">🧔 МУЖСКОЙ</option>
            <option value="female">👩 ЖЕНСКИЙ</option>
        </select>
    </div>
</div>

<div id="tab-general" class="tab-content">
    <h2>ОБЩЕЕ</h2>
    <div class="setting-row">
        <label>Таймер (сек):</label> 
        <input type="number" id="timerVal" value="30" class="timer-input">
    </div>
</div>
