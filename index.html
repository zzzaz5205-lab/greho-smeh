<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ГРЕХО-СМЕХ | ВАНГА</title>
    <link rel="icon" href="https://fav.farm/🎮" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap');
        
        :root {
            --yellow: #fbc02d;
            --dark: #3e2723;
            --red: #ef5350;
            --green: #4caf50;
        }

        body { 
            margin: 0; padding: 0;
            background: var(--yellow);
            background-image: radial-gradient(#f9a825 20%, transparent 20%), radial-gradient(#f9a825 20%, transparent 20%);
            background-size: 60px 60px; background-position: 0 0, 30px 30px;
            font-family: 'Segoe UI', sans-serif; color: var(--dark); text-align: center; overflow-x: hidden;
        }

        /* КНОПКА МЕНЮ БЕЗ РАМКИ */
        #menu-toggle {
            position: fixed; top: 25px; left: 25px;
            width: 50px; height: 40px;
            cursor: pointer; z-index: 3000;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .bar { width: 100%; height: 6px; background: var(--dark); border-radius: 4px; transition: 0.3s; }
        #menu-toggle.open .bar:nth-child(1) { transform: translateY(17px) rotate(45deg); }
        #menu-toggle.open .bar:nth-child(2) { opacity: 0; }
        #menu-toggle.open .bar:nth-child(3) { transform: translateY(-17px) rotate(-45deg); }

        /* ПАНЕЛЬ */
        #side-panel {
            position: fixed; top: 0; left: -340px; width: 320px; height: 100vh;
            background: #fff; border-right: 8px solid var(--dark);
            z-index: 2500; transition: 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            padding: 100px 20px 20px 20px; text-align: left; box-sizing: border-box;
        }
        #side-panel.active { left: 0; }

        /* БЛОК ВОЙТИ */
        .auth-block {
            background: #f5f5f5; border: 4px solid var(--dark);
            border-radius: 20px; padding: 20px; margin-bottom: 40px;
        }
        .auth-block h3 { margin: 0 0 15px 0; font-family: 'Montserrat'; font-size: 22px; text-transform: uppercase; }
        .google-btn {
            background: #fff; border: 3px solid var(--dark); padding: 12px;
            width: 100%; border-radius: 10px; cursor: pointer;
            font-weight: 900; display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 4px 0 var(--dark); transition: 0.2s;
        }
        .google-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--dark); }
        .soon-text { font-size: 12px; opacity: 0.6; margin-top: 10px; font-weight: bold; text-align: center; }

        /* ЦЕНТРАЛЬНАЯ КАРТОЧКА */
        .main-card {
            background: #fff; padding: 40px; display: inline-block;
            margin-top: 80px; border: 6px solid var(--dark);
            border-radius: 30px; box-shadow: 15px 15px 0 var(--dark);
            width: 90%; max-width: 400px; transform: rotate(-1deg);
        }
        h1 { font-family: 'Montserrat'; font-size: 48px; margin: 0 0 20px 0; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { font-weight: 900; font-size: 14px; text-transform: uppercase; margin-left: 5px; }
        input {
            width: 100%; padding: 18px; border: 4px solid var(--dark);
            border-radius: 15px; font-size: 20px; font-weight: bold; box-sizing: border-box; outline: none;
        }
        input:focus { background: #fffde7; }

        .btn {
            width: 100%; padding: 20px; border: 4px solid var(--dark);
            border-radius: 15px; font-family: 'Montserrat'; font-size: 24px;
            cursor: pointer; box-shadow: 0 6px 0 var(--dark); text-transform: uppercase;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--dark); }

        .vanga-avatar { position: absolute; top: 20px; right: 20px; width: 80px; height: 80px; border-radius: 50%; border: 4px solid var(--dark); background: url('vanga.png') center/cover; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="menu-toggle" onclick="toggleMenu()">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
    </div>

    <div id="side-panel">
        <div class="auth-block">
            <h3>Войти</h3>
            <button class="google-btn" onclick="location.href='/auth/google'">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="20">
                ЧЕРЕЗ GOOGLE
            </button>
            <div class="soon-text">Вскоре новые способы входа...</div>
        </div>

        <button class="btn" style="background:var(--yellow); font-size:16px;" onclick="toggleLeaderboard()">🏆 ТАБЛИЦА ЛИДЕРОВ</button>
        <div id="leaderboard-content" class="hidden" style="background:var(--dark); color:#fff; padding:15px; border-radius:10px; margin-top:10px;"></div>
    </div>

    <div class="main-card">
        <h1>ГРЕХО-СМЕХ</h1>
        <button class="btn" style="background:var(--green); color:#fff;" onclick="location.href='host.html'">СОЗДАТЬ ИГРУ</button>
        <div style="margin:25px 0; border-top: 4px dashed var(--dark);"></div>
        <div class="input-group">
            <label>Твое имя</label>
            <input type="text" id="name-input" maxlength="12">
        </div>
        <div class="input-group">
            <label>Код комнаты</label>
            <input type="text" id="code-input" placeholder="XXXX" maxlength="4">
        </div>
        <button class="btn" style="background:var(--red); color:#fff;" onclick="joinGame()">ВОЙТИ</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        // Рандомный ник в плейсхолдере
        window.onload = () => {
            const randNum = Math.floor(1000 + Math.random() * 9000);
            document.getElementById('name-input').placeholder = `Например: КлёвыйГрех${randNum}`;
        };

        function toggleMenu() {
            document.getElementById('menu-toggle').classList.toggle('open');
            document.getElementById('side-panel').classList.toggle('active');
        }

        function toggleLeaderboard() {
            document.getElementById('leaderboard-content').classList.toggle('hidden');
        }

        function joinGame() {
            const n = document.getElementById('name-input').value.trim();
            const c = document.getElementById('code-input').value.toUpperCase().trim();
            if(!n || !c) return alert("Заполни поля!");
            location.href = `player.html?name=${encodeURIComponent(n)}&code=${c}`;
        }

        socket.on('global-top-update', top => {
            document.getElementById('leaderboard-content').innerHTML = top.map((p, i) => `<div>${i+1}. ${p.emoji} ${p.name}: ${p.score}</div>`).join('');
        });
    </script>
</body>
</html>
