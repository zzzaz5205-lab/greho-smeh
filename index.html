<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ГРЕХО-СМЕХ | ВАНГА</title>
    <link rel="icon" href="https://fav.farm/🎮" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap');
        body { 
            margin: 0; padding: 0;
            background: #fbc02d;
            background-image: radial-gradient(#f9a825 20%, transparent 20%), radial-gradient(#f9a825 20%, transparent 20%);
            background-size: 50px 50px; background-position: 0 0, 25px 25px;
            font-family: 'Segoe UI', sans-serif; color: #3e2723; text-align: center;
        }

        /* ГЛОБАЛЬНЫЙ ТОП */
        #global-top {
            position: fixed; top: 15px; left: 15px;
            background: #3e2723; color: #fff;
            padding: 15px; border-radius: 15px;
            text-align: left; box-shadow: 8px 8px 0 rgba(0,0,0,0.1);
            border: 3px solid #fff; z-index: 1000;
            min-width: 180px; transform: rotate(-1deg);
        }
        #global-top h3 { margin: 0 0 10px 0; font-family: 'Montserrat'; font-size: 14px; color: #fbc02d; text-transform: uppercase; border-bottom: 1px dashed #fbc02d; padding-bottom: 5px;}
        .top-entry { font-size: 16px; font-weight: bold; margin: 5px 0; display: flex; justify-content: space-between; }
        .top-entry span { color: #fbc02d; margin-left: 10px; }

        /* ВАНГА БЛОК */
        .vanga-box { position: absolute; top: 20px; right: 20px; display: flex; flex-direction: column; align-items: center; z-index: 100; }
        .vanga-avatar { width: 100px; height: 100px; border-radius: 50%; border: 4px solid #3e2723; background: #000 url('vanga.png') center/cover; box-shadow: 5px 5px 0 rgba(0,0,0,0.2); }
        
        .card { background: #fff; padding: 40px; display: inline-block; margin-top: 100px; border: 6px solid #3e2723; border-radius: 15px; box-shadow: 15px 15px 0 #5d4037; width: 380px; transform: rotate(1deg); }
        h1 { font-family: 'Montserrat', sans-serif; font-size: 45px; color: #3e2723; margin: 0; text-transform: uppercase; }
        input { width: 90%; padding: 15px; margin: 10px 0; border: 3px solid #3e2723; border-radius: 10px; font-size: 20px; font-weight: bold; }
        .btn { width: 95%; padding: 18px; border: 3px solid #3e2723; border-radius: 10px; background: #ef5350; color: white; font-weight: bold; font-size: 22px; cursor: pointer; box-shadow: 0 6px 0 #b71c1c; }
    </style>
</head>
<body onclick="playMenuM()">
    
    <!-- ГЛОБАЛЬНЫЙ ТОП -->
    <div id="global-top">
        <h3>🏆 Глобальный Топ</h3>
        <div id="top-list">Загрузка...</div>
    </div>

    <audio id="m-music" src="menu.mp3" loop></audio>

    <div class="vanga-box">
        <a href="https://www.twitch.tv/vangavgav" target="_blank" style="text-decoration:none;">
            <div style="color:#fff; font-weight:900; text-shadow:2px 2px 0 #000; margin-bottom:5px;">ВАНГА ФIЙКО</div>
            <div class="vanga-avatar"></div>
        </a>
    </div>

    <div class="card">
        <h1>ГРЕХО-СМЕХ</h1>
        <button class="btn" onclick="location.href='host.html'" style="background:#4caf50; box-shadow: 0 6px 0 #2e7d32; margin-bottom:20px;">СОЗДАТЬ ИГРУ</button>
        <hr>
        <input type="text" id="name" placeholder="ТВОЕ ИМЯ" maxlength="12">
        <input type="text" id="code" placeholder="КОД">
        <button class="btn" onclick="join()">ВОЙТИ</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let mStarted = false;
        function playMenuM() { if(!mStarted) { document.getElementById('m-music').play(); mStarted=true; } }

        // Обновление топа
        socket.on('global-top-update', (topData) => {
            const list = document.getElementById('top-list');
            list.innerHTML = topData.map((p, i) => `
                <div class="top-entry">${i+1}. ${p.emoji} ${p.name} <span>${p.score}</span></div>
            `).join('');
            if(topData.length === 0) list.innerHTML = "Пока пусто...";
        });

        function join() {
            const n = document.getElementById('name').value.trim();
            const c = document.getElementById('code').value.toUpperCase().trim();
            if(!n || !c) return alert("Заполни поля!");
            socket.emit('join-room', { code: c, name: n });
        }

        socket.on('joined-success', (data) => {
            location.href = `player.html?name=${encodeURIComponent(document.getElementById('name').value)}&code=${data.code}`;
        });
        socket.on('error-join', m => alert(m));
    </script>
</body>
</html>
