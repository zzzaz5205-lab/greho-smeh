<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ГРЕХО-СМЕХ | ВАНГА</title>
    <link rel="icon" href="https://fav.farm/🎮" />
    <style>
        body { font-family: sans-serif; background: #1a1a2e; color: white; text-align: center; padding-top: 100px; margin: 0; }
        .vanga-container { position: absolute; top: 15px; right: 25px; display: flex; flex-direction: column; align-items: center; text-decoration: none; }
        .vanga-label { color: #f1c40f; font-weight: 900; font-size: 28px; text-transform: uppercase; text-shadow: 2px 2px 0 #000; margin-bottom: 8px; }
        .vanga-avatar { width: 120px; height: 120px; border-radius: 50%; border: 5px solid #e94560; background: url('vanga.png') center/cover; box-shadow: 0 0 20px #e94560; }
        
        /* КНОПКА КТО ЭТО */
        .who-btn { background: #f1c40f; color: black; border: none; padding: 5px 15px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 5px; font-size: 14px; }
        
        /* ВИДЕО ОКНО */
        #video-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); z-index: 10000; justify-content: center; align-items: center; }
        #video-overlay video { max-width: 80%; max-height: 80%; border: 5px solid #e94560; border-radius: 20px; }
        .close-video { position: absolute; top: 30px; right: 40px; color: white; font-size: 60px; cursor: pointer; font-family: Arial; }

        .card { background: #16213e; padding: 40px; display: inline-block; border-radius: 30px; border: 4px solid #e94560; width: 350px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: none; font-size: 18px; box-sizing: border-box; background: #0f3460; color: white; }
        .btn { width: 100%; padding: 18px; border-radius: 15px; border: none; background: #e94560; color: white; font-weight: bold; font-size: 22px; cursor: pointer; box-shadow: 0 5px 0 #950740; }
    </style>
</head>
<body>
    <!-- Видео плеер -->
    <div id="video-overlay">
        <span class="close-video" onclick="closeVideo()">&times;</span>
        <video id="vanga-video" controls>
            <source src="whois.mp4" type="video/mp4">
            Ваш браузер не поддерживает видео.
        </video>
    </div>

    <div class="vanga-container">
        <span class="vanga-label">Ванга Фiйко Перфоратор</span>
        <div class="vanga-avatar"></div>
        <button class="who-btn" onclick="openVideo()">КТО ЭТО?</button>
    </div>

    <div class="card">
        <h1 style="color:#e94560">ГРЕХО-СМЕХ</h1>
        <button class="btn" onclick="location.href='host.html'" style="background:#27ae60; box-shadow: 0 5px 0 #1e8449;">СОЗДАТЬ ИГРУ</button>
        <hr style="margin:25px 0; border:1px solid #0f3460;">
        <input type="text" id="name" placeholder="Твоё Имя">
        <input type="text" id="code" placeholder="Код Комнаты">
        <button class="btn" onclick="join()">ВОЙТИ</button>
    </div>

    <script>
        function openVideo() {
            document.getElementById('video-overlay').style.display = 'flex';
            document.getElementById('vanga-video').play();
        }
        function closeVideo() {
            document.getElementById('video-overlay').style.display = 'none';
            document.getElementById('vanga-video').pause();
            document.getElementById('vanga-video').currentTime = 0;
        }
        function join() {
            const n = document.getElementById('name').value;
            const c = document.getElementById('code').value.toUpperCase();
            if(n && c) location.href = `player.html?name=${encodeURIComponent(n)}&code=${encodeURIComponent(c)}`;
        }
    </script>
</body>
</html>
