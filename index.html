<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ГРЕХО-СМЕХ | ВХОД</title>
    <link rel="icon" href="https://fav.farm/🎮" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap');
        
        body { 
            margin: 0; padding: 0;
            background: #fbc02d; /* Горчичный фон */
            background-image: radial-gradient(#f9a825 20%, transparent 20%), radial-gradient(#f9a825 20%, transparent 20%);
            background-size: 50px 50px;
            background-position: 0 0, 25px 25px;
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            color: #3e2723; 
            text-align: center;
            overflow-x: hidden;
        }

        /* БЛОК ВАНГИ В УГЛУ */
        .vanga-box {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 100;
        }

        .vanga-link {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.3s;
        }
        .vanga-link:hover { transform: scale(1.05); }

        .vanga-label { 
            color: #fff; 
            font-family: 'Montserrat', sans-serif;
            font-weight: 900; 
            font-size: 18px; 
            text-transform: uppercase; 
            text-shadow: 2px 2px 0 #000; 
            margin-bottom: 5px;
        }

        .vanga-avatar { 
            width: 110px; 
            height: 110px; 
            border-radius: 50%; 
            border: 4px solid #3e2723; 
            background: #000 url('vanga.png') center/cover no-repeat; 
            box-shadow: 8px 8px 0 rgba(0,0,0,0.2); 
        }

        .who-btn { 
            background: #6d4c41; 
            color: white; 
            border: none; 
            padding: 8px 20px; 
            border-radius: 20px; 
            cursor: pointer; 
            margin-top: 10px; 
            font-weight: bold; 
            text-transform: uppercase;
            font-size: 12px;
            box-shadow: 0 4px 0 #3e2723;
        }
        .who-btn:active { transform: translateY(2px); box-shadow: none; }

        /* ОКНО С ВИДЕО (ОГРОМНОЕ) */
        #video-overlay { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); 
            z-index: 9999; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
        }
        
        #v-player { 
            width: 85%; 
            max-width: 1100px;
            aspect-ratio: 16 / 9; 
            border: 5px solid #fff; 
            border-radius: 20px; 
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            background: #000;
        }

        .close-vid { 
            position: absolute; 
            top: 20px; right: 40px; 
            font-size: 60px; 
            cursor: pointer; 
            color: white; 
            font-weight: bold;
        }

        /* КАРТОЧКА МЕНЮ */
        .card { 
            background: #fff; 
            padding: 40px; 
            display: inline-block; 
            margin-top: 120px;
            border: 6px solid #3e2723; 
            border-radius: 20px; 
            box-shadow: 15px 15px 0 #5d4037;
            width: 90%;
            max-width: 380px;
            transform: rotate(-1deg);
        }

        h1 { 
            font-family: 'Montserrat', sans-serif; 
            font-size: 45px; 
            color: #3e2723; 
            margin: 0 0 20px 0; 
            text-transform: uppercase;
        }

        input { 
            width: 100%; 
            padding: 15px; 
            margin: 10px 0; 
            border: 3px solid #3e2723; 
            border-radius: 12px; 
            font-size: 20px; 
            font-weight: bold; 
            box-sizing: border-box;
            outline: none;
        }

        .btn { 
            width: 100%; 
            padding: 18px; 
            border: 3px solid #3e2723; 
            border-radius: 12px; 
            background: #ef5350; 
            color: white; 
            font-weight: bold; 
            font-size: 22px; 
            cursor: pointer; 
            box-shadow: 0 6px 0 #b71c1c; 
            margin-top: 10px;
            text-transform: uppercase;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #b71c1c; }

        hr { border: none; height: 3px; background: #3e2723; margin: 20px 0; opacity: 0.2; }
    </style>
</head>
<body onclick="playMenuM()">

    <!-- ФОНОВАЯ МУЗЫКА -->
    <audio id="m-music" src="menu.mp3" loop></audio>

    <!-- ПЛЕЕР ВИДЕО -->
    <div id="video-overlay">
        <span class="close-vid" onclick="closeV()">&times;</span>
        <video id="v-player" src="https://cdn.discordapp.com/attachments/1093516468131479583/1489189505691947069/9b3f18d2-e0c6-4f75-bdda-21d9c93ef113.mp4?ex=69cf834d&is=69ce31cd&hm=f8602763e529f0abeb52e58f9dcf1862b6382c35937fa11335e0b8c2c4a63832&" controls></video>
    </div>
    
    <!-- БЛОК ВАНГИ -->
    <div class="vanga-box">
        <a href="https://www.twitch.tv/vangavgav" target="_blank" class="vanga-link">
            <div class="vanga-label">ВАНГА ФIЙКО</div>
            <div class="vanga-avatar"></div>
        </a>
        <button class="who-btn" onclick="openV()">КТО ОН?</button>
    </div>

    <!-- МЕНЮ ВХОДА -->
    <div class="card">
        <h1>ГРЕХО-СМЕХ</h1>
        
        <button class="btn" onclick="location.href='host.html'" style="background:#4caf50; box-shadow: 0 6px 0 #2e7d32; margin-bottom:20px;">
            СОЗДАТЬ ИГРУ
        </button>

        <hr>

        <input type="text" id="name" placeholder="ТВОЁ ИМЯ" maxlength="12">
        <input type="text" id="code" placeholder="КОД КОМНАТЫ" maxlength="4">
        
        <button class="btn" onclick="join()">ВОЙТИ</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let mPlaying = false;

        // Запуск музыки при первом клике (политика браузеров)
        function playMenuM() { 
            if(!mPlaying) { 
                const m = document.getElementById('m-music');
                m.volume = 0.2;
                m.play().catch(e => console.log("Музыка ждет клика"));
                mPlaying = true; 
            } 
        }

        // Управление видео
        function openV() { 
            document.getElementById('video-overlay').style.display = 'flex'; 
            document.getElementById('v-player').play(); 
        }
        function closeV() { 
            document.getElementById('video-overlay').style.display = 'none'; 
            document.getElementById('v-player').pause(); 
            document.getElementById('v-player').currentTime = 0;
        }

        // Логика входа
        function join() {
            const n = document.getElementById('name').value.trim();
            const c = document.getElementById('code').value.trim().toUpperCase();
            if(!n || !c) return alert("Заполни все поля!");
            
            // Проверяем комнату через сервер перед переходом
            socket.emit('join-room', { code: c, name: n });
        }

        // Если сервер пустил
        socket.on('joined-success', (data) => {
            const n = document.getElementById('name').value.trim();
            // Переходим в player.html, передаем только строку кода
            location.href = `player.html?name=${encodeURIComponent(n)}&code=${data.code}`;
        });

        // Если ошибка
        socket.on('error-join', m => alert(m));
    </script>
</body>
</html>
