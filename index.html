<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ГРЕХО-СМЕХ | ВАНГА</title>
    <link rel="icon" href="https://fav.farm/🎮" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap');
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #1a1a2e; 
            color: white; 
            text-align: center; 
            padding-top: 100px; 
            margin: 0; 
        }

        /* ГЛАВНЫЙ БЛОК ВАНГИ В УГЛУ */
        .vanga-box {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 250px;
            z-index: 100;
        }

        /* Ссылка на Твич (оборачивает имя и аватарку) */
        .vanga-link {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.3s;
        }
        .vanga-link:hover { transform: scale(1.05); }

        .vanga-label { 
            color: #f1c40f; 
            font-family: 'Montserrat', sans-serif;
            font-weight: 900; 
            font-size: 22px; 
            text-transform: uppercase; 
            text-shadow: 2px 2px 0 #000; 
            margin-bottom: 10px;
            line-height: 1.1;
        }

        .vanga-avatar { 
            width: 120px; 
            height: 120px; 
            border-radius: 50%; 
            border: 5px solid #e94560; 
            background: #000 url('vanga.png') center/cover no-repeat; 
            box-shadow: 0 0 20px #e94560; 
        }

        /* КНОПКА "КТО ЭТО?" */
        .who-btn { 
            background: #f1c40f; 
            color: black; 
            border: none; 
            padding: 8px 20px; 
            border-radius: 10px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 16px; 
            margin-top: 15px; 
            box-shadow: 0 4px 0 #b7950b;
            text-transform: uppercase;
        }
        .who-btn:active { transform: translateY(2px); box-shadow: none; }

        /* ОКНО С ВИДЕО (ГИГАНТСКОЕ) */
        #video-overlay { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.98); 
            z-index: 9999; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
        }
        
        #v-player { 
            width: 80%; 
            max-width: 1000px;
            aspect-ratio: 16 / 9; /* Чтобы не было полоской */
            border: 4px solid #e94560; 
            border-radius: 20px; 
            box-shadow: 0 0 50px rgba(233, 69, 96, 0.5);
            background: #000;
        }

        .close-vid { 
            position: absolute; 
            top: 20px; right: 40px; 
            font-size: 60px; 
            cursor: pointer; 
            color: white; 
            font-weight: bold;
        }

        /* КАРТОЧКА ВХОДА */
        .card { 
            background: #16213e; 
            padding: 40px; 
            display: inline-block; 
            border-radius: 30px; 
            border: 4px solid #e94560; 
            width: 350px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { font-family: 'Montserrat', sans-serif; font-size: 45px; color: #e94560; margin: 0 0 20px 0; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: none; font-size: 18px; box-sizing: border-box; background: #0f3460; color: white; border: 2px solid transparent; }
        input:focus { border-color: #e94560; outline: none; }
        .btn { width: 100%; padding: 18px; border-radius: 15px; border: none; background: #e94560; color: white; font-weight: bold; font-size: 22px; cursor: pointer; box-shadow: 0 5px 0 #950740; }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #950740; }
    </style>
</head>
<body>

    <!-- Видео плеер -->
    <div id="video-overlay">
        <span class="close-vid" onclick="closeVid()">&times;</span>
        <video id="v-player" controls preload="auto">
            <source src="whois.mp4" type="video/mp4">
            Ваш браузер не поддерживает видео.
        </video>
        <p id="video-error" style="color: red; display: none; margin-top: 10px;">Ошибка загрузки видео. Проверьте файл whois.mp4</p>
    </div>

    <!-- Блок Ванги -->
    <div class="vanga-box">
        <a href="https://www.twitch.tv/vangavgav" target="_blank" class="vanga-link">
            <div class="vanga-label">ВАНГА<br>ФIЙКО<br>ПЕРФОРАТОР</div>
            <div class="vanga-avatar"></div>
        </a>
        <button class="who-btn" onclick="openVid()">КТО ЭТО?</button>
    </div>

    <!-- Форма входа -->
    <div class="card">
        <h1>ГРЕХО-СМЕХ</h1>
        <button class="btn" onclick="location.href='host.html'" style="background:#27ae60; box-shadow: 0 5px 0 #1e8449; margin-bottom:20px;">СОЗДАТЬ ИГРУ</button>
        <hr style="border:none; height: 1px; background: #0f3460; margin:10px 0;">
        <input type="text" id="name" placeholder="Твоё Имя">
        <input type="text" id="code" placeholder="Код Комнаты">
        <button class="btn" onclick="join()">ВОЙТИ</button>
    </div>

    <script>
        const vOverlay = document.getElementById('video-overlay');
        const vPlayer = document.getElementById('v-player');
        const vError = document.getElementById('video-error');

        function openVid() { 
            vOverlay.style.display = 'flex'; 
            vPlayer.load(); // Принудительно перезагружаем файл
            
            // Пытаемся воспроизвести
            let playPromise = vPlayer.play();
            
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.log("Автовоспроизведение заблокировано или файл не найден");
                    vError.style.display = 'block';
                });
            }
        }

        function closeVid() { 
            vOverlay.style.display = 'none'; 
            vPlayer.pause(); 
            vPlayer.currentTime = 0; 
            vError.style.display = 'none';
        }

        function join() { 
            const n = document.getElementById('name').value; 
            const c = document.getElementById('code').value.toUpperCase(); 
            if(n && c) location.href=`player.html?name=${encodeURIComponent(n)}&code=${encodeURIComponent(c)}`; 
        }

        // Проверка на ошибки самого видео-тега
        vPlayer.onerror = function() {
            vError.style.display = 'block';
            vError.innerText = "Файл whois.mp4 не найден на сервере!";
        };
    </script>
</body>
</html>
