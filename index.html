<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ГРЕХО-СМЕХ | ВХОД</title>
    <link rel="icon" href="https://fav.farm/🎮" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap');
        body { 
            margin: 0; padding: 0;
            background: #fbc02d; /* Горчичный цвет Смехлыста */
            background-image: radial-gradient(#f9a825 20%, transparent 20%), radial-gradient(#f9a825 20%, transparent 20%);
            background-size: 50px 50px;
            background-position: 0 0, 25px 25px;
            font-family: 'Segoe UI', sans-serif; color: #3e2723; text-align: center;
        }
        .vanga-box { position: absolute; top: 20px; right: 20px; display: flex; flex-direction: column; align-items: center; z-index: 100; }
        .vanga-link { text-decoration: none; display: flex; flex-direction: column; align-items: center; }
        .vanga-label { color: #fff; font-family: 'Montserrat', sans-serif; font-size: 18px; text-shadow: 2px 2px 0 #000; margin-bottom: 5px; }
        .vanga-avatar { width: 100px; height: 100px; border-radius: 50%; border: 4px solid #3e2723; background: #000 url('vanga.png') center/cover; box-shadow: 5px 5px 0 rgba(0,0,0,0.2); }
        .who-btn { background: #6d4c41; color: white; border: none; padding: 5px 15px; border-radius: 20px; cursor: pointer; margin-top: 5px; font-weight: bold; }
        
        .card { 
            background: #fff; padding: 40px; display: inline-block; margin-top: 100px;
            border: 6px solid #3e2723; border-radius: 15px; box-shadow: 15px 15px 0 #5d4037;
            width: 380px; transform: rotate(-1deg);
        }
        h1 { font-family: 'Montserrat', sans-serif; font-size: 45px; color: #3e2723; margin-top: 0; text-transform: uppercase; }
        input { 
            width: 90%; padding: 15px; margin: 10px 0; border: 3px solid #3e2723; 
            border-radius: 10px; font-size: 20px; font-weight: bold; outline: none;
        }
        .btn { 
            width: 95%; padding: 18px; border: 3px solid #3e2723; border-radius: 10px; 
            background: #ef5350; color: white; font-weight: bold; font-size: 22px; 
            cursor: pointer; box-shadow: 0 6px 0 #b71c1c; margin-top: 10px;
        }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #b71c1c; }
        #video-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        video { width: 80%; border: 5px solid #fff; border-radius: 15px; }
    </style>
</head>
<body onclick="playMenuM()">
    <audio id="m-music" src="menu.mp3" loop></audio>
    <div id="video-overlay"><span style="color:white; font-size:50px; position:absolute; top:20px; right:40px; cursor:pointer;" onclick="closeV()">&times;</span><video id="v-player" src="https://cdn.discordapp.com/attachments/1093516468131479583/1489189505691947069/9b3f18d2-e0c6-4f75-bdda-21d9c93ef113.mp4?ex=69cf834d&is=69ce31cd&hm=f8602763e529f0abeb52e58f9dcf1862b6382c35937fa11335e0b8c2c4a63832&" controls></video></div>
    
    <div class="vanga-box">
        <a href="https://www.twitch.tv/vangavgav" target="_blank" class="vanga-link">
            <div class="vanga-label">ВАНГА ФIЙКО</div>
            <div class="vanga-avatar"></div>
        </a>
        <button class="who-btn" onclick="openV()">КТО ЭТО?</button>
    </div>

    <div class="card">
        <h1>ГРЕХО-СМЕХ</h1>
        <button class="btn" onclick="location.href='host.html'" style="background:#4caf50; box-shadow: 0 6px 0 #2e7d32;">СОЗДАТЬ ИГРУ</button>
        <hr style="margin:20px 0; border: 2px dashed #3e2723;">
        <input type="text" id="name" placeholder="ТВОЕ ИМЯ">
        <input type="text" id="code" placeholder="КОД КОМНАТЫ">
        <button class="btn" onclick="join()">ВОЙТИ</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io(); let mPlaying = false;
        function playMenuM() { if(!mPlaying) { const m=document.getElementById('m-music'); m.volume=0.2; m.play(); mPlaying=true; } }
        function openV() { document.getElementById('video-overlay').style.display='flex'; document.getElementById('v-player').play(); }
        function closeV() { document.getElementById('video-overlay').style.display='none'; document.getElementById('v-player').pause(); }
        function join() { const n=document.getElementById('name').value, c=document.getElementById('code').value.toUpperCase(); if(!n||!c) return alert("Заполни!"); socket.emit('join-room', { code: c, name: n }); }
        socket.on('joined-success', c => location.href=`player.html?name=${encodeURIComponent(document.getElementById('name').value)}&code=${c}`);
        socket.on('error-join', m => alert(m));
    </script>
</body>
</html>
