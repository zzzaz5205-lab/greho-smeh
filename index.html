<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ГРЕХО-СМЕХ - ВХОД</title>
    <style>
        body { font-family: sans-serif; background: #1a1a2e; color: white; text-align: center; padding-top: 100px; }
        .card { background: #16213e; padding: 40px; display: inline-block; border-radius: 20px; border: 3px solid #e94560; }
        input { display: block; width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; font-size: 18px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; background: #e94560; color: white; font-weight: bold; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h1 style="color:#e94560">ГРЕХО-СМЕХ</h1>
        <button onclick="location.href='host.html'" style="background:#27ae60; margin-bottom: 20px;">СОЗДАТЬ ИГРУ</button>
        <hr>
        <input type="text" id="name" placeholder="Твое Имя">
        <input type="text" id="code" placeholder="Код Комнаты">
        <button onclick="join()">ВОЙТИ</button>
    </div>
    <script>
        function join() {
            const n = document.getElementById('name').value;
            const c = document.getElementById('code').value.toUpperCase();
            if(n && c) location.href = `player.html?name=${encodeURIComponent(n)}&code=${encodeURIComponent(c)}`;
        }
    </script>
</body>
</html>
