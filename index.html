<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ГРЕХО-СМЕХ | ВАНГА</title>
    <link rel="icon" href="https://fav.farm/🎮" />
    <style>
        body { font-family: sans-serif; background: #1a1a2e; color: white; text-align: center; padding-top: 80px; margin: 0; }
        
        /* КОНТЕЙНЕР ВАНГИ СО ССЫЛКОЙ */
        .vanga-link-box { 
            position: absolute; top: 15px; right: 25px; 
            display: flex; flex-direction: column; align-items: center; 
            text-decoration: none; color: inherit; z-index: 100;
        }
        .vanga-label { color: #f1c40f; font-weight: 900; font-size: 24px; text-transform: uppercase; text-shadow: 2px 2px 0 #000; margin-bottom: 5px; }
        .vanga-avatar { width: 110px; height: 110px; border-radius: 50%; border: 5px solid #e94560; background: url('vanga.png') center/cover; box-shadow: 0 0 20px #e94560; transition: 0.3s; }
        .vanga-avatar:hover { transform: scale(1.1); border-color: #f1c40f; }

        /* КНОПКА "КТО ЭТО" (отдельно от ссылки, чтобы не перебивать клик) */
        .who-btn { background: #f1c40f; color: black; border: none; padding: 6px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; margin-top: 8px; box-shadow: 0 4px 0 #b7950b; }
        .who-btn:active { transform: translateY(2px); box-shadow: none; }

        /* ГИГАНТСКОЕ ОКНО ВИДЕО */
        #video-overlay { 
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: rgba(0,0,0,0.95); 
            z-index: 9999; justify-content: center; align-items: center; 
        }
        #video-overlay video { 
            width: 85%; /* В 4 РАЗА БОЛЬШЕ */
            max-height: 80vh; 
            border: 6px solid #e94560; 
            border-radius: 25px; 
            box-shadow: 0 0 50px rgba(233, 69, 96, 0.6);
            background: #000;
        }
        .close-vid { position: absolute; top: 20px; right: 40px; font-size: 70px; cursor: pointer; color: white; font-weight: bold; line-height: 1; }

        .card { background: #16213e; padding: 40px; display: inline-block; border-radius: 30px; border: 4px solid #e94560; width: 350px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: none; font-size: 18px; box-sizing: border-box; background: #0f3460; color: white; }
        .btn { width: 100%; padding: 18px; border-radius: 15px; border: none; background: #e94560; color: white; font-weight: bold; font-size: 22px; cursor: pointer; box-shadow: 0 5px 0 #950740; }
    </style>
</head>
<body>

    <!-- Видео плеер -->
    <div id="video-overlay">
        <span class="close-vid" onclick="closeVid()">&times;</span>
        <video id="v-player" controls playsinline>
            <source src="whois.mp4" type="video/mp4">
            Ваш браузер не поддерживает видео.
        </video>
    </div>

    <!-- Верхний блок -->
    <div style="position: absolute; top: 15px; right: 25px; display: flex; flex-direction: column; align-items: center;">
        <a href="https://www.twitch.tv/vangavgav" target="_blank" class="vanga-link-box">
            <span class="vanga-label">Ванга Фiйко Перфоратор</span>
            <div class="vanga-avatar"></div>
        </a>
        <button class="who-btn" onclick="openVid()">КТО ЭТО?</button>
    </div>

    <div class="card">
        <h1 style="color:#e94560; margin:0 0 20px 0;">ГРЕХО-СМЕХ</h1>
        <button class="btn" onclick="location.href='host.html'" style="background:#27ae60; box-shadow: 0 5px 0 #1e8449; margin-bottom:20px;">СОЗДАТЬ ИГРУ</button>
        <hr style="border:1px solid #0f3460; margin:10px 0;">
        <input type="text" id="name" placeholder="Твоё Имя">
        <input type="text" id="code" placeholder="Код Комнаты">
        <button class="btn" onclick="join()">ВОЙТИ</button>
    </div>

    <script>
        const player = document.getElementById('v-player');

        function openVid() { 
            document.getElementById('video-overlay').style.display = 'flex'; 
            player.load(); // Принудительно загружаем видео
            player.play().catch(e => console.log("Нажмите Play вручную в плеере")); 
        }

        function closeVid() { 
            document.getElementById('video-overlay').style.display = 'none'; 
            player.pause(); 
            player.currentTime = 0; 
        }

        function join() { 
            const n = document.getElementById('name').value; 
            const c = document.getElementById('code').value.toUpperCase(); 
            if(n && c) location.href=`player.html?name=${encodeURIComponent(n)}&code=${encodeURIComponent(c)}`; 
        }
    </script>
</body>
</html>
